/* =====================================================
   SECURE LINK STORE — URLs never exposed to DOM/HTML
   Keys are random tokens mapped to actual URLs in memory
===================================================== */
const _linkStore = {};
function _storLink(url){
  if(!url) return '';
  const key = Math.random().toString(36).slice(2,10)+Date.now().toString(36);
  _linkStore[key] = url;
  return key;
}
function _openLink(key){
  const url = _linkStore[key];
  if(!url){ toast('Link not available','error'); return; }
  const a = document.createElement('a');
  a.href = url; a.target = '_blank'; a.rel = 'noopener noreferrer';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

function renderContentItem(item, isTeacher=false, serialNo=0){
  const t = item.type || 'notes';
  const icons   = {notes:'<i class="fas fa-book"></i>', lecture:'<i class="fas fa-video"></i>', dpp:'<i class="fas fa-clipboard-list"></i>'};
  const labels  = {notes:'Notes', lecture:'Lecture', dpp:'DPP'};
  const links   = item.download_links || [];
  const v       = item.views || 0;
  const itemJson = JSON.stringify(item).replace(/"/g,'&quot;');

  // ── Primary action button (URL stored securely, never in DOM) ──
  let primaryBtn = '';
  if(t === 'lecture'){
    const k = _storLink(item.url||'');
    primaryBtn = `<button class="btn btn-p" onclick="viewContentSecure('${item.id}','${k}','${esc(item.name)}')"><i class="fas fa-play"></i> Watch Now</button>`;
  } else if(item.url){
    const k = _storLink(item.url||'');
    primaryBtn = `<button class="btn btn-p" onclick="viewContentSecure('${item.id}','${k}','${esc(item.name)}')"><i class="fas fa-eye"></i> View</button>`;
  }

  // ── Download button(s) — URL stored securely ──
  let dlBtn = '';
  if(t !== 'lecture'){
    if(links.length === 1){
      const k = _storLink(links[0].url);
      dlBtn = `<button class="btn btn-ok" onclick="event.stopPropagation();openSecureLink('${k}','${esc(links[0].label)}')">${getDLIcon(links[0].label)} ${esc(links[0].label)}</button>`;
    } else if(links.length > 1){
      dlBtn = `<button class="btn btn-ok" onclick="event.stopPropagation();showDLPicker(${itemJson})"><i class="fas fa-download"></i> Open Links (${links.length})</button>`;
    } else if(item.url && !primaryBtn){
      const k = _storLink(item.url);
      dlBtn = `<button class="btn btn-ok" onclick="event.stopPropagation();openSecureLink('${k}','File')"><i class="fas fa-download"></i> Open</button>`;
    }
  }

  // ── Bookmark / teacher edit-delete ──
  const sideActions = isTeacher
    ? `<div class="ci-teacher-btns">
         <button class="btn btn-ghost btn-xs" onclick="modalEditContent('${item.id}',${itemJson})" title="Edit"><i class="fas fa-edit"></i></button>
         <button class="btn btn-del  btn-xs" onclick="deleteContent('${item.id}')"                title="Delete"><i class="fas fa-trash"></i></button>
       </div>`
    : `<button class="btn btn-ghost btn-xs" onclick="toggleBookmark('${item.id}')" title="Bookmark"><i class="fas fa-bookmark"></i></button>`;

  // ── Multi-link pills (student) — no URL in DOM ──
  let dlPills = '';
  if(!isTeacher && links.length > 1){
    const pills = links.map(l=>{
      const k = _storLink(l.url);
      return `<button class="ci-dl-pill" onclick="openSecureLink('${k}','${esc(l.label)}')">${getDLIcon(l.label)} ${esc(l.label)}</button>`;
    }).join('');
    dlPills = `<div class="ci-dl-pills">${pills}</div>`;
  }

  return `
  <div class="ci" id="ci_${item.id}">
    <div class="ci-bar ${t}"></div>
    <div class="ci-body">

      <div class="ci-top-row">
        <div class="ci-badge ${t}">${icons[t]||'<i class="fas fa-file-alt"></i>'}</div>
        <div class="ci-title-wrap">
          <div class="ci-type-tag ${t}">${labels[t]||t}${serialNo>0?' &bull; '+serialNo:''}</div>
          <div class="ci-name">${esc(item.name)}</div>
        </div>
        ${sideActions}
      </div>

      <div class="ci-meta-row">
        <span class="ci-meta-item"><i class="fas fa-calendar-check"></i> ${fmtD(item.ts)}</span>
        ${links.length ? `<span class="ci-meta-item"><i class="fas fa-download"></i> ${links.length} link${links.length>1?'s':''}</span>` : ''}
        <span class="ci-views-pill" data-views="${item.id}"><i class="fas fa-eye"></i> ${v} view${v!==1?'s':''}</span>
      </div>

      ${(primaryBtn||dlBtn) ? `
      <div class="ci-actions">
        ${primaryBtn}
        ${dlBtn}
      </div>` : ''}

      ${dlPills}
    </div>
  </div>`;
}

/* Open any link securely — URL fetched from memory store, never exposed */

async function viewContentSecure(id, key, name){
  const uid2 = S.user?.id||'anon';
  const url  = _linkStore[key] || '';

  // Unique view tracking
  const {data:item} = await sb.from('content').select('viewers,views').eq('id',id).single();
  const viewers = item?.viewers||[];
  if(!viewers.includes(uid2)){
    viewers.push(uid2);
    await sb.from('content').update({viewers,views:viewers.length}).eq('id',id);
  }
  const viewCount = viewers.length;
  const el = document.getElementById(`ci_${id}`);
  if(el){ const m=el.querySelector('[data-views]'); if(m) m.innerHTML=`<i class="fas fa-eye"></i> ${viewCount} view${viewCount!==1?'s':''}`; }

  if(!url){ toast('Link not available','error'); return; }

  if(url.includes('youtube.com')||url.includes('youtu.be')){
    openModal(`
    <div class="mh"><h3><i class="fas fa-video"></i> ${esc(name)}</h3><button class="mc-btn" onclick="closeModal()">✕</button></div>
    <div style="position:relative;padding-bottom:56.25%;border-radius:10px;overflow:hidden">
      <iframe src="${esc(getYTEmbed(url))}" style="position:absolute;inset:0;width:100%;height:100%;border:0" allowfullscreen></iframe>
    </div>
    <div style="margin-top:12px;font-size:12.5px;color:var(--text2)"><i class="fas fa-eye"></i> ${viewCount} unique view${viewCount!==1?'s':''} &nbsp;${viewers.indexOf(uid2)===viewers.length-1?'<span style="color:var(--success)">· recorded <i class="fas fa-user-check"></i></span>':'<span style="color:var(--text3)">· already counted</span>'}</div>`);
  } else {
    _openLink(key);
    toast(viewers.indexOf(uid2)===viewers.length-1?'View recorded':'Already counted','info');
  }
}

  toast('Joined batch!','success'); render();

async function pingOnline(){
  if(!S.user || S.user.role==='admin' || S.user.id==='admin') return;
  const ts = Date.now();
  const {error} = await sb.from('profiles').update({last_active:ts}).eq('id',S.user.id);
  if(error){
    // Column doesn't exist yet — show one-time warning
    if(!S._presenceWarnShown){
      S._presenceWarnShown = true;
      console.warn('[FreeStudy] last_active column missing. Run SQL from Admin → DB Setup.');
      toast('Run DB Setup SQL to enable Online Status','warning');
    }
    return;
  }
  // Success — update our own entry in chatPeers cache so our status is correct too
  const myIdx = S.chatPeers.findIndex(p=>p.id===S.user.id);
  if(myIdx>=0) S.chatPeers[myIdx].last_active = ts;
}
function isOnline(last_active){
  if(!last_active) return false;
  return (Date.now()-last_active)<45000; // 45s — handles slow networks & tab visibility loss
}

// Refresh all visible online rings using cached last_active values
// Called every 30s as a fallback when realtime is slow
function refreshOnlineRings(){
  document.querySelectorAll('.chat-contact[data-pid]').forEach(el=>{
    const pid=el.dataset.pid;
    const peer=S.chatPeers.find(p=>p.id===pid);
    if(!peer) return;
    const online=isOnline(peer.last_active);
    const ring=el.querySelector('.online-ring');
    if(ring) ring.className=`online-ring ${online?'on':'off'}`;
  });
  // Also refresh header if chat open
  if(S.chatWith && S.chatWith!=='admin'){
    const peer=S.chatPeers.find(p=>p.id===S.chatWith);
    if(!peer) return;
    const hdrStatus=document.querySelector('.chat-hdr-status');
    if(!hdrStatus) return;
    const online=isOnline(peer.last_active);
    hdrStatus.className=`chat-hdr-status ${online?'on':'off'}`;
    if(online){
      hdrStatus.innerHTML='<i class="fas fa-circle" style="color:#22c55e"></i> Online';
    } else {
      const la=peer.last_active;
      if(!la){ hdrStatus.innerHTML='<i class="fas fa-circle" style="color:var(--text3)"></i> Offline'; return; }
      const diff=Date.now()-la;
      const mins=Math.floor(diff/60000);
      hdrStatus.textContent = mins<1 ? 'last seen just now'
        : mins<60 ? `last seen ${mins}m ago`
        : `last seen ${Math.floor(mins/60)}h ago`;
    }
  }
}
function onlineText(last_active){
  if(isOnline(last_active)) return '<div class="chat-hdr-status on"><i class="fas fa-circle" style="color:#22c55e"></i> Online</div>';
  if(!last_active) return '<div class="chat-hdr-status off"><i class="fas fa-circle" style="color:var(--text3)"></i> Offline</div>';
  const diff=Date.now()-last_active;
  const mins=Math.floor(diff/60000);
  if(mins<1)  return '<div class="chat-hdr-status off">last seen just now</div>';
  if(mins<60) return `<div class="chat-hdr-status off">last seen ${mins}m ago</div>`;
  const hrs=Math.floor(mins/60);
  if(hrs<24)  return `<div class="chat-hdr-status off">last seen ${hrs}h ago</div>`;
  return `<div class="chat-hdr-status off">last seen ${fmtD(last_active)}</div>`;
}

async function getChatPeers(){
  const uid2=S.user.id; const role=S.user.role;
  if(role==='admin'){
    // Admin: can message all teachers and students
    const {data}=await sb.from('profiles').select('*').in('role',['teacher','student']).order('name');
    return data||[];
  }
  if(role==='teacher'){
    const {data:myBatches}=await sb.from('batches').select('*').eq('teacher_id',uid2);
    const stuIds=[...new Set((myBatches||[]).flatMap(b=>b.students||[]))];
    let students=[];
    if(stuIds.length){ const {data}=await sb.from('profiles').select('*').in('id',stuIds); students=data||[]; }
    // Teacher can also message Admin
    const adminPeer={id:'admin',name:'Admin',role:'admin',email:'',photo:null,last_active:null};
    return [...students,adminPeer];
  }
  // Student: only teachers of their batches
  const {data:batches}=await sb.from('batches').select('teacher_id').contains('students',[uid2]);
  const tIds=[...new Set((batches||[]).map(b=>b.teacher_id).filter(Boolean))];
  if(!tIds.length) return [];
  const {data}=await sb.from('profiles').select('*').in('id',tIds);
  return data||[];
}

async function markMsgsSeen(peerId){
  const uid2=S.user.id; const seenAt=Date.now();
  try {
    // Mark all unread messages from this peer as seen (sets blue tick on sender's side)
    const {error} = await sb.from('messages')
      .update({is_read:true, seen_at:seenAt})
      .eq('receiver_id', uid2)
      .eq('sender_id', peerId)
      .or('is_read.eq.false,seen_at.is.null');
    if(error) console.warn('markMsgsSeen:', error.message);
  } catch(e){ /* ignore */ }
}

function getMsgTick(msg,myId){
  if((msg.sender_id||msg.from_id)!==myId) return ''; // receiver — no tick needed
  if(msg.seen_at)                          return '<span class="tick t-seen" title="Seen">✓✓</span>';
  if(msg.is_read || msg.read)              return '<span class="tick t-read" title="Delivered">✓✓</span>';
  return '<span class="tick t-sent" title="Sent">✓</span>';
}

function renderMsgBubble(m,uid2){
  const isMe=(m.sender_id||m.from_id)===uid2;
  return `
  <div class="chat-msg ${isMe?'me':'them'}" id="msg_${m.id}">
    <div class="chat-bubble">${esc(m.message_text||m.text||'')}</div>
    <div class="chat-meta">
      <span class="chat-ts">${fmtT(m.created_at||m.ts)}</span>
      ${getMsgTick(m,uid2)}
    </div>
  </div>`;
}

// Refresh last_active from DB for all visible contacts then update rings
async function fetchFreshPresence(){
  const peerIds = S.chatPeers.filter(p=>p.id!=='admin').map(p=>p.id);
  if(!peerIds.length) return;
  const {data,error} = await sb.from('profiles').select('id,last_active').in('id',peerIds);
  if(error||!data) return;
  data.forEach(row=>{
    const idx = S.chatPeers.findIndex(p=>p.id===row.id);
    if(idx>=0) S.chatPeers[idx].last_active = row.last_active;
  });
  refreshOnlineRings();
}

function buildContactList(peers,uid2,peerData){
  if(!peers.length) return '<div class="empty"><span class="empty-ic"><i class="fas fa-comments"></i></span><p>No contacts found</p></div>';
  return peers.map(p=>{
    const pd=peerData.find(x=>x.id===p.id)||p;
    const online=isOnline(pd.last_active);
    const av=p.photo?`<img src="${esc(p.photo)}" alt="">`:((p.name||'?').charAt(0).toUpperCase());
    const roleLbl=p.role==='teacher'?'<i class="fas fa-chalkboard-teacher"></i>':p.role==='admin'?'<i class="fas fa-database"></i>':'<i class="fas fa-user-graduate"></i>';
    const preview=pd.lastMsg
      ?(pd.lastMsg.sender_id===uid2||pd.lastMsg.from_id===uid2
          ?'You: '+(pd.lastMsg.message_text||pd.lastMsg.text||'')
          :(pd.lastMsg.message_text||pd.lastMsg.text||'')).slice(0,42)
      :'Tap to chat…';
    const timeStr=pd.lastMsg?fmtT(pd.lastMsg.created_at||pd.lastMsg.ts):'';
    const unread=pd.unread||0;
    return `
    <div class="chat-contact ${S.chatWith===p.id?'active':''} ${unread>0?'has-unread':''}"
         data-pid="${p.id}" onclick="openChatWith('${p.id}')">
      <div class="chat-av">
        ${av}
        <span class="online-ring ${online?'on':'off'}"></span>
      </div>
      <div class="chat-ci">
        <div class="chat-ci-top">
          <span class="chat-ci-name">${roleLbl} ${esc(p.name)}</span>
          <span class="chat-ci-time">${timeStr}</span>
        </div>
        <div class="chat-ci-preview">${esc(preview)}</div>
      </div>
      ${unread>0?`<div class="chat-unread-pill">${unread}</div>`:''}
    </div>`;
  }).join('');
}

/* =====================================================
   ── CHAT v2 — MAIN RENDER ──
===================================================== */
async function renderChatList(){
  const uid2=S.user.id;
  const peers=await getChatPeers();
  S.chatPeers=peers;

  // Fetch fresh last_active for all peers in one query
  const peerIds=peers.filter(p=>p.id!=='admin').map(p=>p.id);
  let freshProfiles=[];
  if(peerIds.length){
    const {data:fp}=await sb.from('profiles').select('id,last_active').in('id',peerIds);
    freshProfiles=fp||[];
  }

  // Fetch last-message + unread count per peer
  const peerData=await Promise.all(peers.map(async p=>{
    const fresh=freshProfiles.find(f=>f.id===p.id);
    const msgs=await dbMsgs(uid2,p.id);
    const lastMsg=msgs[msgs.length-1]||null;
    const unread=msgs.filter(m=>(m.receiver_id||m.to_id)===uid2&&!m.is_read&&!m.read).length;
    // Merge fresh last_active into peer object
    return {...p,last_active:fresh?.last_active??p.last_active,lastMsg,unread};
  }));
  // Sort by last message timestamp
  peerData.sort((a,b)=>{
    const at=a.lastMsg?.created_at||a.lastMsg?.ts||0;
    const bt=b.lastMsg?.created_at||b.lastMsg?.ts||0;
    return bt-at;
  });

  const contactsHtml=buildContactList(peerData,uid2,peerData);
  // Refresh presence after render (50ms so DOM is ready)
  setTimeout(fetchFreshPresence, 50);
  const rightHtml=S.chatWith
    ?await buildChatPanel(S.chatWith)
    :`<div class="chat-right-empty"><span style="font-size:52px"><i class="fas fa-comments"></i></span><span>Select a contact to start messaging</span></div>`;

  return `
  <div class="chat-wrap">
    <div class="chat-left ${S.chatWith?'mob-hidden':''}" id="chatLeft">
      <div class="chat-left-head">
        <div class="chat-left-title"><i class="fas fa-comments"></i> Messages</div>
        <div class="chat-search-wrap">
          <span class="chat-search-ic"><i class="fas fa-search"></i></span>
          <input class="chat-search-inp" placeholder="Search contacts…"
            value="${esc(S.msgSearch)}"
            oninput="S.msgSearch=this.value;renderContactSearch(this.value)">
        </div>
      </div>
      <div class="chat-contacts" id="chatContactsList">${contactsHtml}</div>
    </div>
    <div class="chat-right ${S.chatWith?'':'mob-hidden'}" id="chatRight">
      ${rightHtml}
    </div>
  </div>`;
}

async function sendMsg(toId){
  const inp=document.getElementById('chatInput');
  const text=(inp?.value||'').trim(); if(!text)return;
  inp.value=''; inp.focus();
  const senderId = S.user.id;  // 'admin' literal for admin, UUID for others
  const senderRole = S.user.role||'student';
  let receiverRole = 'student';
  if(toId==='admin') receiverRole='admin';
  else { const p=S.chatPeers.find(x=>x.id===toId); receiverRole=p?.role||'student'; }
  const msg={
    id:uid(), sender_id:senderId, sender_role:senderRole,
    receiver_id:toId, receiver_role:receiverRole,
    message_text:text, created_at:Date.now(),
    is_read:false, seen_at:null
  };
  const {error:msgErr} = await sb.from('messages').insert(msg);
  if(msgErr){ toast('Failed to send: '+msgErr.message,'error'); return; }
  appendChatMsg(msg);
  // Note: NO pushNotif here — chat messages must NOT appear in the notifications tab.
  // The receiver sees a toast via realtime subscription on messages table.
}

let _searchOverlay=null;
let _searchKbIdx=-1;

function openGlobalSearch(){
  if(_searchOverlay) return;
  _searchOverlay=document.createElement('div');
  _searchOverlay.className='search-overlay';
  _searchOverlay.id='searchOverlay';
  _searchOverlay.innerHTML=`
    <div class="search-box" id="searchBox" onclick="event.stopPropagation()">
      <div class="search-inp-wrap">
        <i class="fas fa-search"></i>
        <input class="search-main-inp" id="searchMainInp"
          placeholder="Search batches, subjects, chapters, notes, lectures…"
          oninput="runGlobalSearch(this.value)"
          onkeydown="handleSearchKey(event)">
        <button class="search-close-btn" onclick="closeGlobalSearch()"><i class="fas fa-times"></i></button>
      </div>
      <div class="search-results" id="searchResults">
        <div class="search-hint">
          <i class="fas fa-search" style="font-size:32px;opacity:.3;margin-bottom:10px;display:block"></i>
          Type to search across all content…
        </div>
      </div>
    </div>`;
  _searchOverlay.onclick=()=>closeGlobalSearch();
  document.body.appendChild(_searchOverlay);
  setTimeout(()=>document.getElementById('searchMainInp')?.focus(),80);
  // ESC to close
  document.addEventListener('keydown',_searchEscHandler);
}

function _searchEscHandler(e){ if(e.key==='Escape') closeGlobalSearch(); }

function closeGlobalSearch(){
  if(_searchOverlay){ _searchOverlay.remove(); _searchOverlay=null; _searchKbIdx=-1; }
  document.removeEventListener('keydown',_searchEscHandler);
}

function highlightMatch(text, q){
  if(!q) return esc(text);
  const re=new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
  return esc(text).replace(re,'<mark>$1</mark>');
}

function handleSearchKey(e){
  const items=document.querySelectorAll('.search-result-item');
  if(e.key==='ArrowDown'){ e.preventDefault(); _searchKbIdx=Math.min(_searchKbIdx+1,items.length-1); }
  else if(e.key==='ArrowUp'){ e.preventDefault(); _searchKbIdx=Math.max(_searchKbIdx-1,0); }
  else if(e.key==='Enter'){
    e.preventDefault();
    const active=items[_searchKbIdx]||items[0];
    if(active) active.click();
    return;
  }
  items.forEach((it,i)=>it.classList.toggle('active',i===_searchKbIdx));
  items[_searchKbIdx]?.scrollIntoView({block:'nearest'});
}

async function runGlobalSearch(q){
  q=(q||'').trim();
  const box=document.getElementById('searchResults');
  if(!box) return;
  if(q.length<2){
    box.innerHTML='<div class="search-hint"><i class="fas fa-search" style="font-size:32px;opacity:.3;margin-bottom:10px;display:block"></i>Type at least 2 characters…</div>';
    return;
  }
  box.innerHTML='<div class="search-hint"><div class="spinner" style="width:28px;height:28px;margin:20px auto 0"></div></div>';

  const uid2=S.user?.id;
  const role=S.user?.role;
  const lq=q.toLowerCase();
  let html='';

  try {
    // Fetch relevant data in parallel
    const [batches,subjects,chapters,content]=await Promise.all([
      sb.from('batches').select('*').order('name'),
      sb.from('subjects').select('*').order('name'),
      sb.from('chapters').select('*').order('name'),
      sb.from('content').select('id,name,type,chapter_id').order('name'),
    ]);

    const allBatches  = batches.data||[];
    const allSubjects = subjects.data||[];
    const allChapters = chapters.data||[];
    const allContent  = content.data||[];

    // For students: only show their enrolled batches
    let myBatchIds=allBatches.map(b=>b.id);
    if(role==='student'){
      myBatchIds=allBatches.filter(b=>(b.students||[]).includes(uid2)).map(b=>b.id);
    } else if(role==='teacher'){
      myBatchIds=allBatches.filter(b=>b.teacher_id===uid2).map(b=>b.id);
    }

    // Filter batches
    const fBatches=allBatches.filter(b=>myBatchIds.includes(b.id)&&b.name.toLowerCase().includes(lq));
    if(fBatches.length){
      html+=`<div class="search-section-title"><i class="fas fa-box"></i> Batches</div>`;
      html+=fBatches.slice(0,5).map(b=>`
        <div class="search-result-item" onclick="closeGlobalSearch();S.sub='${role==='teacher'?'batches':'mybatches'}';S.batch=${JSON.stringify(b).replace(/"/g,'&quot;')};render()">
          <div class="sr-ic"><i class="fas fa-box"></i></div>
          <div class="sr-info">
            <div class="sr-name">${highlightMatch(b.name,q)}</div>
            <div class="sr-path">${esc(b.description||'Batch')}</div>
          </div>
        </div>`).join('');
    }

    // Filter subjects (only from my batches)
    const fSubjects=allSubjects.filter(s=>myBatchIds.includes(s.batch_id)&&s.name.toLowerCase().includes(lq));
    if(fSubjects.length){
      html+=`<div class="search-section-title"><i class="fas fa-book-open"></i> Subjects</div>`;
      html+=fSubjects.slice(0,5).map(s=>{
        const batch=allBatches.find(b=>b.id===s.batch_id);
        return `
        <div class="search-result-item" onclick="closeGlobalSearch();S.sub='${role==='teacher'?'batches':'mybatches'}';S.batch=${JSON.stringify(batch||{id:s.batch_id,name:'Batch'}).replace(/"/g,'&quot;')};S.subject=${JSON.stringify(s).replace(/"/g,'&quot;')};render()">
          <div class="sr-ic"><i class="fas fa-book-open"></i></div>
          <div class="sr-info">
            <div class="sr-name">${highlightMatch(s.name,q)}</div>
            <div class="sr-path">${esc(batch?.name||'Unknown batch')}</div>
          </div>
        </div>`;
      }).join('');
    }

    // Filter chapters
    const mySubjectIds=allSubjects.filter(s=>myBatchIds.includes(s.batch_id)).map(s=>s.id);
    const fChapters=allChapters.filter(c=>mySubjectIds.includes(c.subject_id)&&c.name.toLowerCase().includes(lq));
    if(fChapters.length){
      html+=`<div class="search-section-title"><i class="fas fa-pen"></i> Chapters</div>`;
      html+=fChapters.slice(0,5).map(c=>{
        const subj=allSubjects.find(s=>s.id===c.subject_id);
        const batch=allBatches.find(b=>b.id===subj?.batch_id);
        return `
        <div class="search-result-item" onclick="closeGlobalSearch();S.sub='${role==='teacher'?'batches':'mybatches'}';S.batch=${JSON.stringify(batch||{}).replace(/"/g,'&quot;')};S.subject=${JSON.stringify(subj||{}).replace(/"/g,'&quot;')};S.chapter=${JSON.stringify(c).replace(/"/g,'&quot;')};render()">
          <div class="sr-ic"><i class="fas fa-pen"></i></div>
          <div class="sr-info">
            <div class="sr-name">${highlightMatch(c.name,q)}</div>
            <div class="sr-path">${esc(batch?.name||'')} › ${esc(subj?.name||'')}</div>
          </div>
        </div>`;
      }).join('');
    }

    // Filter content (notes / lecture / dpp)
    const myChapterIds=allChapters.filter(c=>mySubjectIds.includes(c.subject_id)).map(c=>c.id);
    const typeIc={notes:'<i class="fas fa-book"></i>',lecture:'<i class="fas fa-video"></i>',dpp:'<i class="fas fa-clipboard-list"></i>'};
    const fContent=allContent.filter(c=>myChapterIds.includes(c.chapter_id)&&c.name.toLowerCase().includes(lq));
    if(fContent.length){
      html+=`<div class="search-section-title"><i class="fas fa-file-alt"></i> Content</div>`;
      html+=fContent.slice(0,8).map(c=>{
        const chap=allChapters.find(ch=>ch.id===c.chapter_id);
        const subj=allSubjects.find(s=>s.id===chap?.subject_id);
        const batch=allBatches.find(b=>b.id===subj?.batch_id);
        const typeLabel=(c.type||'notes').charAt(0).toUpperCase()+(c.type||'notes').slice(1);
        return `
        <div class="search-result-item" onclick="closeGlobalSearch();S.sub='${role==='teacher'?'batches':'mybatches'}';S.batch=${JSON.stringify(batch||{}).replace(/"/g,'&quot;')};S.subject=${JSON.stringify(subj||{}).replace(/"/g,'&quot;')};S.chapter=${JSON.stringify(chap||{}).replace(/"/g,'&quot;')};S.cTab='${c.type||'notes'}';render()">
          <div class="sr-ic">${typeIc[c.type]||'<i class="fas fa-file-alt"></i>'}</div>
          <div class="sr-info">
            <div class="sr-name">${highlightMatch(c.name,q)} <span class="sr-type">${typeLabel}</span></div>
            <div class="sr-path">${esc(batch?.name||'')} › ${esc(subj?.name||'')} › ${esc(chap?.name||'')}</div>
          </div>
        </div>`;
      }).join('');
    }

    if(!html){
      html=`<div class="search-empty">
        <i class="fas fa-search" style="font-size:32px;opacity:.3;margin-bottom:10px;display:block"></i>
        No results found for "<strong>${esc(q)}</strong>"
      </div>`;
    }
    box.innerHTML=html;
    _searchKbIdx=-1;
  } catch(err){
    box.innerHTML=`<div class="search-empty">Error: ${esc(err.message)}</div>`;
  }
}


async function init(){
  loadTheme();
  // Admin session (localStorage-based, no Supabase auth needed)
  const adminSess=lsGet('fs_admin_sess');
  if(adminSess&&adminSess.id==='admin'){
    S.user=adminSess; S.page='admin'; S.sub='dashboard';
    render(); return; // admin: no realtime / no presence ping
  }
  // Supabase auth session
  const {data:{session}}=await sb.auth.getSession();
  if(session){
    const {data:profile}=await sb.from('profiles').select('*').eq('id',session.user.id).single();
    if(profile){
      S.user=profile;
      S.page=profile.role==='teacher'?(profile.approved?'teacher':'waiting'):'student';
      S.sub='dashboard';
      setupRealtime();
      // Online presence — ping immediately, then every 20s
      pingOnline().then(()=>{
        // After first successful ping, refresh rings so header shows correct status right away
        setTimeout(refreshOnlineRings, 500);
      });
      S.presenceInterval=setInterval(()=>{
        pingOnline();
        refreshOnlineRings();
      },20000);
    }
  }
  render();
}

// Re-ping when user returns to the tab (handles long idle + mobile tab switching)
document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState==='visible' && S.user && S.user.id!=='admin'){
    pingOnline().then(()=>setTimeout(refreshOnlineRings,300));
  }
});

init();

</script>
