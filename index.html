<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FreeStudy — by TushyaSharma</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>

/* =========================================
   GOOGLE FONTS
   ========================================= */
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap');

/* =========================================
   CSS VARIABLES
   ========================================= */

/* ── DARK MODE: Black + White + Green accent ── */
:root {
  --bg:       #0a0a0a;
  --bg2:      #111111;
  --bg3:      #1a1a1a;
  --card:     #141414;
  --card2:    #1c1c1c;
  --border:   #2a2a2a;
  --border2:  #333333;
  --text:     #ffffff;
  --text2:    #a0a0a0;
  --text3:    #555555;
  --accent:   #22c55e;
  --accent2:  #16a34a;
  --accent3:  #4ade80;
  --success:  #22c55e;
  --warning:  #f59e0b;
  --danger:   #ef4444;
  --pink:     #4ade80;
  --sidebar:  248px;
  --r:        12px;
  --r2:       8px;
  --shadow:   0 4px 24px rgba(0,0,0,.7);
  --shadowlg: 0 12px 48px rgba(0,0,0,.8);
  --glow:     0 0 32px rgba(34,197,94,.15);
}

/* ── LIGHT MODE: White + Black + Blue accent ── */
[data-theme="light"] {
  --bg:      #ffffff;
  --bg2:     #fafafa;
  --bg3:     #f4f4f4;
  --card:    #ffffff;
  --card2:   #f8f8f8;
  --border:  #e5e5e5;
  --border2: #d4d4d4;
  --text:    #0a0a0a;
  --text2:   #525252;
  --text3:   #a3a3a3;
  --accent:  #1d4ed8;
  --accent2: #1e3a8a;
  --accent3: #3b82f6;
  --success: #16a34a;
  --warning: #d97706;
  --danger:  #dc2626;
  --pink:    #1d4ed8;
  --shadow:   0 4px 16px rgba(0,0,0,.06);
  --shadowlg: 0 12px 36px rgba(0,0,0,.1);
  --glow:     0 0 24px rgba(29,78,216,.1);
}

/* =========================================
   COPY PROTECTION
   ========================================= */
* {
  -webkit-user-select: none !important;
  -moz-user-select: none !important;
  -ms-user-select: none !important;
  user-select: none !important;
  -webkit-touch-callout: none !important;
}
input, textarea {
  -webkit-user-select: text !important;
  -moz-user-select: text !important;
  user-select: text !important;
}
img {
  pointer-events: none !important;
  -webkit-user-drag: none !important;
  user-drag: none !important;
}


*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body {
  font-family:'Plus Jakarta Sans', system-ui, sans-serif;
  background:var(--bg); color:var(--text);
  min-height:100vh; overflow-x:hidden;
  transition:background .25s, color .25s;
  font-size:14px; line-height:1.5;
}
::-webkit-scrollbar { width:5px; height:5px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border2); border-radius:4px; }
a { text-decoration:none; color:inherit; }
button { font-family:inherit; }
input, select, textarea { font-family:inherit; }

/* =========================================
   AUTH PAGES
   ========================================= */
.auth-page {
  min-height:100vh; display:flex; align-items:center;
  justify-content:center; padding:20px;
  background:var(--bg); position:relative; overflow:hidden;
}
.auth-orbs { position:absolute; inset:0; pointer-events:none; }
/* Dark = green orbs */
.auth-orbs::before {
  content:''; position:absolute;
  width:600px; height:600px; border-radius:50%;
  background:radial-gradient(circle, rgba(34,197,94,.10) 0%, transparent 65%);
  top:-260px; right:-180px; animation:orbFloat 9s ease-in-out infinite;
}
.auth-orbs::after {
  content:''; position:absolute;
  width:500px; height:500px; border-radius:50%;
  background:radial-gradient(circle, rgba(74,222,128,.07) 0%, transparent 65%);
  bottom:-180px; left:-160px; animation:orbFloat 12s ease-in-out infinite reverse;
}
/* Light = blue orbs */
[data-theme="light"] .auth-orbs::before {
  background:radial-gradient(circle, rgba(29,78,216,.09) 0%, transparent 65%);
}
[data-theme="light"] .auth-orbs::after {
  background:radial-gradient(circle, rgba(59,130,246,.07) 0%, transparent 65%);
}
@keyframes orbFloat {
  0%,100%{transform:translate(0,0) scale(1)}
  50%{transform:translate(20px,-20px) scale(1.04)}
}

.auth-card {
  background:var(--card); border:1px solid var(--border);
  border-radius:20px; padding:40px 36px;
  width:100%; max-width:420px;
  box-shadow:var(--shadowlg); position:relative; z-index:1;
  animation:slideUp .4s cubic-bezier(.22,.68,0,1.2);
}
.auth-head { text-align:center; margin-bottom:30px; }
.auth-logo-box {
  width:68px; height:68px; border-radius:18px;
  background:var(--accent);
  display:inline-flex; align-items:center; justify-content:center;
  font-size:30px; margin-bottom:14px;
  box-shadow:0 8px 24px rgba(34,197,94,.3);
}
[data-theme="light"] .auth-logo-box {
  box-shadow:0 8px 24px rgba(29,78,216,.25);
}
.auth-head h1 {
  font-size:26px; font-weight:800; letter-spacing:-.5px;
  color:var(--text);
}
.auth-head p { color:var(--text2); font-size:13px; margin-top:5px; }

/* =========================================
   FORM ELEMENTS
   ========================================= */
.fg { margin-bottom:15px; }
.fg label {
  display:block; font-size:11.5px; font-weight:700;
  color:var(--text2); margin-bottom:6px;
  text-transform:uppercase; letter-spacing:.6px;
}
.fc {
  width:100%; background:var(--bg3);
  border:1.5px solid var(--border); border-radius:10px;
  padding:11px 14px; color:var(--text); font-size:14px;
  outline:none; transition:border-color .2s, box-shadow .2s;
}
.fc:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(34,197,94,.12); }
[data-theme="light"] .fc:focus { box-shadow:0 0 0 3px rgba(29,78,216,.1); }
.fc:disabled { opacity:.55; cursor:not-allowed; }
select.fc option { background:var(--bg2); }

.fp-btn {
  width:100%; padding:12px; border-radius:10px;
  border:2px dashed var(--border2); background:transparent;
  color:var(--text2); font-size:13.5px; cursor:pointer;
  transition:all .2s; display:flex; align-items:center;
  justify-content:center; gap:8px; margin-bottom:14px;
}
.fp-btn:hover { border-color:var(--accent); color:var(--accent); background:rgba(59,130,246,.05); }

.auth-divider {
  display:flex; align-items:center; gap:10px;
  color:var(--text3); font-size:12px; margin:14px 0;
}
.auth-divider::before,.auth-divider::after {
  content:''; flex:1; height:1px; background:var(--border);
}
.auth-switch { text-align:center; margin-top:18px; color:var(--text2); font-size:13px; }
.auth-switch span { color:var(--accent); cursor:pointer; font-weight:700; }
.auth-switch span:hover { text-decoration:underline; }

/* =========================================
   BUTTONS
   ========================================= */
.btn {
  display:inline-flex; align-items:center; justify-content:center;
  gap:6px; padding:10px 18px; border-radius:10px;
  border:none; font-size:13.5px; font-weight:700;
  cursor:pointer; transition:all .18s; white-space:nowrap;
}
.btn-p {
  background:var(--accent);
  color:#fff; box-shadow:0 4px 14px rgba(34,197,94,.25);
}
[data-theme="light"] .btn-p {
  box-shadow:0 4px 14px rgba(29,78,216,.2);
}
.btn-p:hover { transform:translateY(-1px); filter:brightness(1.1); box-shadow:0 6px 20px rgba(34,197,94,.35); }
[data-theme="light"] .btn-p:hover { box-shadow:0 6px 20px rgba(29,78,216,.3); }
.btn-sec { background:var(--bg3); color:var(--text); border:1px solid var(--border); }
.btn-sec:hover { background:var(--card2); border-color:var(--border2); }
.btn-ok  { background:linear-gradient(135deg,#059669,#047857); color:#fff; }
.btn-ok:hover  { box-shadow:0 4px 14px rgba(16,185,129,.35); }
.btn-del { background:linear-gradient(135deg,#dc2626,#b91c1c); color:#fff; }
.btn-del:hover { box-shadow:0 4px 14px rgba(239,68,68,.35); }
.btn-warn{ background:linear-gradient(135deg,#d97706,#b45309); color:#fff; }
.btn-warn:hover{ box-shadow:0 4px 14px rgba(245,158,11,.35); }
.btn-ghost{ background:transparent; color:var(--text2); border:1px solid var(--border); }
.btn-ghost:hover{ background:var(--bg3); color:var(--text); }
.btn-full { width:100%; }
.btn-lg { padding:13px 22px; font-size:15px; border-radius:12px; }
.btn-sm { padding:7px 13px; font-size:12px; border-radius:8px; gap:4px; }
.btn-xs { padding:5px 10px; font-size:11.5px; border-radius:7px; gap:3px; }
.row2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.row2 .fg { margin:0; }

/* =========================================
   APP LAYOUT
   ========================================= */
.app { display:flex; min-height:100vh; }

/* SIDEBAR */
.sidebar {
  width:var(--sidebar); background:var(--bg2);
  border-right:1px solid var(--border);
  display:flex; flex-direction:column;
  position:fixed; top:0; left:0; bottom:0; z-index:200;
  overflow-y:auto; overflow-x:hidden;
  transition:transform .3s cubic-bezier(.4,0,.2,1);
}
.sb-head { padding:20px 16px 14px; }
.sb-brand { display:flex; align-items:center; gap:10px; margin-bottom:3px; }
.sb-icon {
  width:38px; height:38px; border-radius:11px;
  background:var(--accent);
  display:flex; align-items:center; justify-content:center;
  font-size:18px; box-shadow:0 4px 12px rgba(34,197,94,.3); flex-shrink:0;
}
[data-theme="light"] .sb-icon { box-shadow:0 4px 12px rgba(29,78,216,.25); }
.sb-brand h2 { font-size:18px; font-weight:800; }
.sb-role {
  font-size:10.5px; color:var(--text3); font-weight:700;
  text-transform:uppercase; letter-spacing:.9px; padding-left:48px;
}
.sb-user {
  margin:10px 12px 4px; padding:11px 12px; border-radius:11px;
  background:var(--bg3); border:1px solid var(--border);
  display:flex; align-items:center; gap:10px;
}
.sb-av {
  width:36px; height:36px; border-radius:9px; flex-shrink:0;
  background:linear-gradient(135deg, var(--accent), var(--accent2));
  display:flex; align-items:center; justify-content:center;
  font-weight:800; font-size:14px; color:#fff; overflow:hidden;
}
.sb-av img { width:100%; height:100%; object-fit:cover; }
.sb-uname { font-weight:700; font-size:13px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.sb-uemail { font-size:11px; color:var(--text3); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.sb-nav { padding:8px 10px; flex:1; }
.nav-sec { font-size:10px; color:var(--text3); font-weight:800; text-transform:uppercase; letter-spacing:1.1px; padding:10px 10px 5px; }
.nav-item {
  display:flex; align-items:center; gap:10px;
  padding:10px 12px; border-radius:10px; cursor:pointer;
  color:var(--text2); font-size:13.5px; font-weight:600;
  transition:all .18s; margin-bottom:1px; position:relative; user-select:none;
}
.nav-item:hover { background:var(--bg3); color:var(--text); }
.nav-item.active {
  background:rgba(34,197,94,.1);
  color:var(--accent);
}
[data-theme="light"] .nav-item.active { background:rgba(29,78,216,.08); }
.nav-item.active::before {
  content:''; position:absolute; left:0; top:22%; bottom:22%;
  width:3px; border-radius:3px; background:var(--accent);
}
.ni-ic { font-size:16px; width:22px; text-align:center; flex-shrink:0; }
.nav-badge {
  background:var(--danger); color:#fff; font-size:10px;
  padding:1px 6px; border-radius:20px; font-weight:800; margin-left:auto;
}
.sb-foot { padding:12px; border-top:1px solid var(--border); }
.sb-action {
  display:flex; align-items:center; gap:9px; padding:10px 12px;
  border-radius:10px; cursor:pointer; font-size:13px; font-weight:600;
  transition:all .18s; color:var(--text2);
}
.sb-action:hover { background:var(--bg3); color:var(--text); }
.sb-logout { color:var(--danger); }
.sb-logout:hover { background:rgba(239,68,68,.08); color:var(--danger); }

/* MAIN */
.main { margin-left:var(--sidebar); flex:1; display:flex; flex-direction:column; min-height:100vh; }

/* TOPBAR */
.topbar {
  background:var(--bg2); border-bottom:1px solid var(--border);
  padding:13px 22px; display:flex; align-items:center;
  justify-content:space-between; position:sticky; top:0; z-index:100;
}
.tb-left { display:flex; align-items:center; gap:13px; }
.tb-title { font-size:18px; font-weight:800; letter-spacing:-.3px; }
.tb-right { display:flex; align-items:center; gap:8px; }
.tb-btn {
  width:36px; height:36px; border-radius:9px; background:var(--bg3);
  border:1px solid var(--border); color:var(--text);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; font-size:15px; transition:all .18s; position:relative;
}
.tb-btn:hover { background:var(--card2); border-color:var(--border2); }
.tb-dot {
  position:absolute; top:7px; right:7px; width:7px; height:7px;
  background:var(--danger); border-radius:50%; border:1.5px solid var(--bg2);
}
.hamburger { display:none; }

/* PAGE */
.pw { padding:22px; flex:1; }

/* =========================================
   GRID & CARDS
   ========================================= */
.g1{display:grid;gap:14px;}
.g2{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}

.card {
  background:var(--card); border:1px solid var(--border);
  border-radius:var(--r); padding:18px;
  transition:border-color .2s;
}
.card:hover { border-color:var(--border2); }
.card-p24 { padding:24px; }

/* STAT CARD */
.stat {
  display:flex; align-items:center; gap:15px;
  background:var(--card); border:1px solid var(--border);
  border-radius:var(--r); padding:18px;
}
.stat-ic {
  width:50px; height:50px; border-radius:13px;
  display:flex; align-items:center; justify-content:center;
  font-size:22px; flex-shrink:0;
}
.ic-blue   { background:rgba(59,130,246,.12); }
.ic-purple { background:rgba(109,40,217,.12); }
.ic-green  { background:rgba(16,185,129,.12); }
.ic-yellow { background:rgba(245,158,11,.12); }
.ic-pink   { background:rgba(236,72,153,.12); }
.ic-cyan   { background:rgba(6,182,212,.12); }
.ic-red    { background:rgba(239,68,68,.12);  }
.stat-val { font-size:28px; font-weight:800; line-height:1; }
.stat-lbl { font-size:12px; color:var(--text2); margin-top:4px; font-weight:500; }

/* SECTION TITLE */
.sec-t {
  font-size:15px; font-weight:800; margin-bottom:14px;
  display:flex; align-items:center; gap:7px; color:var(--text);
}
.sec-t-sm { font-size:13px; font-weight:700; margin-bottom:10px; display:flex; align-items:center; gap:6px; }

/* =========================================
   BREADCRUMB
   ========================================= */
.bc {
  display:flex; align-items:center; gap:6px; flex-wrap:wrap;
  font-size:12.5px; color:var(--text3); margin-bottom:14px;
}
.bc-a { cursor:pointer; transition:color .15s; }
.bc-a:hover { color:var(--accent); }
.bc-sep { color:var(--border2); }
.bc-cur { color:var(--text); font-weight:700; }

/* =========================================
   TABLE
   ========================================= */
.tw { overflow-x:auto; }
table { width:100%; border-collapse:collapse; font-size:13.5px; }
th {
  text-align:left; padding:10px 13px; color:var(--text3);
  font-size:10.5px; text-transform:uppercase; letter-spacing:.7px; font-weight:800;
  border-bottom:1px solid var(--border); background:var(--bg3);
}
td { padding:13px 13px; border-bottom:1px solid var(--border); vertical-align:middle; }
tr:last-child td { border-bottom:none; }
tbody tr { transition:background .12s; }
tbody tr:hover td { background:rgba(59,130,246,.04); }

/* =========================================
   BADGES
   ========================================= */
.badge {
  display:inline-flex; align-items:center; gap:4px;
  padding:3px 9px; border-radius:20px; font-size:11.5px; font-weight:700;
}
.b-ok     { background:rgba(16,185,129,.12); color:var(--success); }
.b-warn   { background:rgba(245,158,11,.12);  color:var(--warning); }
.b-del    { background:rgba(239,68,68,.12);   color:var(--danger);  }
.b-blue   { background:rgba(59,130,246,.12);  color:var(--accent);  }
.b-purple { background:rgba(109,40,217,.12);  color:#a78bfa;        }
.b-cyan   { background:rgba(6,182,212,.12);   color:var(--accent3); }
.b-pink   { background:rgba(236,72,153,.12);  color:var(--pink);    }

/* =========================================
   MODAL
   ========================================= */
.modal-ov {
  position:fixed; inset:0; background:rgba(0,0,0,.72);
  backdrop-filter:blur(8px); z-index:500;
  display:none; align-items:center; justify-content:center; padding:20px;
  animation:fadeIn .2s ease;
}
.modal-ov.show { display:flex; }
.modal {
  background:var(--card); border:1px solid var(--border2);
  border-radius:20px; padding:26px; width:100%; max-width:490px;
  animation:slideUp .28s cubic-bezier(.22,.68,0,1.2);
  max-height:90vh; overflow-y:auto;
}
.mh { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
.mh h3 { font-size:17px; font-weight:800; }
.mc-btn {
  width:30px; height:30px; border-radius:8px; background:var(--bg3);
  border:none; cursor:pointer; font-size:15px; color:var(--text2);
  display:flex; align-items:center; justify-content:center; transition:all .15s;
}
.mc-btn:hover { background:var(--border); color:var(--text); }
.m-actions { display:flex; gap:10px; margin-top:20px; }
.m-actions .btn { flex:1; }

/* =========================================
   TOAST
   ========================================= */
.toast-ctr {
  position:fixed; bottom:22px; right:22px; z-index:900;
  display:flex; flex-direction:column; gap:7px; pointer-events:none;
}
.toast {
  background:var(--card2); border:1px solid var(--border2);
  border-radius:12px; padding:12px 15px;
  display:flex; align-items:center; gap:9px; font-size:13.5px;
  box-shadow:var(--shadowlg); animation:toastIn .3s ease;
  max-width:310px; pointer-events:all; font-weight:600;
  border-left:3px solid var(--accent);
}
.toast.t-ok  { border-left-color:var(--success); }
.toast.t-err { border-left-color:var(--danger);  }
.toast.t-wrn { border-left-color:var(--warning); }

/* =========================================
   PROGRESS
   ========================================= */
.prog { background:var(--bg3); border-radius:20px; height:6px; overflow:hidden; }
.prog-bar {
  height:100%; border-radius:20px;
  background:var(--accent);
  transition:width .7s ease;
}

/* =========================================
   SEARCH
   ========================================= */
.search-row { position:relative; }
.search-row .si { position:absolute; left:12px; top:50%; transform:translateY(-50%); font-size:14px; color:var(--text3); }
.search-row .fc { padding-left:36px !important; }

/* =========================================
   ITEM ROW
   ========================================= */
.item-row {
  display:flex; align-items:center; gap:13px;
  padding:13px 14px; border:1px solid var(--border);
  border-radius:11px; cursor:pointer; background:var(--card);
  transition:all .2s; margin-bottom:8px;
}
.item-row:hover {
  border-color:var(--accent); transform:translateX(3px);
  background:var(--card2); box-shadow:var(--glow);
}
.item-ic {
  width:44px; height:44px; border-radius:11px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center; font-size:20px;
  overflow:hidden; background:linear-gradient(135deg, rgba(59,130,246,.12), rgba(109,40,217,.1));
}
.item-ic img { width:100%; height:100%; object-fit:cover; border-radius:11px; }
.item-info { flex:1; min-width:0; }
.item-info h4 { font-size:14px; font-weight:700; margin-bottom:2px; }
.item-info p  { font-size:12px; color:var(--text2); }
.item-acts { display:flex; gap:5px; flex-shrink:0; }
.ia { color:var(--text3); font-size:18px; }

/* =========================================
   BATCH CARD
   ========================================= */
.batch-card {
  background:var(--card); border:1px solid var(--border);
  border-radius:var(--r); padding:18px; transition:all .22s;
}
.batch-card:hover {
  border-color:var(--accent); transform:translateY(-3px);
  box-shadow:var(--glow);
}
.bch { display:flex; align-items:flex-start; gap:13px; margin-bottom:13px; }
.b-img {
  width:50px; height:50px; border-radius:13px; flex-shrink:0;
  background:linear-gradient(135deg, var(--accent), var(--accent2));
  display:flex; align-items:center; justify-content:center; font-size:24px; overflow:hidden;
}
.b-img img { width:100%; height:100%; object-fit:cover; }
.b-meta { display:flex; gap:10px; flex-wrap:wrap; margin-top:10px; }
.b-meta span { font-size:11.5px; color:var(--text2); display:flex; align-items:center; gap:3px; }
.b-acts { display:flex; gap:7px; margin-top:12px; }

/* =========================================
   CONTENT ITEM CARD — Redesigned
   ========================================= */
.ci {
  background:var(--card);
  border:1.5px solid var(--border);
  border-radius:16px;
  margin-bottom:12px;
  overflow:hidden;
  transition:all .22s cubic-bezier(.4,0,.2,1);
  position:relative;
}
.ci:hover {
  border-color:var(--accent);
  transform:translateY(-2px);
  box-shadow:0 8px 28px rgba(0,0,0,.12), var(--glow);
}
.ci:active { transform:translateY(0); }

/* Colored top bar per type */
.ci-bar {
  height:4px; width:100%;
}
.ci-bar.notes   { background:linear-gradient(90deg,#3b82f6,#6366f1); }
.ci-bar.lecture { background:linear-gradient(90deg,#f59e0b,#ef4444); }
.ci-bar.dpp     { background:linear-gradient(90deg,#10b981,#06b6d4); }

/* Card body */
.ci-body { padding:14px 15px; }

/* Top row: icon badge + title + teacher actions */
.ci-top-row {
  display:flex; align-items:flex-start; gap:12px;
}

/* Icon badge */
.ci-badge {
  width:48px; height:48px; border-radius:13px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font-size:24px;
}
.ci-badge.notes   { background:rgba(59,130,246,.12);  }
.ci-badge.lecture { background:rgba(245,158,11,.12);  }
.ci-badge.dpp     { background:rgba(16,185,129,.12);  }

/* Title area */
.ci-title-wrap { flex:1; min-width:0; }
.ci-type-tag {
  display:inline-flex; align-items:center; gap:4px;
  font-size:10px; font-weight:800; letter-spacing:.7px;
  text-transform:uppercase; padding:2px 8px; border-radius:20px;
  margin-bottom:5px;
}
.ci-type-tag.notes   { background:rgba(59,130,246,.1);  color:#3b82f6; }
.ci-type-tag.lecture { background:rgba(245,158,11,.1);  color:#f59e0b; }
.ci-type-tag.dpp     { background:rgba(16,185,129,.1);  color:#10b981; }
[data-theme="light"] .ci-type-tag.notes   { background:rgba(29,78,216,.08);  color:var(--accent); }
[data-theme="light"] .ci-type-tag.lecture { background:rgba(217,119,6,.08);  color:#d97706; }
[data-theme="light"] .ci-type-tag.dpp     { background:rgba(5,150,105,.08);  color:#059669; }

.ci-name {
  font-size:14px; font-weight:800; line-height:1.35;
  color:var(--text); word-break:break-word;
}

/* Teacher action buttons (top right) */
.ci-teacher-btns {
  display:flex; gap:5px; flex-shrink:0; margin-left:4px;
}

/* Meta row: date + views */
.ci-meta-row {
  display:flex; align-items:center; gap:8px; flex-wrap:wrap;
  margin-top:8px; padding-top:8px;
  border-top:1px solid var(--border);
}
.ci-meta-item {
  display:inline-flex; align-items:center; gap:4px;
  font-size:11.5px; color:var(--text2); font-weight:500;
}
.ci-views-pill {
  display:inline-flex; align-items:center; gap:4px;
  padding:2px 9px; border-radius:20px; font-size:11px; font-weight:700;
  background:var(--bg3); border:1px solid var(--border2); color:var(--text2);
  margin-left:auto;
}

/* Action buttons row */
.ci-actions {
  display:flex; gap:8px; flex-wrap:wrap; margin-top:11px;
}
.ci-actions .btn { flex:1; min-width:90px; font-size:13px; }

/* Download link pills (student multi-link) */
.ci-dl-pills { display:flex; gap:6px; flex-wrap:wrap; margin-top:9px; }
.ci-dl-pill {
  display:inline-flex; align-items:center; gap:4px;
  padding:5px 12px; border-radius:20px; font-size:12px; font-weight:700;
  background:rgba(16,185,129,.08); color:var(--success);
  border:1.5px solid rgba(16,185,129,.2); text-decoration:none;
  transition:background .15s; cursor:pointer; font-family:inherit;
}
.ci-dl-pill:hover { background:rgba(16,185,129,.18); }

/* Legacy compat — hidden */
.ci-icon,.ci-info,.ci-acts { display:none!important; }

/* =========================================
   TABS
   ========================================= */
.tabs {
  display:flex; gap:3px; background:var(--bg3);
  padding:4px; border-radius:12px; margin-bottom:18px;
}
.tab {
  flex:1; padding:8px 10px; text-align:center; border-radius:9px;
  cursor:pointer; font-size:12.5px; font-weight:700;
  color:var(--text2); transition:all .18s;
}
.tab.on { background:var(--card); color:var(--text); box-shadow:0 2px 8px rgba(0,0,0,.25); }

/* =========================================
   ATTENDANCE CALENDAR
   ========================================= */
.att-grid {
  display:grid; grid-template-columns:repeat(7, 1fr); gap:5px;
}
.att-cell {
  aspect-ratio:1; border-radius:8px; display:flex; align-items:center;
  justify-content:center; font-size:12px; font-weight:600;
  background:var(--bg3); color:var(--text3);
}
.att-cell.present { background:rgba(16,185,129,.15); color:var(--success); }
.att-cell.today   { border:2px solid var(--accent); color:var(--accent); }
.att-cell.hdr     { background:transparent; font-size:10.5px; font-weight:800; color:var(--text3); }

/* =========================================
   STUDY TIMER
   ========================================= */
.timer-display {
  font-size:64px; font-weight:800; text-align:center;
  font-family:'JetBrains Mono', monospace; letter-spacing:3px;
  color:var(--accent);
  padding:24px 0;
}

/* =========================================
   PROFILE
   ========================================= */
.profile-photo {
  width:96px; height:96px; border-radius:50%;
  background:linear-gradient(135deg, var(--accent), var(--accent2));
  display:flex; align-items:center; justify-content:center;
  font-size:38px; color:#fff; overflow:hidden;
  cursor:pointer; position:relative; border:3px solid var(--border2);
  transition:border-color .2s; flex-shrink:0;
}
.profile-photo:hover { border-color:var(--accent); }
.profile-photo img { width:100%; height:100%; object-fit:cover; }
.photo-ov {
  position:absolute; inset:0; background:rgba(0,0,0,.52);
  display:flex; align-items:center; justify-content:center;
  font-size:24px; opacity:0; transition:opacity .2s;
}
.profile-photo:hover .photo-ov { opacity:1; }

/* =========================================
   WAITING PAGE
   ========================================= */
.wait-page {
  min-height:100vh; display:flex; align-items:center; justify-content:center;
  padding:20px; background:var(--bg);
}
.wait-card {
  text-align:center; padding:52px 38px;
  background:var(--card); border:1px solid var(--border);
  border-radius:24px; max-width:400px; width:100%;
  box-shadow:var(--shadowlg); animation:slideUp .45s ease;
}
.wait-icon { font-size:80px; display:block; margin-bottom:20px; animation:pulse 2.5s ease infinite; }

/* =========================================
   CHART
   ========================================= */
.bar-chart { display:flex; align-items:flex-end; gap:7px; height:110px; padding-top:20px; }
.bar-w { flex:1; display:flex; flex-direction:column; align-items:center; gap:5px; }
.bar {
  width:100%; border-radius:6px 6px 0 0; min-height:4px;
  background:var(--accent);
  transition:height .6s ease; position:relative; cursor:default;
}
.bar::after {
  content:attr(data-v); position:absolute; top:-18px; left:50%;
  transform:translateX(-50%); font-size:10px; color:var(--text2);
  white-space:nowrap; opacity:0; transition:opacity .15s;
}
.bar:hover::after { opacity:1; }
.bar-lbl { font-size:10px; color:var(--text3); font-weight:600; }

/* =========================================
   CHAT v2 — WhatsApp-Style
   ========================================= */
.chat-wrap {
  display:flex; border:1px solid var(--border); border-radius:16px;
  overflow:hidden; background:var(--card);
  height:calc(100dvh - 138px); min-height:480px;
}

/* LEFT panel — contact list */
.chat-left {
  width:290px; flex-shrink:0; border-right:1px solid var(--border);
  display:flex; flex-direction:column; background:var(--bg2);
  transition:transform .25s cubic-bezier(.4,0,.2,1);
}
.chat-left-head { padding:14px 13px 10px; border-bottom:1px solid var(--border); flex-shrink:0; }
.chat-left-title { font-size:15px; font-weight:800; margin-bottom:9px; }
.chat-search-wrap { position:relative; }
.chat-search-ic  { position:absolute; left:11px; top:50%; transform:translateY(-50%); font-size:12px; color:var(--text3); pointer-events:none; }
.chat-search-inp {
  width:100%; background:var(--bg3); border:1.5px solid var(--border);
  border-radius:10px; padding:8px 11px 8px 32px;
  font-size:13px; color:var(--text); outline:none; font-family:inherit;
  transition:border-color .18s;
}
.chat-search-inp:focus { border-color:var(--accent); }
.chat-contacts { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; }

/* Contact row */
.chat-contact {
  display:flex; align-items:center; gap:11px; padding:12px 13px;
  cursor:pointer; border-bottom:1px solid var(--border);
  transition:background .15s; min-height:66px;
}
.chat-contact:hover    { background:var(--bg3); }
.chat-contact.active   { background:rgba(34,197,94,.08); border-left:3px solid var(--accent); }
[data-theme="light"] .chat-contact.active { background:rgba(29,78,216,.06); border-left-color:var(--accent); }
.chat-contact.has-unread { background:rgba(34,197,94,.03); }

/* Avatar with online ring */
.chat-av {
  width:46px; height:46px; border-radius:50%; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font-size:18px; font-weight:800; overflow:hidden; position:relative;
  background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#fff;
}
.chat-av img { width:100%; height:100%; object-fit:cover; }
.online-ring { position:absolute; bottom:1px; right:1px; width:12px; height:12px; border-radius:50%; border:2px solid var(--bg2); }
.online-ring.on  { background:#22c55e; }
.online-ring.off { background:var(--text3); }

/* Contact info */
.chat-ci { flex:1; min-width:0; }
.chat-ci-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:3px; }
.chat-ci-name { font-size:13.5px; font-weight:700; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:150px; }
.chat-ci-time { font-size:10.5px; color:var(--text3); flex-shrink:0; margin-left:4px; }
.chat-ci-preview { font-size:12px; color:var(--text2); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.chat-unread-pill {
  background:var(--accent); color:#fff; font-size:10px; font-weight:800;
  min-width:20px; height:20px; border-radius:10px; padding:0 5px;
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
}

/* RIGHT panel — chat window */
.chat-right { flex:1; min-width:0; display:flex; flex-direction:column; background:var(--bg); }
.chat-right-empty { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; color:var(--text3); gap:10px; font-size:14px; }

/* Chat header */
.chat-hdr { display:flex; align-items:center; gap:10px; padding:11px 15px; border-bottom:1px solid var(--border); background:var(--card); flex-shrink:0; }
.chat-hdr-av { width:40px; height:40px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:16px; font-weight:800; overflow:hidden; background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#fff; }
.chat-hdr-av img { width:100%; height:100%; object-fit:cover; }
.chat-hdr-name { font-size:14px; font-weight:800; line-height:1.2; }
.chat-hdr-status { font-size:11.5px; margin-top:2px; }
.chat-hdr-status.on  { color:#22c55e; }
.chat-hdr-status.off { color:var(--text3); }
.chat-hdr-back { width:36px; height:36px; border-radius:9px; background:var(--bg3); border:none; cursor:pointer; display:none; align-items:center; justify-content:center; font-size:17px; flex-shrink:0; transition:background .15s; }
.chat-hdr-back:hover { background:var(--border2); }

/* Messages area */
.chat-msgs { flex:1; overflow-y:auto; padding:14px 14px 8px; display:flex; flex-direction:column; gap:5px; -webkit-overflow-scrolling:touch; }
.chat-msg { max-width:68%; display:flex; flex-direction:column; }
@keyframes msgPop { from{opacity:0;transform:translateY(6px)scale(.97)}to{opacity:1;transform:translateY(0)scale(1)} }
.chat-msg.new  { animation:msgPop .2s ease; }
.chat-msg.me   { align-self:flex-end; align-items:flex-end; }
.chat-msg.them { align-self:flex-start; align-items:flex-start; }
.chat-bubble { padding:9px 13px; border-radius:18px; font-size:13.5px; line-height:1.55; word-break:break-word; }
.chat-msg.me   .chat-bubble { background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#fff; border-bottom-right-radius:4px; }
.chat-msg.them .chat-bubble { background:var(--card); border:1px solid var(--border); color:var(--text); border-bottom-left-radius:4px; }
.chat-meta { display:flex; align-items:center; gap:3px; margin-top:3px; padding:0 2px; }
.chat-ts   { font-size:10.5px; color:var(--text3); }
/* Tick marks — WhatsApp style */
.tick { font-size:12px; font-weight:800; line-height:1; letter-spacing:-1px; }
.tick.t-sent { color:rgba(255,255,255,0.55); }  /* gray — sent */
.tick.t-read { color:rgba(255,255,255,0.55); }  /* gray — delivered */
.tick.t-seen { color:#60a5fa; }                 /* blue — seen ✓✓ */

/* Input area */
.chat-input-area { padding:10px 12px; border-top:1px solid var(--border); background:var(--card); display:flex; gap:8px; align-items:center; flex-shrink:0; }
.chat-inp { flex:1; background:var(--bg3); border:1.5px solid var(--border); border-radius:22px; padding:10px 16px; color:var(--text); font-size:13.5px; outline:none; transition:border-color .18s; font-family:inherit; }
.chat-inp:focus { border-color:var(--accent); }
.chat-send-btn { width:42px; height:42px; border-radius:50%; background:var(--accent); border:none; color:#fff; font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .18s; flex-shrink:0; }
.chat-send-btn:hover  { transform:scale(1.08); filter:brightness(1.1); }
.chat-send-btn:active { transform:scale(.94); }

/* Mobile overrides */
@media(max-width:768px){
  .chat-wrap { flex-direction:column; height:calc(100dvh - 90px); border-radius:12px; }
  .chat-left  { width:100%; border-right:none; border-bottom:1px solid var(--border); }
  .chat-left.mob-hidden  { display:none; }
  .chat-right.mob-hidden { display:none; }
  .chat-hdr-back { display:flex; }
  .chat-msg { max-width:80%; }
}
@media(max-width:480px){
  .chat-msgs { padding:10px 10px 6px; }
  .chat-input-area { padding:8px 10px; }
  .chat-bubble { font-size:13px; padding:8px 11px; }
}

/* =========================================
   ANNOUNCEMENTS
   ========================================= */
.ann-card {
  background:var(--card); border:1.5px solid var(--border);
  border-radius:14px; overflow:hidden;
  transition:all .22s cubic-bezier(.4,0,.2,1); margin-bottom:14px;
}
.ann-card:hover { border-color:var(--accent); box-shadow:var(--glow); transform:translateY(-2px); }
.ann-img  { width:100%; max-height:220px; object-fit:cover; display:block; }
.ann-body { padding:16px; }
.ann-title { font-size:15px; font-weight:800; margin-bottom:6px; }
.ann-desc  { font-size:13px; color:var(--text2); line-height:1.65; margin-bottom:10px; white-space:pre-wrap; }
.ann-footer { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:6px; }
.ann-meta   { font-size:11.5px; color:var(--text3); display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.ann-batch-tag { display:inline-flex; align-items:center; gap:4px; padding:3px 9px; border-radius:20px; font-size:11px; font-weight:700; background:rgba(34,197,94,.1); color:var(--accent); border:1px solid rgba(34,197,94,.2); }
[data-theme="light"] .ann-batch-tag { background:rgba(29,78,216,.07); color:var(--accent); border-color:rgba(29,78,216,.15); }

/* =========================================
   NOTIFICATIONS
   ========================================= */
.notif {
  display:flex; gap:11px; padding:13px; border:1px solid var(--border);
  border-radius:11px; margin-bottom:8px; background:var(--card2); transition:all .18s;
}
.notif.unread { border-left:3px solid var(--accent); background:rgba(59,130,246,.04); }
.notif-ic { font-size:22px; flex-shrink:0; }
.notif-t  { font-size:13px; font-weight:700; margin-bottom:3px; }
.notif-m  { font-size:12px; color:var(--text2); margin-bottom:4px; }
.notif-tm { font-size:11px; color:var(--text3); }

/* PUSH NOTIFICATION PROMPT */
.push-prompt {
  display:flex; align-items:center; gap:12px;
  padding:13px 15px; border-radius:13px; margin-bottom:12px;
  background:linear-gradient(135deg,rgba(34,197,94,.1),rgba(16,185,129,.07));
  border:1.5px solid rgba(34,197,94,.25); cursor:pointer; transition:all .2s;
}
[data-theme="light"] .push-prompt {
  background:linear-gradient(135deg,rgba(29,78,216,.07),rgba(99,102,241,.05));
  border-color:rgba(29,78,216,.2);
}
.push-prompt:hover { transform:translateY(-1px); box-shadow:var(--glow); }
.push-ic { font-size:28px; flex-shrink:0; }
.push-text { flex:1; min-width:0; }
.push-text strong { font-size:13.5px; font-weight:800; display:block; margin-bottom:3px; }
.push-text span   { font-size:12px; color:var(--text2); }

/* EMPTY */
.empty { text-align:center; padding:38px 16px; }
.empty-ic { font-size:46px; display:block; margin-bottom:11px; opacity:.65; }
.empty p  { color:var(--text2); font-size:13px; line-height:1.55; }
.empty a  { color:var(--accent); cursor:pointer; }

/* SIDEBAR OVERLAY */
.sb-ov { display:none; position:fixed; inset:0; background:rgba(0,0,0,.52); z-index:150; }

/* =========================================
   ANIMATIONS
   ========================================= */
@keyframes slideUp  { from{transform:translateY(22px);opacity:0}to{transform:translateY(0);opacity:1} }
@keyframes fadeIn   { from{opacity:0}to{opacity:1} }
@keyframes toastIn  { from{transform:translateX(36px);opacity:0}to{transform:translateX(0);opacity:1} }
@keyframes pulse    { 0%,100%{transform:scale(1)}50%{transform:scale(1.07)} }
@keyframes spin     { from{transform:rotate(0)}to{transform:rotate(360deg)} }
@keyframes blink    { 0%,100%{opacity:1}50%{opacity:.4} }
@keyframes shimmer  {
  0%{background-position:-200% 0}100%{background-position:200% 0}
}

/* =========================================
   RESPONSIVE
   ========================================= */
@media(max-width:920px){ .g4{grid-template-columns:repeat(2,1fr);} }
@media(max-width:768px){
  :root{ --sidebar:260px; }
  .sidebar{ transform:translateX(-100%); }
  .sidebar.open{ transform:translateX(0); }
  .sb-ov.show{ display:block; }
  .main{ margin-left:0 !important; }
  .hamburger{ display:flex; }
  .g2,.g3,.g4{ grid-template-columns:1fr; }
  .pw{ padding:14px; }
  .topbar{ padding:11px 14px; }
  .timer-display{ font-size:48px; }
}
@media(max-width:480px){
  .auth-card{ padding:26px 18px; }
  .ci-acts{ flex-wrap:wrap; }
  .m-actions{ flex-direction:column; }
}

/* ── Loading Spinner ── */
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:60px auto;}
.page-loading{display:flex;flex-direction:column;align-items:center;gap:14px;padding:60px 20px;color:var(--text2);font-size:13px;}
/* ── Upload Progress ── */
.upload-bar{background:var(--bg3);border-radius:20px;height:8px;overflow:hidden;margin-top:8px;}
.upload-fill{height:100%;border-radius:20px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .3s;}
/* ── Realtime dot ── */
.rt-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--success);animation:pulse 2s ease infinite;margin-right:4px;}
.rt-dot.off{background:var(--danger);animation:none;}
/* ── SQL box ── */
.sql-box{background:var(--bg);border:1px solid var(--border2);border-radius:10px;padding:14px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--accent3);max-height:300px;overflow-y:auto;white-space:pre;line-height:1.6;tab-size:2;}
/* ── Upload tabs ── */
.upload-tabs{display:flex;gap:3px;background:var(--bg3);padding:3px;border-radius:9px;margin-bottom:12px;}
.upload-tab{flex:1;padding:7px;text-align:center;border-radius:7px;cursor:pointer;font-size:12px;font-weight:700;color:var(--text2);transition:all .18s;}
.upload-tab.on{background:var(--card);color:var(--text);}
.dropzone{border:2px dashed var(--border2);border-radius:11px;padding:26px;text-align:center;cursor:pointer;transition:all .2s;color:var(--text2);font-size:13px;}
.dropzone:hover,.dropzone.drag{border-color:var(--accent);background:rgba(59,130,246,.05);color:var(--accent);}
.dropzone input{display:none;}

/* ── Passkey / WebAuthn ── */
.pk-btn {
  width:100%; padding:14px; border-radius:12px;
  border:1.5px solid var(--accent); cursor:pointer; font-size:14px; font-weight:700;
  font-family:inherit; transition:all .22s;
  display:flex; align-items:center; justify-content:center; gap:10px;
  background:rgba(34,197,94,.07);
  color:var(--accent);
  box-shadow:0 2px 12px rgba(34,197,94,.1);
}

function fmtT(ts){ return new Date(ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}); }
function esc(s)  { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtSec(s){ const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),ss=s%60; return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}`; }
function lsGet(k)  { try{ return JSON.parse(localStorage.getItem(k)); }catch{ return null; } }

function getDLIcon(label){

  if(l.includes('onedrive')) return '<i class="fas fa-cloud"></i>';
  if(l.includes('telegram')) return '<i class="fas fa-paper-plane"></i>';
  if(l.includes('mega'))     return '<i class="fas fa-gem"></i>';
  if(l.includes('mediafire'))return '<i class="fas fa-fire"></i>';
  return '<i class="fas fa-link"></i>';
}
function getYTEmbed(url){
  const m=url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/))([a-zA-Z0-9_-]{11})/);

  el.className=`toast t-${type==='success'?'ok':type==='error'?'err':type==='warning'?'wrn':''}`;

/* =====================================================
   PUSH NOTIFICATIONS (Browser Web Push API)
===================================================== */
function pushSupported(){
  return 'Notification' in window && 'serviceWorker' in navigator;
}
function pushGranted(){
  return pushSupported() && Notification.permission==='granted';
}

async function requestPushPermission(){
  if(!pushSupported()){ toast('Push notifications not supported on this browser','warning'); return; }
  if(Notification.permission==='granted'){ toast('Push notifications already enabled ✔','success'); return; }
  if(Notification.permission==='denied'){ toast('Push blocked — please enable in browser settings','error'); return; }
  const perm = await Notification.requestPermission();
  if(perm==='granted'){
    lsSet('fs_push_enabled',true);
    toast('Push notifications enabled!','success');
    // Re-render to hide prompt
    const pw=document.getElementById('pw');
    if(pw&&S.sub==='notifications') render();
  } else {
    toast('Permission denied — notifications disabled','warning');
  }
}

function sendPushNotif(title, body, icon){
  if(!pushGranted()) return;
  // Only show if page is hidden (user is on another tab/app)
  if(document.visibilityState==='visible') return;
  try {
    const n = new Notification(title, {
      body: body||'',
      icon: icon||'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/main/index.js',
      badge: '',
      tag: 'freestudy-'+Date.now(),
      requireInteraction: false,
      silent: false,
    });
    n.onclick = () => { window.focus(); n.close(); };
    setTimeout(()=>n.close(), 6000);
  } catch(e){ console.warn('Push notif failed:', e); }
}

}

  const {data,error}=await sb.storage.from(BUCKET).upload(path,file,{cacheControl:'3600',upsert:false});

  if(pw.length<6){toast('Password must be 6+ characters','warning');return;}
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){toast('Invalid email','warning');return;}
  if(email===ADMIN_EMAIL){toast('Email not available','error');return;}

  // Check if this email has been blocked by admin
  const {data:blocked}=await sb.from('blocked_emails').select('email').eq('email',email.toLowerCase()).single();
  if(blocked){ toast('This email has been removed from the platform. Please use a different email.','error'); return; }

  const btn=document.getElementById('signupBtn');
  if(btn){btn.disabled=true;btn.textContent='Creating account…';}
  try {
    const {data,error}=await sb.auth.signUp({email,password:pw});
    if(error) throw error;
    const userId=data.user.id;
    const {error:pe}=await sb.from('profiles').insert({id:userId,name,phone,email,role,approved:false,photo:'',created_at:now()});
    if(pe) throw pe;
    await addLog(`New ${role} registered: ${name}`);
    // Try immediate login (succeeds when email confirmation is DISABLED)
    const {data:sess,error:le}=await sb.auth.signInWithPassword({email,password:pw});
    if(!le&&sess&&sess.user){
      const {data:profile}=await sb.from('profiles').select('*').eq('id',sess.user.id).single();
      if(profile){
        S.user=profile;
        S.page=profile.role==='teacher'?(profile.approved?'teacher':'waiting'):'student';
        S.sub='dashboard'; setupRealtime();
        toast('Welcome, '+name+'! Account created successfully!','success');
        render(); return;
      }
    }
    // Email confirmation required — show confirmation pending page
    S._confirmEmail=email; S.page='confirm'; render();
  } catch(err){
    toast(err.message||'Signup failed','error');
    if(btn){btn.disabled=false;btn.innerHTML='<i class="fas fa-user-plus"></i> Create Account';}
  }
}

/* =====================================================
   PASSKEY / WebAuthn IMPLEMENTATION
   Uses real device biometrics (Face ID, Touch ID,
   Windows Hello, Android fingerprint, etc.)
===================================================== */

/* ─── BUG FIX 1: Safe b64url — no spread operator (avoids stack overflow on large buffers) ─── */
function b64url(buf){
  const bytes = new Uint8Array(buf);
  let str = '';
  for(let i=0;i<bytes.length;i++) str += String.fromCharCode(bytes[i]);
  return btoa(str).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}

/* ─── BUG FIX 2: Safe fromB64url — wrapped in try/catch ─── */
function fromB64url(str){
  try {
    str = str.replace(/-/g,'+').replace(/_/g,'/');
    while(str.length % 4) str += '=';
    return Uint8Array.from(atob(str), c => c.charCodeAt(0)).buffer;
  } catch(e) {
    throw new Error('Invalid credential ID format. Please re-register your passkey.');
  }
}

/* ─── BUG FIX 3: rpId handles file:// and empty hostname ─── */
function rpId(){
  const h = location.hostname;
  if(!h || h === '') return 'localhost';  // file:// protocol fix
  return h === 'localhost' ? 'localhost' : h;
}

/* ─── Check if WebAuthn is available ─── */
function webAuthnAvailable(){
  return !!(window.PublicKeyCredential && navigator.credentials && location.protocol !== 'file:');
}

/* ─── REGISTER passkey ─── */
async function registerPasskey(){
  if(!webAuthnAvailable()){
    toast('Biometric login requires HTTPS or localhost — not supported here','error'); return;
  }
  if(!S.user || S.user.role==='admin'){
    toast('Please login first','warning'); return;
  }

  openModal(`
    <div class="mh"><h3><i class="fas fa-fingerprint"></i> Register Passkey</h3><button class="mc-btn" onclick="closeModal()">✕</button></div>
    <div class="pk-scanning">
      <div class="pk-fingerprint-anim"><i class="fas fa-fingerprint"></i></div>
      <div style="font-weight:700;font-size:16px">Waiting for biometric…</div>
      <div style="font-size:13px;color:var(--text2)">Use fingerprint, Face ID, or<br>device PIN when prompted</div>
    </div>`);

  try {
    const challenge = crypto.getRandomValues(new Uint8Array(32)); // BUG FIX 4: 32 bytes (more secure than 16)
    const userIdBuf = new TextEncoder().encode(S.user.id);

    const cred = await navigator.credentials.create({ publicKey:{
      challenge,
      rp:{ id:rpId(), name:'FreeStudy' },
      user:{ id:userIdBuf, name:S.user.email, displayName:S.user.name },
      pubKeyCredParams:[
        {type:'public-key', alg:-7},    // ES256
        {type:'public-key', alg:-257},  // RS256
      ],
      authenticatorSelection:{
        authenticatorAttachment:'platform',
        userVerification:'required',
        residentKey:'preferred',
      },
      timeout:60000,
      attestation:'none',
    }});

    // BUG FIX 5: null check on cred
    if(!cred) throw new Error('No credential returned by device. Please try again.');

    const credId = b64url(cred.rawId);

    // BUG FIX 6: onConflict:'id' (not 'user_id' — user_id has no UNIQUE constraint)
    const {error} = await sb.from('passkeys').upsert({
      id:           S.user.id,           // user.id is a valid UUID — use directly, one passkey per user
      user_id:      S.user.id,
      credential_id: credId,
      public_key:   b64url(cred.response.clientDataJSON),
    }, { onConflict: 'id' });
    if(error) throw new Error('Could not save passkey: ' + error.message);

    // Update local cache
    const stored = lsGet('fs_passkeys') || {};
    stored[S.user.id] = credId;
    lsSet('fs_passkeys', stored);

    closeModal();
    toast('Passkey registered! You can now login with biometrics','success');
    render();

  } catch(err){
    closeModal();
    if(err.name === 'NotAllowedError')       toast('Cancelled or timed out — please try again','warning');
    else if(err.name === 'InvalidStateError') toast('A passkey is already registered. Use Re-register instead.','warning');
    else if(err.name === 'NotSupportedError') toast('This device does not support biometric passkeys','error');
    else                                      toast('Registration failed: ' + err.message, 'error');
  }
}

      </div>

          onkeydown="if(event.key==='Enter')passkeyLoginStep2()">

        <button class="btn btn-p" id="pkContinueBtn" onclick="passkeyLoginStep2()">

        </button>
      </div>
    </div>`);

  setTimeout(() => { document.getElementById('pkEmailInput')?.focus(); }, 100);

/* ─── LOGIN with passkey — Step 2: Email verify → Biometric → DB confirm ─── */
async function passkeyLoginStep2(){
  const emailInput = document.getElementById('pkEmailInput');
  const email = (emailInput?.value || '').trim().toLowerCase();
  if(!email){ toast('Please enter your email','warning'); return; }

  const btn = document.getElementById('pkContinueBtn');
  if(btn){ btn.disabled=true; btn.innerHTML='<i class="fas fa-search"></i> Looking up…'; }

  try {
    // ── Step A: Find profile by email (profiles table is readable by anon) ──
    const {data:profiles, error:profErr} = await sb.from('profiles')
      .select('*').ilike('email', email).limit(1);

    const profile = profiles?.[0];
    if(profErr || !profile){
      toast('No account found with this email','error');
      if(btn){ btn.disabled=false; btn.innerHTML='<i class="fas fa-fingerprint"></i> Continue with Passkey'; }
      return;
    }

    // ── Step B: Build allowCredentials from localStorage cache (no DB query needed) ──
    // This avoids RLS blocking on passkeys table for anon users
    const stored   = lsGet('fs_passkeys') || {};
    const cachedId = stored[profile.id];   // credentialId stored at registration time

    let allowCredentials = undefined;  // undefined = discovery mode (browser shows any passkey)
    if(cachedId){
      try {
        allowCredentials = [{
          id:         fromB64url(cachedId),
          type:       'public-key',
          transports: ['internal', 'hybrid'],
        }];
      } catch(_){ allowCredentials = undefined; } // if corrupted, fall back to discovery
    }

    // ── Step C: Show biometric modal ──
    openModal(`
      <div class="mh">
        <h3><i class="fas fa-fingerprint"></i> Verifying Identity</h3>
        <button class="mc-btn" onclick="closeModal()">✕</button>
      </div>
      <div class="pk-scanning">
        <div class="pk-fingerprint-anim"><i class="fas fa-fingerprint"></i></div>
        <div style="font-weight:700;font-size:16px">Scan your biometric</div>
        <div style="font-size:13px;color:var(--text2);margin-top:6px">
          Logging in as <strong style="color:var(--accent)">${esc(profile.name)}</strong><br>
          Use the fingerprint / Face ID you registered
        </div>
      </div>`);

    // ── Step D: Trigger device biometric ──
    const challenge = crypto.getRandomValues(new Uint8Array(32));
    const assertion = await navigator.credentials.get({ publicKey:{
      challenge,
      rpId:             rpId(),
      userVerification: 'required',
      allowCredentials,      // from cache OR undefined (discovery mode)
      timeout:          60000,
    }});

    if(!assertion) throw new Error('No response from biometric sensor. Please try again.');

    const returnedCredId = b64url(assertion.rawId);

    // ── Step E: Verify credential belongs to this user ──
    // First try localStorage (works even if anon RLS blocks DB)
    let verified = false;

    if(cachedId && returnedCredId === cachedId){
      // <i class="fas fa-user-check"></i> LocalStorage match — credential confirmed
      verified = true;
    } else {
      // No local cache or different device — verify via Supabase
      const {data:pks} = await sb.from('passkeys')
        .select('credential_id')
        .eq('user_id', profile.id)
        .eq('credential_id', returnedCredId)
        .limit(1);

      if(pks && pks.length > 0) verified = true;
    }

    if(!verified){
      throw new Error('This passkey does not belong to the entered email account.');
    }

    // ── Step F: Update local cache with latest credId ──
    stored[profile.id] = returnedCredId;
    lsSet('fs_passkeys', stored);

    // ── Step G: Login ──
    closeModal();
    S.user = profile;
    S.page = profile.role==='teacher' ? (profile.approved ? 'teacher' : 'waiting') : 'student';
    S.sub  = 'dashboard';
    setupRealtime();
    await addLog(`${profile.role} "${profile.name}" logged in via passkey`);
    toast('Welcome back, ' + profile.name,'success');
    render();

  } catch(err){
    closeModal();
    if(err.name === 'NotAllowedError')    toast('Biometric cancelled or timed out','warning');
    else if(err.name === 'SecurityError') toast('Security error — make sure you are on the correct URL','error');
    else                                  toast(err.message || 'Passkey login failed','error');
  }
}

}

/* =====================================================
   REAL-TIME SUBSCRIPTIONS
===================================================== */
function setupRealtime(){
  if(!S.user||S.user.role==='admin') return;
  teardownRealtime();

  // 1. New messages to me
  const msgCh=sb.channel('rt-msgs-'+S.user.id)
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'messages',filter:`receiver_id=eq.${S.user.id}`},
      async(payload)=>{
        S.unreadMsgs++;
        updateBadges();
        const m=payload.new;
        toast(`<i class="fas fa-comments"></i> New message from ${m.sender_id==='admin'?'Admin':'someone'}`,'info');
        sendPushNotif('New Message', (m.message_text||'').slice(0,80));
        if(S.sub==='chat'&&S.chatWith===m.sender_id){
          // Chat is open — append and mark seen immediately
          appendChatMsg(m);
          await markMsgsSeen(m.sender_id);
          if(S.unreadMsgs>0){ S.unreadMsgs=Math.max(0,S.unreadMsgs-1); updateBadges(); }
          const pill=document.querySelector(`.chat-contact[data-pid="${m.sender_id}"] .chat-unread-pill`);
          if(pill) pill.remove();
          const row=document.querySelector(`.chat-contact[data-pid="${m.sender_id}"]`);
          if(row) row.classList.remove('has-unread');
        } else if(S.sub==='chat'){
          // Different chat open — update unread pill on contact row
          const row=document.querySelector(`.chat-contact[data-pid="${m.sender_id}"]`);
          if(row){
            row.classList.add('has-unread');
            let pill=row.querySelector('.chat-unread-pill');
            if(!pill){ pill=document.createElement('div'); pill.className='chat-unread-pill'; row.appendChild(pill); }
            pill.textContent=parseInt(pill.textContent||'0')+1;
          }
          // Also update preview text
          const prev=document.querySelector(`.chat-contact[data-pid="${m.sender_id}"] .chat-ci-preview`);
          if(prev) prev.textContent=(m.message_text||m.text||'').slice(0,42);
          const time=document.querySelector(`.chat-contact[data-pid="${m.sender_id}"] .chat-ci-time`);
          if(time) time.textContent=fmtT(m.created_at||m.ts);
        }
      })
    .subscribe();

  // 1b. Seen-receipt updates — update tick marks in real-time for sender
  const seenCh=sb.channel('rt-seen-'+S.user.id)
    .on('postgres_changes',{event:'UPDATE',schema:'public',table:'messages',filter:`sender_id=eq.${S.user.id}`},
      (payload)=>{
        const el=document.getElementById(`msg_${payload.new.id}`);
        if(!el) return;
        const tick=el.querySelector('.tick');
        if(!tick) return;
        if(payload.new.seen_at){ tick.className='tick t-seen'; tick.textContent='✓✓'; }
        else if(payload.new.is_read){ tick.className='tick t-read'; tick.textContent='✓✓'; }
      })
    .subscribe();

  // 2. New notifications for me
  const notifCh=sb.channel('rt-notifs-'+S.user.id)
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'notifications',filter:`user_id=eq.${S.user.id}`},
      (payload)=>{
        S.unreadNotifs++;
        updateBadges();
        toast(`<i class="fas fa-bell"></i> ${payload.new.title}`,'info');
        // Also send browser push notification if tab is in background
        sendPushNotif(payload.new.title||'FreeStudy', payload.new.msg||'');
      })
    .subscribe();

  // 3. Content view counts (live update for teachers)
  let contCh=null;
  if(S.user.role==='teacher'){
    contCh=sb.channel('rt-content')
      .on('postgres_changes',{event:'UPDATE',schema:'public',table:'content'},
        (payload)=>{
          // Update view count in DOM if visible
          const el=document.getElementById(`ci_${payload.new.id}`);
          if(el){
            const m=el.querySelector('[data-views]');
            if(m){ const v=payload.new.views||0; m.innerHTML=`<i class="fas fa-eye"></i> ${v} view${v!==1?'s':''}`; }
          }
        })
      .subscribe();
  }

  // 4. Profile presence updates (last_active) — live online/offline dots
  const presenceCh = sb.channel('rt-presence')
    .on('postgres_changes',{event:'UPDATE',schema:'public',table:'profiles'},
      (payload)=>{
        const pid  = payload.new.id;
        const la   = payload.new.last_active||0;
        const online = (Date.now()-la)<35000;  // 5s grace over 30s ping interval

        // Update cached peer last_active so refreshOnlineRings() stays accurate
        const peerIdx=S.chatPeers.findIndex(p=>p.id===pid);
        if(peerIdx>=0) S.chatPeers[peerIdx].last_active=la;

        // Update contact-list ring dot
        const ring = document.querySelector(`.chat-contact[data-pid="${pid}"] .online-ring`);
        if(ring){ ring.className = `online-ring ${online?'on':'off'}`; }

        // Update chat header if this peer's window is open
        if(S.chatWith===pid){
          const hdrStatus = document.querySelector('.chat-hdr-status');
          if(hdrStatus){
            hdrStatus.className = `chat-hdr-status ${online?'on':'off'}`;
            if(online){
              hdrStatus.innerHTML = '<i class="fas fa-circle" style="color:#22c55e"></i> Online';
            } else {
              const diff = Date.now()-la;
              const mins = Math.floor(diff/60000);
              hdrStatus.textContent = mins<1 ? 'last seen just now'
                : mins<60 ? `last seen ${mins}m ago`
                : `last seen ${Math.floor(mins/60)}h ago`;
            }
          }
        }
      })
    .subscribe();

  // 5. Own profile deletion → instant forced logout
  const banCh=sb.channel('rt-ban-'+S.user.id)
    .on('postgres_changes',{event:'DELETE',schema:'public',table:'profiles',filter:`id=eq.${S.user.id}`},
      async()=>{
        // Admin deleted this account — force logout immediately
        teardownRealtime();
        await sb.auth.signOut();
        S.user=null; S.page='login';
        // Show full-screen message
        document.getElementById('app').innerHTML=`
          <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;
                      background:#0a0a0a;padding:24px;font-family:system-ui,sans-serif">
            <div style="text-align:center;max-width:380px">
              <div style="font-size:64px;margin-bottom:20px"><i class="fas fa-ban" style="color:#ef4444;font-size:48px"></i></div>
              <h2 style="color:#fff;font-size:22px;font-weight:800;margin-bottom:12px">Account Removed</h2>
              <p style="color:#a0a0a0;font-size:14px;line-height:1.7;margin-bottom:24px">
                Your account has been permanently removed by the admin.<br><br>
                To continue using FreeStudy, please create a new account with a different email address.
              </p>
              <button onclick="location.reload()" 
                style="background:#22c55e;color:#fff;border:none;padding:13px 28px;
                       border-radius:12px;font-size:15px;font-weight:700;cursor:pointer">
                Go to Sign Up →
              </button>
            </div>
          </div>`;
      })
    .subscribe();

  S.rtChannels=[msgCh,seenCh,notifCh,contCh,presenceCh,banCh].filter(Boolean);
}

function teardownRealtime(){
  S.rtChannels.forEach(ch=>{ try{ sb.removeChannel(ch); }catch{} });
  S.rtChannels=[];
}

function appendChatMsg(m){
  const box=document.getElementById('chatMsgs');
  if(!box) return;
  const uid2=S.user.id;
  const div=document.createElement('div');
  div.className=`chat-msg new ${(m.sender_id||m.from_id)===uid2?'me':'them'}`;
  div.id=`msg_${m.id}`;
  div.innerHTML=`
    <div class="chat-bubble">${esc(m.message_text||m.text||'')}</div>
    <div class="chat-meta">
      <span class="chat-ts">${fmtT(m.created_at||m.ts)}</span>
      ${getMsgTick(m,uid2)}
    </div>`;
  box.appendChild(div); box.scrollTop=box.scrollHeight;
}

async function updateBadges(){
  const un=document.querySelectorAll('.unread-badge');
  const total=S.unreadNotifs+S.unreadMsgs;
  un.forEach(b=>{ b.textContent=total; b.style.display=total>0?'':'none'; });
  // update topbar bell dot
  const dot=document.querySelector('.tb-dot');
  if(dot) dot.style.display=total>0?'':'none';
}

function renderShell(){
  // Re-render just the sidebar/topbar badges without full page reload
  const dot=document.getElementById('rtDot');
  if(dot) dot.className=`rt-dot ${S.rtChannels.length?'':'off'}`;
}

async function render(){
  const app=document.getElementById('app');
  switch(S.page){
    case 'login':   app.innerHTML=renderLogin();   return;
    case 'signup':  app.innerHTML=renderSignup();  return;
    case 'waiting': app.innerHTML=renderWaiting(); return;
    case 'confirm': app.innerHTML=renderConfirm(); return;
  }

  // Determine role vars
  let role='',navItems=[];
  if(S.page==='admin'){role='Admin Panel';navItems=adminNav();}
  else if(S.page==='teacher'){role='Teacher Panel';navItems=teacherNav();}
  else {role='Student Panel';navItems=studentNav();}

  // Refresh badge counts
  if(S.user&&S.user.role!=='admin'){
    S.unreadNotifs=await dbUnreadNotifs(S.user.id);
    S.unreadMsgs=await dbUnreadMsgs(S.user.id);
  }

  app.innerHTML=layout(role,navItems);

  try {
    let html='';
    if(S.page==='admin')        html=await renderAdminPage();
    else if(S.page==='teacher') html=await renderTeacherPage();
    else                        html=await renderStudentPage();
    const pw=document.getElementById('pw');
    if(pw){ pw.innerHTML=html; afterRender(); }
  } catch(err){
    console.error(err);
    const pw=document.getElementById('pw');
    if(pw) pw.innerHTML=`<div class="card card-p24" style="color:var(--danger)">
      <strong>Error loading page:</strong><br><span style="font-size:13px">${esc(err.message)}</span>
      <br><br><button class="btn btn-p btn-sm" onclick="render()"><i class="fas fa-sync"></i> Retry</button>
      <button class="btn btn-ghost btn-sm" onclick="navTo('setup')"><i class="fas fa-database"></i> Check DB Setup</button>
    </div>`;
  }
}

function afterRender(){
  // Scroll chat to bottom
  setTimeout(()=>{ const c=document.getElementById('chatMsgs'); if(c)c.scrollTop=c.scrollHeight; },80);
  // Re-run timer display if on timer page
  if(S.sub==='timer'&&S.timerOn){
    const d=document.getElementById('timerDisp'); if(d)d.textContent=fmtSec(S.timerSecs);
  }
  // Load passkey status on profile page
  if(S.sub==='profile'&&S.user&&S.user.role!=='admin'){
    loadPasskeyStatus();
  }
}

async function loadPasskeyStatus(){
  const statusEl = document.getElementById('pkStatus');
  const badgeEl  = document.getElementById('pkBadge');
  const delBtn   = document.getElementById('pkDelBtn');
  const regBtn   = document.getElementById('pkRegBtn');
  if(!statusEl) return;

  if(!webAuthnAvailable()){
    statusEl.textContent = 'WebAuthn not supported on this browser';
    if(regBtn) regBtn.disabled = true;
    return;
  }

  const has = await userHasPasskey(S.user.id);
  if(has){
    statusEl.innerHTML = 'Passkey registered on this account <i class="fas fa-user-check"></i>';
    if(badgeEl){ badgeEl.innerHTML='<i class="fas fa-user-check"></i> Registered'; badgeEl.className='pk-badge'; }
    if(delBtn)  delBtn.style.display='';
    if(regBtn)  { regBtn.innerHTML='<i class="fas fa-sync"></i> Re-register Passkey'; }
  } else {
    statusEl.textContent = 'No passkey yet. Register below to enable biometric login.';
    if(badgeEl){ badgeEl.innerHTML='<i class="fas fa-exclamation-triangle"></i> Not set'; badgeEl.className='pk-badge unregistered'; }
    if(delBtn)  delBtn.style.display='none';
  }
}

async function approveTeacher(id,name){
  const {error}=await sb.from('profiles').update({approved:true}).eq('id',id);
  if(error){toast('Error: '+error.message,'error');return;}
  await pushNotif(id,'Account Approved!',`Welcome ${name}! Your teacher account is now active.`);
  await addLog(`Teacher "${name}" approved by admin`);
  toast('Teacher approved!','success'); render();
}
async function removeUser(id){
  showConfirm('Remove this user permanently?\n\nThey will be instantly logged out and cannot re-register with the same email.', '<i class="fas fa-trash"></i>', async () => {
    // 1. Fetch user details before deleting
    const {data:u}=await sb.from('profiles').select('name,email,role').eq('id',id).single();
    if(!u){ toast('User not found','error'); return; }

    // 2. Block their email so they cannot re-register with same email
    if(u.email){
      await sb.from('blocked_emails').upsert({
        email: u.email.toLowerCase(),
        blocked_at: Date.now(),
        reason: `Account removed by admin — ${fmtD(Date.now())}`
      },{ onConflict:'email' });
    }

    // 3. Delete passkey (prevents biometric re-login)
    await sb.from('passkeys').delete().eq('user_id',id);

    // 4. Delete profile — realtime will instantly log out the user
    await sb.from('profiles').delete().eq('id',id);

    // 5. Log the action
    await addLog(`${u.role||'User'} "${u.name}" (${u.email}) permanently removed by admin`);

    toast(`${u.name} removed and blocked from re-registering <i class="fas fa-user-check"></i>`,'warning');
    render();
  }, '<i class="fas fa-trash"></i> Remove Permanently', 'btn-del');
}

function adminSetup(){
  const SQL=`-- Run this ONCE in your Supabase SQL Editor
-- (Dashboard → SQL Editor → New query → paste → Run)

create table if not exists public.profiles (
  id text primary key,
  name text not null,
  phone text,
  email text unique not null,
  role text default 'student',
  approved boolean default false,

);
create table if not exists public.batches (
  id text primary key, name text not null,
  logo text, description text, teacher_id text,
  students text[] default '{}',
  created_at bigint default extract(epoch from now())*1000
);
create table if not exists public.subjects (
  id text primary key, name text not null, logo text, batch_id text
);
create table if not exists public.chapters (
  id text primary key, name text not null, logo text, subject_id text
);
create table if not exists public.content (
  id text primary key, name text not null, url text,
  download_links jsonb default '[]', type text, chapter_id text,

);
create table if not exists public.attendance (
  id text primary key, user_id text, date text, ts bigint,
  unique(user_id, date)
);
-- Online presence (add last_active column to profiles)
alter table if exists public.profiles add column if not exists last_active bigint null;

-- Messages table: create fresh OR migrate existing table
create table if not exists public.messages (
  id           text    primary key,
  sender_id    text,
  sender_role  text    default 'student',
  receiver_id  text,
  receiver_role text   default 'student',
  message_text text    default '',
  created_at   bigint  default (extract(epoch from now())*1000)::bigint,
  is_read      boolean default false,
  seen_at      bigint  null
);
-- Safe migrations for existing messages table (old schema had from_id/to_id/text/read/ts)
alter table public.messages add column if not exists sender_id    text;
alter table public.messages add column if not exists sender_role  text    default 'student';
alter table public.messages add column if not exists receiver_id  text;
alter table public.messages add column if not exists receiver_role text   default 'student';
alter table public.messages add column if not exists message_text text    default '';
alter table public.messages add column if not exists created_at   bigint  default (extract(epoch from now())*1000)::bigint;
alter table public.messages add column if not exists is_read      boolean default false;
alter table public.messages add column if not exists seen_at      bigint  null;
-- Migrate old rows: copy from_id→sender_id, to_id→receiver_id, text→message_text, read→is_read, ts→created_at
update public.messages
  set sender_id    = from_id,
      receiver_id  = to_id,
      message_text = coalesce(text, ''),
      is_read      = coalesce(read, false),
      created_at   = coalesce(ts, (extract(epoch from now())*1000)::bigint)
  where sender_id is null and from_id is not null;
create table if not exists public.announcements (
  id          text   primary key,
  teacher_id  text   not null,
  batch_id    text   not null,
  title       text   not null default '',
  description text   not null default '',
  image_url   text   null,
  created_at  bigint not null default (extract(epoch from now())*1000)::bigint
);
create table if not exists public.notifications (
  id text primary key, user_id text, title text,
  msg text, read boolean default false, ts bigint
);
-- Blocked emails: prevents deleted users from re-registering with same email
create table if not exists public.blocked_emails (
  email text primary key,
  blocked_at bigint not null default (extract(epoch from now())*1000)::bigint,
  reason text default 'Account removed by admin'
);
create table if not exists public.logs (
  id text primary key, action text, ts bigint
);
create table if not exists public.bookmarks (
  id text primary key, user_id text, content_id text,
  ts bigint, unique(user_id, content_id)
);
create table if not exists public.study_hours (
  id text primary key, user_id text, secs integer, ts bigint
);
-- Passkeys table: safe migration (drops RLS policies first to allow column type change)
do $pk$ begin
  if not exists (
    select 1 from information_schema.tables
    where table_name='passkeys' and table_schema='public'
  ) then
    -- Fresh install: create with text columns from the start
    create table public.passkeys (
      id            text   primary key,
      user_id       text   not null,
      credential_id text   unique not null,
      public_key    text,
      created_at    bigint default (extract(epoch from now())*1000)::bigint
    );
  else
    -- Table already exists — drop policies + foreign keys first (they block ALTER COLUMN)
    drop policy if exists "Users can manage their own passkeys" on public.passkeys;
    drop policy if exists "fs_anon"                            on public.passkeys;
    drop policy if exists "fs_auth"                            on public.passkeys;

    -- Drop foreign key constraints that block column type change
    alter table public.passkeys drop constraint if exists passkeys_user_id_fkey;
    alter table public.passkeys drop constraint if exists passkeys_id_fkey;

    -- Fix id column: uuid → text
    if exists (
      select 1 from information_schema.columns
      where table_schema='public' and table_name='passkeys'
        and column_name='id' and data_type='uuid'
    ) then
      alter table public.passkeys alter column id type text using id::text;
    end if;

    -- Fix user_id column: uuid → text
    if exists (
      select 1 from information_schema.columns
      where table_schema='public' and table_name='passkeys'
        and column_name='user_id' and data_type='uuid'
    ) then
      alter table public.passkeys alter column user_id type text using user_id::text;
    end if;

    -- Ensure all required columns exist
    alter table public.passkeys add column if not exists public_key  text;
    alter table public.passkeys add column if not exists created_at  bigint
      default (extract(epoch from now())*1000)::bigint;
  end if;
end $pk$;

-- Enable RLS
do $$ declare t text;
begin foreach t in array array[
  'profiles','batches','subjects','chapters','content',
  'attendance','messages','announcements','notifications','logs','bookmarks','study_hours','passkeys','blocked_emails'
] loop
  execute format('alter table public.%I enable row level security', t);
  execute format('drop policy if exists "fs_anon" on public.%I', t);
  execute format('create policy "fs_anon" on public.%I for all to anon using (true) with check (true)', t);
  execute format('drop policy if exists "fs_auth" on public.%I', t);

-- Enable Realtime

do $pub$ declare t text;

    ) then

end $pub$;

grant select, insert, delete on public.passkeys to anon, authenticated;

-- Storage bucket (run in Dashboard > Storage instead):

function switchUpload(mode){
  S.uploadMode=mode;
  document.getElementById('linkSection').style.display=mode==='link'?'':'none';
  document.getElementById('fileSection').style.display=mode==='file'?'':'none';
  document.getElementById('ut_link').className='upload-tab'+(mode==='link'?' on':'');
  document.getElementById('ut_file').className='upload-tab'+(mode==='file'?' on':'');
}

function handleFileDrop(e){
  e.preventDefault();
  document.getElementById('dropzone').classList.remove('drag');
  const file=e.dataTransfer.files[0]; if(file) startFileUpload(file);
}
function handleFileSelect(input){
  const file=input.files[0]; if(file) startFileUpload(file);
}
async function startFileUpload(file){
  if(file.size>52428800){toast('File too large (max 50MB)','error');return;}
  document.getElementById('uploadProgress').style.display='';
  document.getElementById('addContentBtn').disabled=true;
  try {
    const url=await uploadFile(file,(pct)=>{
      document.getElementById('uploadFill').style.width=pct+'%';
      document.getElementById('uploadLabel').textContent=`Uploading ${file.name}… ${pct}%`;
    });
    document.getElementById('uploadedUrl').value=url;
    document.getElementById('uploadedInfo').style.display='';
    document.getElementById('uploadedInfo').innerHTML=`<i class="fas fa-user-check"></i> Uploaded: <strong>${esc(file.name)}</strong> <a href="${esc(url)}" target="_blank" style="color:var(--accent)">Preview →</a>`;
    document.getElementById('uploadLabel').textContent='Upload complete!';
    toast('File uploaded!','success');
  } catch(err){
    toast('Upload failed: '+err.message,'error');
    document.getElementById('uploadProgress').style.display='none';
  }
  document.getElementById('addContentBtn').disabled=false;
}

async function createContent(){
  const n=(document.getElementById('ac_n')?.value||'').trim();
  const d=document.getElementById('ac_d')?.value||today();
  if(!n){toast('Title required','warning');return;}

  let url=''; let downloadLinks=[];
  if(S.cTab==='lecture'){
    url=(document.getElementById('ac_url')?.value||'').trim();
    if(!url){toast('Video URL required','warning');return;}
  } else {
    if(S.uploadMode==='file'){
      url=document.getElementById('uploadedUrl')?.value||'';
      if(!url){toast('Please upload a file first','warning');return;}
      downloadLinks=[{label:'Download File',url}];
    } else {
      url=(document.getElementById('ac_url')?.value||'').trim();
      downloadLinks=collectDLLinks();
      if(!url&&downloadLinks.length===0){toast('Add a URL or at least one download link','warning');return;}
    }
  }

  const {error}=await sb.from('content').insert({
    id:uid(), name:n, url, download_links:downloadLinks,
    type:S.cTab, chapter_id:S.chapter.id,
    ts:new Date(d).getTime()||now(), views:0, viewers:[], created_at:now()
  });
  if(error){toast(error.message,'error');return;}
  closeModal(); toast('Content added!','success'); render();
}

function addDLLink(label,urlv){
  const wrap=document.getElementById('dlLinksWrap'); if(!wrap)return;
  const row=document.createElement('div');
  row.className='dl-row'; row.style.cssText='display:flex;gap:7px;align-items:center';
  row.innerHTML=`
    <input class="fc dl-lbl" placeholder="Label" value="${esc(label)}" style="flex:0 0 120px;font-size:12.5px;padding:8px 10px">
    <input class="fc dl-url" placeholder="https://…" value="${esc(urlv)}" style="flex:1;font-size:12.5px;padding:8px 10px">
    <button type="button" class="btn btn-del btn-xs" onclick="this.closest('.dl-row').remove()">✕</button>`;
  wrap.appendChild(row);
  row.querySelector('.dl-url').focus();
}
function collectDLLinks(){
  return Array.from(document.querySelectorAll('#dlLinksWrap .dl-row')).map(row=>({
    label:(row.querySelector('.dl-lbl')?.value||'').trim()||'Download',
    url:(row.querySelector('.dl-url')?.value||'').trim()
  })).filter(l=>l.url);
}
