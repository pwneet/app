.ci-engage-pill.likes { color:#f43f5e; }

/* g-md-1: single col on medium screens */
@media(max-width:680px){ .g-md-1{ grid-template-columns:1fr !important; } }
@media(max-width:768px){
  .vp-title { font-size:14px; }
  .vp-section { padding:12px 13px; }
  .inapp-topbar { padding:9px 12px; }
}

/* =====================================================
   FULL RESPONSIVE SYSTEM
   Mobile  : 320px – 480px
   Tablet  : 481px – 768px
   Desktop : 769px+
===================================================== */

/* ── Base: always allow scrolling, never clip content ── */
html {
  overflow-x: hidden;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  scroll-behavior: smooth;
  height: 100%;
}
body {
  overflow-x: hidden;
  overflow-y: auto;
  min-height: 100%;
  min-height: 100dvh;
  -webkit-text-size-adjust: 100%;

}

/* =====================================================

document.addEventListener('cut',   e => e.preventDefault());

// Disable keyboard shortcuts: Ctrl+C, Ctrl+U, Ctrl+S, Ctrl+A, F12, Ctrl+Shift+I/J/C
document.addEventListener('keydown', e => {
  const ctrl = e.ctrlKey || e.metaKey;
  if(ctrl && ['c','u','s','a','p'].includes(e.key.toLowerCase())) { e.preventDefault(); return false; }
  if(ctrl && e.shiftKey && ['i','j','c','k'].includes(e.key.toLowerCase())) { e.preventDefault(); return false; }
  if(e.key === 'F12') { e.preventDefault(); return false; }

});

/* =====================================================
   YOUTUBE TIME TRACKER — via postMessage
   Listens to YT iframe events to track currentTime
   so we can resume after opening an attachment
===================================================== */
window.addEventListener('message', function(e){
  try {
    const d = typeof e.data === 'string' ? JSON.parse(e.data) : e.data;
    // YT iframe API sends infoDelivery with currentTime
    if(d?.event === 'infoDelivery' && d?.info?.currentTime != null){
      S.vpLastTime = Math.floor(d.info.currentTime);
    }
    // Also handle onStateChange to keep polling
    if(d?.event === 'onStateChange'){
      // state 1 = playing — poll every 2s
      if(d?.info === 1){
        if(!S._ytPollTimer) S._ytPollTimer = setInterval(_ytPollTime, 2000);
      } else {
        clearInterval(S._ytPollTimer); S._ytPollTimer = null;
      }
    }
    if(d?.event === 'onReady') _ytPollTime();
  } catch(e2){}
});

function _ytPollTime(){
  const fr = document.getElementById('vpYTFrame');
  if(!fr){ clearInterval(S._ytPollTimer); S._ytPollTimer=null; return; }
  try {
    fr.contentWindow.postMessage(JSON.stringify({event:'listening',id:1}),'*');
    fr.contentWindow.postMessage(JSON.stringify({event:'command',func:'getCurrentTime',args:''}),'*');
  } catch(e2){}
}

/* =====================================================

===================================================== */
function uid()   { return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function today()  { return new Date().toISOString().split('T')[0]; }
function nowTime(){ const n=new Date(); return `${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`; }
function fmtD(ts) { return new Date(ts).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}); }
function fmtDT(ts){ return new Date(ts).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'})+', '+new Date(ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}); }
function _dtToTs(dateVal,timeVal){ return new Date(`${dateVal||today()}T${timeVal||'00:00'}`).getTime()||now(); }
function fmtT(ts){ return new Date(ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}); }
function esc(s)  { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtSec(s){ const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),ss=s%60; return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}`; }
function lsGet(k)  { try{ return JSON.parse(localStorage.getItem(k)); }catch{ return null; } }
function lsSet(k,v){ localStorage.setItem(k, JSON.stringify(v)); }
function now()   { return Date.now(); }

  if(l.includes('onedrive')) return '<i class="fas fa-cloud"></i>';

  if(l.includes('mega'))     return '<i class="fas fa-gem"></i>';
  if(l.includes('mediafire'))return '<i class="fas fa-fire"></i>';
  return '<i class="fas fa-link"></i>';
}
function getYTEmbed(url){
  const m=url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/))([a-zA-Z0-9_-]{11})/);

/* =====================================================

function toast(msg,type='info'){
  const ic={success:'<i class="fas fa-user-check"></i>',error:'<i class="fas fa-times-circle"></i>',warning:'<i class="fas fa-exclamation-triangle"></i>',info:'<i class="fas fa-info-circle"></i>'};
  const el=document.createElement('div');
  el.className=`toast t-${type==='success'?'ok':type==='error'?'err':type==='warning'?'wrn':''}`;
  el.innerHTML=`<span>${ic[type]||'<i class="fas fa-info-circle"></i>'}</span><span>${esc(msg)}</span>`;
  document.getElementById('toastCtr').appendChild(el);
  setTimeout(()=>{el.style.opacity='0';el.style.transform='translateX(30px)';el.style.transition='all .3s';setTimeout(()=>el.remove(),320);},3200);
}

/* =====================================================
   PUSH NOTIFICATIONS (Browser Web Push API)
===================================================== */
function pushSupported(){
  return 'Notification' in window && 'serviceWorker' in navigator;
}
function pushGranted(){
  return pushSupported() && Notification.permission==='granted';
}

async function requestPushPermission(){
  if(!pushSupported()){ toast('Push notifications not supported on this browser','warning'); return; }
  if(Notification.permission==='granted'){ toast('Push notifications already enabled ✔','success'); return; }
  if(Notification.permission==='denied'){ toast('Push blocked — please enable in browser settings','error'); return; }
  const perm = await Notification.requestPermission();
  if(perm==='granted'){
    lsSet('fs_push_enabled',true);
    toast('Push notifications enabled!','success');
    // Re-render to hide prompt
    const pw=document.getElementById('pw');
    if(pw&&S.sub==='notifications') render();
  } else {
    toast('Permission denied — notifications disabled','warning');
  }
}

function sendPushNotif(title, body, icon){
  if(!pushGranted()) return;
  // Only show if page is hidden (user is on another tab/app)
  if(document.visibilityState==='visible') return;
  try {
    const n = new Notification(title, {
      body: body||'',
      icon: icon||'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/main/index.js',
      badge: '',
      tag: 'freestudy-'+Date.now(),
      requireInteraction: false,
      silent: false,
    });
    n.onclick = () => { window.focus(); n.close(); };
    setTimeout(()=>n.close(), 6000);
  } catch(e){ console.warn('Push notif failed:', e); }
}
function loadTheme(){
  const t=lsGet('fs_theme');
  S.dark=(t===null)?true:t;
  document.documentElement.setAttribute('data-theme',S.dark?'dark':'light');
  // Immediately set meta theme-color for mobile browser chrome
  let meta=document.querySelector('meta[name="theme-color"]');
  if(!meta){meta=document.createElement('meta');meta.name='theme-color';document.head.appendChild(meta);}
  meta.content=S.dark?'#0a0a0a':'#ffffff';
}

/* =====================================================
   FILE UPLOAD (Supabase Storage)
===================================================== */
async function uploadFile(file, onProgress){
  const path=`uploads/${S.user.id}/${Date.now()}_${file.name.replace(/[^a-zA-Z0-9._-]/g,'_')}`;
  if(onProgress) onProgress(10);
  const {data,error}=await sb.storage.from(BUCKET).upload(path,file,{cacheControl:'3600',upsert:false});
  if(error) throw error;
  if(onProgress) onProgress(90);
  const {data:{publicUrl}}=sb.storage.from(BUCKET).getPublicUrl(path);
  if(onProgress) onProgress(100);
  return publicUrl;
}

async function doLogin(){
  const email=(document.getElementById('li_email')?.value||'').trim();
  const pw=document.getElementById('li_pw')?.value||'';
  if(!email||!pw){toast('Please fill all fields','warning');return;}

  // Admin bypass
  if(email===ADMIN_EMAIL&&pw===ADMIN_PASS){
    S.user={id:'admin',name:'Admin',email:ADMIN_EMAIL,role:'admin'};
    lsSet('fs_admin_sess',S.user);
    S.page='admin'; S.sub='dashboard';
    await addLog('Admin logged in'); render(); return;
  }

  const btn=document.getElementById('loginBtn');
  if(btn){btn.disabled=true;btn.textContent='Signing in…';}
  try {
    const {data,error}=await sb.auth.signInWithPassword({email,password:pw});
    if(error) throw error;
    const {data:profile,error:pe}=await sb.from('profiles').select('*').eq('id',data.user.id).single();
    if(pe||!profile){
      await sb.auth.signOut();
      throw new Error('Your account has been removed. Please create a new account with a different email.');
    }
    S.user=profile;
    S.page=profile.role==='teacher'?(profile.approved?'teacher':'waiting'):'student';
    S.sub='dashboard';
    await addLog(`${profile.role} "${profile.name}" logged in`);
    setupRealtime();
    render();
  } catch(err){
    const msg=(err.message||'').toLowerCase();
    if(msg.includes('email not confirmed')||msg.includes('not confirmed')){
      if(btn){btn.disabled=false;btn.innerHTML='<i class="fas fa-rocket"></i> Sign In';}
      showEmailNotConfirmedModal(email);
      return;
    }
    toast(err.message||'Login failed','error');
    if(btn){btn.disabled=false;btn.innerHTML='<i class="fas fa-rocket"></i> Sign In';}
  }
}

async function doSignup(){
  const name =(document.getElementById('su_name')?.value||'').trim();
  const phone=(document.getElementById('su_phone')?.value||'').trim();
  const email=(document.getElementById('su_email')?.value||'').trim();
  const pw   =(document.getElementById('su_pw')?.value||'');
  const role = document.getElementById('su_role')?.value||'student';
  if(!name||!phone||!email||!pw){toast('Please fill all fields','warning');return;}
  if(pw.length<6){toast('Password must be 6+ characters','warning');return;}
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){toast('Invalid email','warning');return;}
  if(email===ADMIN_EMAIL){toast('Email not available','error');return;}

  // Check if this email has been blocked by admin
  const {data:blocked}=await sb.from('blocked_emails').select('email').eq('email',email.toLowerCase()).single();
  if(blocked){ toast('This email has been removed from the platform. Please use a different email.','error'); return; }

  const btn=document.getElementById('signupBtn');
  if(btn){btn.disabled=true;btn.textContent='Creating account…';}
  try {
    const {data,error}=await sb.auth.signUp({email,password:pw});
    if(error) throw error;
    const userId=data.user.id;
    const {error:pe}=await sb.from('profiles').insert({id:userId,name,phone,email,role,approved:false,photo:'',created_at:now()});
    if(pe) throw pe;
    await addLog(`New ${role} registered: ${name}`);
    // Try immediate login (succeeds when email confirmation is DISABLED)
    const {data:sess,error:le}=await sb.auth.signInWithPassword({email,password:pw});
    if(!le&&sess&&sess.user){
      const {data:profile}=await sb.from('profiles').select('*').eq('id',sess.user.id).single();
      if(profile){
        S.user=profile;
        S.page=profile.role==='teacher'?(profile.approved?'teacher':'waiting'):'student';
        S.sub='dashboard'; setupRealtime();
        toast('Welcome, '+name+'! Account created successfully!','success');
        render(); return;
      }
    }
    // Email confirmation required — show confirmation pending page
    S._confirmEmail=email; S.page='confirm'; render();
  } catch(err){
    toast(err.message||'Signup failed','error');
    if(btn){btn.disabled=false;btn.innerHTML='<i class="fas fa-user-plus"></i> Create Account';}
  }
}

/* =====================================================
   PASSKEY / WebAuthn IMPLEMENTATION
   Uses real device biometrics (Face ID, Touch ID,
   Windows Hello, Android fingerprint, etc.)
===================================================== */

/* ─── BUG FIX 1: Safe b64url — no spread operator (avoids stack overflow on large buffers) ─── */
function b64url(buf){
  const bytes = new Uint8Array(buf);
  let str = '';
  for(let i=0;i<bytes.length;i++) str += String.fromCharCode(bytes[i]);
  return btoa(str).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}

/* ─── BUG FIX 2: Safe fromB64url — wrapped in try/catch ─── */
function fromB64url(str){
  try {
    str = str.replace(/-/g,'+').replace(/_/g,'/');
    while(str.length % 4) str += '=';
    return Uint8Array.from(atob(str), c => c.charCodeAt(0)).buffer;
  } catch(e) {
    throw new Error('Invalid credential ID format. Please re-register your passkey.');
  }
}

/* ─── BUG FIX 3: rpId handles file:// and empty hostname ─── */
function rpId(){
  const h = location.hostname;
  if(!h || h === '') return 'localhost';  // file:// protocol fix
  return h === 'localhost' ? 'localhost' : h;
}

/* ─── Check if WebAuthn is available ─── */
function webAuthnAvailable(){
  return !!(window.PublicKeyCredential && navigator.credentials && location.protocol !== 'file:');
}

/* ─── REGISTER passkey ─── */
async function registerPasskey(){
  if(!webAuthnAvailable()){
    toast('Biometric login requires HTTPS or localhost — not supported here','error'); return;
  }
  if(!S.user || S.user.role==='admin'){
    toast('Please login first','warning'); return;
  }

  openModal(`
    <div class="mh"><h3><i class="fas fa-fingerprint"></i> Register Passkey</h3><button class="mc-btn" onclick="closeModal()">✕</button></div>
    <div class="pk-scanning">
      <div class="pk-fingerprint-anim"><i class="fas fa-fingerprint"></i></div>
      <div style="font-weight:700;font-size:16px">Waiting for biometric…</div>
      <div style="font-size:13px;color:var(--text2)">Use fingerprint, Face ID, or<br>device PIN when prompted</div>
    </div>`);

  try {
    const challenge = crypto.getRandomValues(new Uint8Array(32)); // BUG FIX 4: 32 bytes (more secure than 16)
    const userIdBuf = new TextEncoder().encode(S.user.id);

    const cred = await navigator.credentials.create({ publicKey:{
      challenge,
      rp:{ id:rpId(), name:'FreeStudy' },
      user:{ id:userIdBuf, name:S.user.email, displayName:S.user.name },
      pubKeyCredParams:[
        {type:'public-key', alg:-7},    // ES256
        {type:'public-key', alg:-257},  // RS256
      ],
      authenticatorSelection:{
        authenticatorAttachment:'platform',
        userVerification:'required',
        residentKey:'preferred',
      },
      timeout:60000,
      attestation:'none',
    }});

    // BUG FIX 5: null check on cred
    if(!cred) throw new Error('No credential returned by device. Please try again.');

    const credId = b64url(cred.rawId);

    // BUG FIX 6: onConflict:'id' (not 'user_id' — user_id has no UNIQUE constraint)
    const {error} = await sb.from('passkeys').upsert({
      id:           S.user.id,           // user.id is a valid UUID — use directly, one passkey per user
      user_id:      S.user.id,
      credential_id: credId,
      public_key:   b64url(cred.response.clientDataJSON),
    }, { onConflict: 'id' });
    if(error) throw new Error('Could not save passkey: ' + error.message);

    // Update local cache
    const stored = lsGet('fs_passkeys') || {};
    stored[S.user.id] = credId;
    lsSet('fs_passkeys', stored);

    closeModal();
    toast('Passkey registered! You can now login with biometrics','success');
    render();

  } catch(err){
    closeModal();
    if(err.name === 'NotAllowedError')       toast('Cancelled or timed out — please try again','warning');
    else if(err.name === 'InvalidStateError') toast('A passkey is already registered. Use Re-register instead.','warning');
    else if(err.name === 'NotSupportedError') toast('This device does not support biometric passkeys','error');
    else                                      toast('Registration failed: ' + err.message, 'error');
  }
}

/* ─── LOGIN with passkey — Step 2: Email verify → Biometric → DB confirm ─── */
async function passkeyLoginStep2(){
  const emailInput = document.getElementById('pkEmailInput');
  const email = (emailInput?.value || '').trim().toLowerCase();
  if(!email){ toast('Please enter your email','warning'); return; }

  const btn = document.getElementById('pkContinueBtn');
  if(btn){ btn.disabled=true; btn.innerHTML='<i class="fas fa-search"></i> Looking up…'; }

  try {
    // ── Step A: Find profile by email (profiles table is readable by anon) ──
    const {data:profiles, error:profErr} = await sb.from('profiles')
      .select('*').ilike('email', email).limit(1);

    const profile = profiles?.[0];
    if(profErr || !profile){
      toast('No account found with this email','error');
      if(btn){ btn.disabled=false; btn.innerHTML='<i class="fas fa-fingerprint"></i> Continue with Passkey'; }
      return;
    }

    // ── Step B: Build allowCredentials from localStorage cache (no DB query needed) ──
    // This avoids RLS blocking on passkeys table for anon users
    const stored   = lsGet('fs_passkeys') || {};
    const cachedId = stored[profile.id];   // credentialId stored at registration time

    let allowCredentials = undefined;  // undefined = discovery mode (browser shows any passkey)
    if(cachedId){
      try {
        allowCredentials = [{
          id:         fromB64url(cachedId),
          type:       'public-key',
          transports: ['internal', 'hybrid'],
        }];
      } catch(_){ allowCredentials = undefined; } // if corrupted, fall back to discovery
    }

    // ── Step C: Show biometric modal ──
    openModal(`
      <div class="mh">
        <h3><i class="fas fa-fingerprint"></i> Verifying Identity</h3>
        <button class="mc-btn" onclick="closeModal()">✕</button>
      </div>
      <div class="pk-scanning">
        <div class="pk-fingerprint-anim"><i class="fas fa-fingerprint"></i></div>
        <div style="font-weight:700;font-size:16px">Scan your biometric</div>
        <div style="font-size:13px;color:var(--text2);margin-top:6px">
          Logging in as <strong style="color:var(--accent)">${esc(profile.name)}</strong><br>
          Use the fingerprint / Face ID you registered
        </div>
      </div>`);

    // ── Step D: Trigger device biometric ──
    const challenge = crypto.getRandomValues(new Uint8Array(32));
    const assertion = await navigator.credentials.get({ publicKey:{
      challenge,
      rpId:             rpId(),
      userVerification: 'required',
      allowCredentials,      // from cache OR undefined (discovery mode)
      timeout:          60000,
    }});

    if(!assertion) throw new Error('No response from biometric sensor. Please try again.');

    const returnedCredId = b64url(assertion.rawId);

    // ── Step E: Verify credential belongs to this user ──
    // First try localStorage (works even if anon RLS blocks DB)
    let verified = false;

    if(cachedId && returnedCredId === cachedId){
      // <i class="fas fa-user-check"></i> LocalStorage match — credential confirmed
      verified = true;
    } else {
      // No local cache or different device — verify via Supabase
      const {data:pks} = await sb.from('passkeys')
        .select('credential_id')
        .eq('user_id', profile.id)
        .eq('credential_id', returnedCredId)
        .limit(1);

      if(pks && pks.length > 0) verified = true;
    }

    if(!verified){
      throw new Error('This passkey does not belong to the entered email account.');
    }

    // ── Step F: Update local cache with latest credId ──
    stored[profile.id] = returnedCredId;
    lsSet('fs_passkeys', stored);

    // ── Step G: Login ──
    closeModal();
    S.user = profile;
    S.page = profile.role==='teacher' ? (profile.approved ? 'teacher' : 'waiting') : 'student';
    S.sub  = 'dashboard';
    setupRealtime();
    await addLog(`${profile.role} "${profile.name}" logged in via passkey`);
    toast('Welcome back, ' + profile.name,'success');
    render();

  } catch(err){
    closeModal();
    if(err.name === 'NotAllowedError')    toast('Biometric cancelled or timed out','warning');
    else if(err.name === 'SecurityError') toast('Security error — make sure you are on the correct URL','error');
    else                                  toast(err.message || 'Passkey login failed','error');
  }
}

    }
  }, '<i class="fas fa-trash"></i> Remove', 'btn-del');
}

/* =====================================================
   REAL-TIME SUBSCRIPTIONS
===================================================== */
function setupRealtime(){
  if(!S.user||S.user.role==='admin') return;
  teardownRealtime();

  // 1. New messages to me
  const msgCh=sb.channel('rt-msgs-'+S.user.id)
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'messages',filter:`receiver_id=eq.${S.user.id}`},
      async(payload)=>{
        S.unreadMsgs++;
        updateBadges();
        const m=payload.new;
        toast(`<i class="fas fa-comments"></i> New message from ${m.sender_id==='admin'?'Admin':'someone'}`,'info');
        sendPushNotif('New Message', (m.message_text||'').slice(0,80));
        if(S.sub==='chat'&&S.chatWith===m.sender_id){
          // Chat is open — append and mark seen immediately
          appendChatMsg(m);
          await markMsgsSeen(m.sender_id);
          if(S.unreadMsgs>0){ S.unreadMsgs=Math.max(0,S.unreadMsgs-1); updateBadges(); }
          const pill=document.querySelector(`.chat-contact[data-pid="${m.sender_id}"] .chat-unread-pill`);
          if(pill) pill.remove();
          const row=document.querySelector(`.chat-contact[data-pid="${m.sender_id}"]`);
          if(row) row.classList.remove('has-unread');
        } else if(S.sub==='chat'){
          // Different chat open — update unread pill on contact row
          const row=document.querySelector(`.chat-contact[data-pid="${m.sender_id}"]`);
          if(row){
            row.classList.add('has-unread');
            let pill=row.querySelector('.chat-unread-pill');
            if(!pill){ pill=document.createElement('div'); pill.className='chat-unread-pill'; row.appendChild(pill); }
            pill.textContent=parseInt(pill.textContent||'0')+1;
          }
          // Also update preview text
          const prev=document.querySelector(`.chat-contact[data-pid="${m.sender_id}"] .chat-ci-preview`);
          if(prev) prev.textContent=(m.message_text||m.text||'').slice(0,42);
          const time=document.querySelector(`.chat-contact[data-pid="${m.sender_id}"] .chat-ci-time`);
          if(time) time.textContent=fmtT(m.created_at||m.ts);
        }
      })
    .subscribe();

  // 1b. Seen-receipt updates — update tick marks in real-time for sender
  const seenCh=sb.channel('rt-seen-'+S.user.id)
    .on('postgres_changes',{event:'UPDATE',schema:'public',table:'messages',filter:`sender_id=eq.${S.user.id}`},
      (payload)=>{
        const el=document.getElementById(`msg_${payload.new.id}`);
        if(!el) return;
        const tick=el.querySelector('.tick');
        if(!tick) return;
        if(payload.new.seen_at){ tick.className='tick t-seen'; tick.textContent='✓✓'; }
        else if(payload.new.is_read){ tick.className='tick t-read'; tick.textContent='✓✓'; }
      })
    .subscribe();

  // 2. New notifications for me
  const notifCh=sb.channel('rt-notifs-'+S.user.id)
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'notifications',filter:`user_id=eq.${S.user.id}`},
      (payload)=>{
        S.unreadNotifs++;
        updateBadges();
        toast(`<i class="fas fa-bell"></i> ${payload.new.title}`,'info');
        // Also send browser push notification if tab is in background
        sendPushNotif(payload.new.title||'FreeStudy', payload.new.msg||'');
      })
    .subscribe();

  // 3. Content view counts (live update for teachers)
  let contCh=null;
  if(S.user.role==='teacher'){
    contCh=sb.channel('rt-content')
      .on('postgres_changes',{event:'UPDATE',schema:'public',table:'content'},
        (payload)=>{
          // Update view count in DOM if visible
          const el=document.getElementById(`ci_${payload.new.id}`);
          if(el){
            const m=el.querySelector('[data-views]');
            if(m){ const v=payload.new.views||0; m.innerHTML=`<i class="fas fa-eye"></i> ${v} view${v!==1?'s':''}`; }
          }
        })
      .subscribe();
  }

  // 4. Profile presence updates (last_active) — live online/offline dots
  const presenceCh = sb.channel('rt-presence')
    .on('postgres_changes',{event:'UPDATE',schema:'public',table:'profiles'},
      (payload)=>{
        const pid  = payload.new.id;
        const la   = payload.new.last_active||0;
        const online = (Date.now()-la)<35000;  // 5s grace over 30s ping interval

        // Update cached peer last_active so refreshOnlineRings() stays accurate
        const peerIdx=S.chatPeers.findIndex(p=>p.id===pid);
        if(peerIdx>=0) S.chatPeers[peerIdx].last_active=la;

        // Update contact-list ring dot
        const ring = document.querySelector(`.chat-contact[data-pid="${pid}"] .online-ring`);
        if(ring){ ring.className = `online-ring ${online?'on':'off'}`; }

        // Update chat header if this peer's window is open
        if(S.chatWith===pid){
          const hdrStatus = document.querySelector('.chat-hdr-status');
          if(hdrStatus){
            hdrStatus.className = `chat-hdr-status ${online?'on':'off'}`;
            if(online){
              hdrStatus.innerHTML = '<i class="fas fa-circle" style="color:#22c55e"></i> Online';
            } else {
              const diff = Date.now()-la;
              const mins = Math.floor(diff/60000);
              hdrStatus.textContent = mins<1 ? 'last seen just now'
                : mins<60 ? `last seen ${mins}m ago`
                : `last seen ${Math.floor(mins/60)}h ago`;
            }
          }
        }
      })
    .subscribe();

  // 5. Own profile deletion → instant forced logout
  const banCh=sb.channel('rt-ban-'+S.user.id)
    .on('postgres_changes',{event:'DELETE',schema:'public',table:'profiles',filter:`id=eq.${S.user.id}`},
      async()=>{
        // Admin deleted this account — force logout immediately
        teardownRealtime();
        await sb.auth.signOut();
        S.user=null; S.page='login';
        // Show full-screen message
        document.getElementById('app').innerHTML=`
          <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;
                      background:#0a0a0a;padding:24px;font-family:system-ui,sans-serif">
            <div style="text-align:center;max-width:380px">
              <div style="font-size:64px;margin-bottom:20px"><i class="fas fa-ban" style="color:#ef4444;font-size:48px"></i></div>
              <h2 style="color:#fff;font-size:22px;font-weight:800;margin-bottom:12px">Account Removed</h2>
              <p style="color:#a0a0a0;font-size:14px;line-height:1.7;margin-bottom:24px">
                Your account has been permanently removed by the admin.<br><br>
                To continue using FreeStudy, please create a new account with a different email address.
              </p>
              <button onclick="location.reload()" 
                style="background:#22c55e;color:#fff;border:none;padding:13px 28px;
                       border-radius:12px;font-size:15px;font-weight:700;cursor:pointer">
                Go to Sign Up →
              </button>
            </div>
          </div>`;
      })
    .subscribe();

  S.rtChannels=[msgCh,seenCh,notifCh,contCh,presenceCh,banCh].filter(Boolean);
}

function teardownRealtime(){
  S.rtChannels.forEach(ch=>{ try{ sb.removeChannel(ch); }catch{} });
  S.rtChannels=[];
}

function renderShell(){
  // Re-render just the sidebar/topbar badges without full page reload
  const dot=document.getElementById('rtDot');
  if(dot) dot.className=`rt-dot ${S.rtChannels.length?'':'off'}`;
}

async function render(){
  const app=document.getElementById('app');
  _pushAppState();
  switch(S.page){
    case 'login':   app.innerHTML=renderLogin();   return;
    case 'signup':  app.innerHTML=renderSignup();  return;
    case 'waiting': app.innerHTML=renderWaiting(); return;
    case 'confirm': app.innerHTML=renderConfirm(); return;
  }

  // Determine role vars
  let role='',navItems=[];
  if(S.page==='admin'){role='Admin Panel';navItems=adminNav();}
  else if(S.page==='teacher'){role='Teacher Panel';navItems=teacherNav();}
  else {role='Student Panel';navItems=studentNav();}

  // Refresh badge counts
  if(S.user&&S.user.role!=='admin'){
    S.unreadMsgs=await dbUnreadMsgs(S.user.id);
  }

  app.innerHTML=layout(role,navItems);

  try {
    let html='';
    if(S.page==='admin')        html=await renderAdminPage();
    else if(S.page==='teacher') html=await renderTeacherPage();
    else                        html=await renderStudentPage();
    const pw=document.getElementById('pw');
    if(pw){ pw.innerHTML=html; afterRender(); }
  } catch(err){
    console.error(err);
    const pw=document.getElementById('pw');
    if(pw) pw.innerHTML=`<div class="card card-p24" style="color:var(--danger)">
      <strong>Error loading page:</strong><br><span style="font-size:13px">${esc(err.message)}</span>
      <br><br><button class="btn btn-p btn-sm" onclick="render()"><i class="fas fa-sync"></i> Retry</button>
      <button class="btn btn-ghost btn-sm" onclick="navTo('setup')"><i class="fas fa-database"></i> Check DB Setup</button>
    </div>`;
  }
}

function afterRender(){
  // Scroll chat to bottom
  setTimeout(()=>{ const c=document.getElementById('chatMsgs'); if(c)c.scrollTop=c.scrollHeight; },80);
  // Re-run timer display if on timer page
  if(S.sub==='timer'&&S.timerOn){
    const d=document.getElementById('timerDisp'); if(d)d.textContent=fmtSec(S.timerSecs);
  }
  // Load passkey status on profile page
  if(S.sub==='profile'&&S.user&&S.user.role!=='admin'){
    loadPasskeyStatus();
  }
  // Load live likes count on teacher lecture cards
  if(S.user?.role==='teacher'){
    document.querySelectorAll('.ci-likes-val[data-cid]').forEach(async el=>{
      try{
        const {count}=await sb.from('content_likes').select('*',{count:'exact',head:true}).eq('content_id',el.dataset.cid);
        el.textContent=count||0;
      }catch{el.textContent='0';}
    });
  }
  // Hydrate mark-done buttons for students
  if(S.user?.role==='student'){
    hydrateDoneButtons();
  }
}

async function loadPasskeyStatus(){
  const statusEl = document.getElementById('pkStatus');
  const badgeEl  = document.getElementById('pkBadge');
  const delBtn   = document.getElementById('pkDelBtn');
  const regBtn   = document.getElementById('pkRegBtn');
  if(!statusEl) return;

  if(!webAuthnAvailable()){
    statusEl.textContent = 'WebAuthn not supported on this browser';
    if(regBtn) regBtn.disabled = true;
    return;
  }

  const has = await userHasPasskey(S.user.id);
  if(has){
    statusEl.innerHTML = 'Passkey registered on this account <i class="fas fa-user-check"></i>';
    if(badgeEl){ badgeEl.innerHTML='<i class="fas fa-user-check"></i> Registered'; badgeEl.className='pk-badge'; }
    if(delBtn)  delBtn.style.display='';
    if(regBtn)  { regBtn.innerHTML='<i class="fas fa-sync"></i> Re-register Passkey'; }
  } else {
    statusEl.textContent = 'No passkey yet. Register below to enable biometric login.';
    if(badgeEl){ badgeEl.innerHTML='<i class="fas fa-exclamation-triangle"></i> Not set'; badgeEl.className='pk-badge unregistered'; }
    if(delBtn)  delBtn.style.display='none';
  }
}

async function adminDash(){
  const [users,batches,content,logs]=await Promise.all([dbUsers(),dbBatches(),dbContent(),dbLogs()]);
  const students=users.filter(u=>u.role==='student');
  const teachers=users.filter(u=>u.role==='teacher');
  const pending=teachers.filter(u=>!u.approved);
  return `

async function approveTeacher(id,name){
  const {error}=await sb.from('profiles').update({approved:true}).eq('id',id);
  if(error){toast('Error: '+error.message,'error');return;}
  await pushNotif(id,'Account Approved!',`Welcome ${name}! Your teacher account is now active.`);
  await addLog(`Teacher "${name}" approved by admin`);
  toast('Teacher approved!','success'); render();
}
async function removeUser(id){
  showConfirm('Remove this user permanently?\n\nThey will be instantly logged out and cannot re-register with the same email.', '<i class="fas fa-trash"></i>', async () => {
    // 1. Fetch user details before deleting
    const {data:u}=await sb.from('profiles').select('name,email,role').eq('id',id).single();
    if(!u){ toast('User not found','error'); return; }

    // 2. Block their email so they cannot re-register with same email
    if(u.email){
      await sb.from('blocked_emails').upsert({
        email: u.email.toLowerCase(),
        blocked_at: Date.now(),
        reason: `Account removed by admin — ${fmtD(Date.now())}`
      },{ onConflict:'email' });
    }

    // 3. Delete passkey (prevents biometric re-login)
    await sb.from('passkeys').delete().eq('user_id',id);

    // 4. Delete profile — realtime will instantly log out the user
    await sb.from('profiles').delete().eq('id',id);

    // 5. Log the action
    await addLog(`${u.role||'User'} "${u.name}" (${u.email}) permanently removed by admin`);

    toast(`${u.name} removed and blocked from re-registering <i class="fas fa-user-check"></i>`,'warning');
    render();
  }, '<i class="fas fa-trash"></i> Remove Permanently', 'btn-del');
}

-- Passkeys table: safe migration (drops RLS policies first to allow column type change)
do $pk$ begin
  if not exists (
    select 1 from information_schema.tables
    where table_name='passkeys' and table_schema='public'
  ) then
    -- Fresh install: create with text columns from the start
    create table public.passkeys (
      id            text   primary key,
      user_id       text   not null,
      credential_id text   unique not null,
      public_key    text,
      created_at    bigint default (extract(epoch from now())*1000)::bigint
    );
  else
    -- Table already exists — drop policies + foreign keys first (they block ALTER COLUMN)
    drop policy if exists "Users can manage their own passkeys" on public.passkeys;
    drop policy if exists "fs_anon"                            on public.passkeys;
    drop policy if exists "fs_auth"                            on public.passkeys;

    -- Drop foreign key constraints that block column type change
    alter table public.passkeys drop constraint if exists passkeys_user_id_fkey;
    alter table public.passkeys drop constraint if exists passkeys_id_fkey;

    -- Fix id column: uuid → text
    if exists (
      select 1 from information_schema.columns
      where table_schema='public' and table_name='passkeys'
        and column_name='id' and data_type='uuid'
    ) then
      alter table public.passkeys alter column id type text using id::text;
    end if;

    -- Fix user_id column: uuid → text
    if exists (
      select 1 from information_schema.columns
      where table_schema='public' and table_name='passkeys'
        and column_name='user_id' and data_type='uuid'
    ) then
      alter table public.passkeys alter column user_id type text using user_id::text;
    end if;

    -- Ensure all required columns exist
    alter table public.passkeys add column if not exists public_key  text;
    alter table public.passkeys add column if not exists created_at  bigint
      default (extract(epoch from now())*1000)::bigint;
  end if;
end $pk$;

-- Enable RLS
do $$ declare t text;

  'profiles','batches','subjects','chapters','content',

  'study_hours','passkeys','blocked_emails','test_materials',

] loop
  execute format('alter table public.%I enable row level security', t);
  execute format('drop policy if exists "fs_anon" on public.%I', t);
  execute format('create policy "fs_anon" on public.%I for all to anon using (true) with check (true)', t);
  execute format('drop policy if exists "fs_auth" on public.%I', t);
  execute format('create policy "fs_auth" on public.%I for all to authenticated using (true) with check (true)', t);
end loop; end $$;

-- Enable Realtime
-- Enable Realtime (safe to re-run — skips tables already in publication)
do $pub$ declare t text;
begin

    ) then

    end if;
  end loop;
end $pub$;

grant select, insert, delete on public.passkeys to anon, authenticated;

function _lacRenderList(){

  const items=S.lectureAttachments||[];

    el.innerHTML=`<div style="font-size:12.5px;color:var(--text3);text-align:center;padding:8px 0"><i class="fas fa-paperclip"></i>&nbsp; No attachments yet</div>`;
    return;
  }
  el.innerHTML=items.map((a,i)=>`
    <div style="display:flex;align-items:center;gap:9px;padding:9px 11px;border:1px solid var(--border);border-radius:9px;background:var(--card2);margin-bottom:6px">
      <div style="width:28px;height:28px;border-radius:7px;background:${a.type==='dpp'?'rgba(245,158,11,.12)':'rgba(59,130,246,.12)'};display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px">
        ${a.type==='dpp'?'<i class="fas fa-clipboard-list" style="color:#f59e0b"></i>':'<i class="fas fa-file-alt" style="color:#3b82f6"></i>'}

        <div style="font-size:13px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(a.title)}</div>

      </div>

    </div>`).join('');
}

function _lacRenderPicker(){
  const el=document.getElementById('lac_picker_list'); if(!el) return;
  const candidates=S.attachCandidates||[];
  const attached=new Set((S.lectureAttachments||[]).map(a=>a.source_content_id).filter(Boolean));
  if(!candidates.length){
    el.innerHTML=`<div style="font-size:12.5px;color:var(--text3);text-align:center;padding:14px"><i class="fas fa-info-circle"></i>&nbsp; No notes/DPP found in your batches</div>`;
    return;
  }
  el.innerHTML=candidates.map(c=>{
    const sel=attached.has(c.id);
    return `<div style="display:flex;align-items:center;gap:9px;padding:9px 11px;border:1.5px solid ${sel?'var(--accent)':'var(--border)'};border-radius:9px;background:${sel?'rgba(34,197,94,.05)':'var(--card2)'};cursor:pointer;transition:all .15s"
      onclick="toggleLacCandidate('${c.id}','${esc(c.name)}','${c.type}','${esc(c.url||'')}')">
      <div style="width:20px;height:20px;border-radius:5px;border:2px solid ${sel?'var(--accent)':'var(--border2)'};background:${sel?'var(--accent)':'transparent'};display:flex;align-items:center;justify-content:center;flex-shrink:0">
        ${sel?'<i class="fas fa-check" style="color:#fff;font-size:9px"></i>':''}
      </div>
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(c.name)}</div>
        <div style="font-size:11px;color:var(--text3)">${c.type==='dpp'?'<i class="fas fa-clipboard-list"></i> DPP':'<i class="fas fa-file-alt"></i> Notes'}</div>
      </div>
    </div>`;
  }).join('');
}

function toggleLacPicker(){
  const p=document.getElementById('lac_picker'); if(!p) return;
  const opening=p.style.display==='none';
  p.style.display=opening?'':'none';
  if(opening){
    if(S.attachCandidates.length) _lacRenderPicker();
    // else candidates are still loading — _lacLoadCandidates will call _lacRenderPicker when done
  }
}
function toggleLacCandidate(cId,title,type,url){
  if(!S.lectureAttachments) S.lectureAttachments=[];
  const idx=S.lectureAttachments.findIndex(a=>a.source_content_id===cId);
  if(idx>=0){
    S.lectureAttachments.splice(idx,1);
  } else {
    S.lectureAttachments.push({source_content_id:cId,dbId:null,title,type,url});
    // Auto-fill date & time from the selected note's timestamp
    const srcNote=S.attachCandidates.find(c=>c.id===cId);
    if(srcNote && srcNote.ts){
      const noteDate=new Date(srcNote.ts);
      const dInput=document.getElementById('ac_d');
      const tInput=document.getElementById('ac_t');
      if(dInput) dInput.value=noteDate.toISOString().split('T')[0];
      if(tInput) tInput.value=noteDate.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',hour12:false});
    }
  }
  _lacRenderList(); _lacRenderPicker();
}
function removeLacAttach(idx){
  if(!S.lectureAttachments) return;
  S.lectureAttachments.splice(idx,1);
  _lacRenderList(); _lacRenderPicker();
}
function addLacCustom(){
  const title=(document.getElementById('lac_ctitle')?.value||'').trim();
  const url=(document.getElementById('lac_curl')?.value||'').trim();
  if(!title||!url){toast('Title and URL required','warning');return;}
  if(!S.lectureAttachments) S.lectureAttachments=[];
  S.lectureAttachments.push({source_content_id:null,dbId:null,title,type:'notes',url});
  document.getElementById('lac_ctitle').value='';
  document.getElementById('lac_curl').value='';
  _lacRenderList(); toast('Added!','success');
}
async function _lacLoadCandidates(){
  // ── Only load notes/DPP from the CURRENT chapter ──
  const chapId = S.chapter?.id;
  if(!chapId){ S.attachCandidates=[]; _lacRenderPicker(); return; }
  const {data:co}=await sb.from('content')
    .select('*')
    .eq('chapter_id', chapId)
    .in('type',['notes','dpp'])
    .order('ts',{ascending:false});
  S.attachCandidates=co||[];
  // Refresh picker if it's currently open
  const pickerList=document.getElementById('lac_picker_list');
  const picker=document.getElementById('lac_picker');
  if(pickerList && picker && picker.style.display!=='none') _lacRenderPicker();
}
async function _lacLoadExisting(contentId){
  const {data:ex}=await sb.from('content_attached_notes').select('*').eq('content_id',contentId);
  S.lectureAttachments=(ex||[]).map(e=>({source_content_id:e.source_content_id||null,dbId:e.id,title:e.title||'',type:e.type||'notes',url:e.url||''}));
}
async function _lacSave(contentId){
  const items=S.lectureAttachments||[];
  const {data:existing}=await sb.from('content_attached_notes').select('id').eq('content_id',contentId);
  const existingDbIds=new Set((existing||[]).map(e=>e.id));
  const keepDbIds=new Set(items.filter(a=>a.dbId).map(a=>a.dbId));
  const toDelete=[...existingDbIds].filter(id=>!keepDbIds.has(id));
  if(toDelete.length) await sb.from('content_attached_notes').delete().in('id',toDelete);
  for(const a of items.filter(a=>!a.dbId)){
    await sb.from('content_attached_notes').insert({id:uid(),content_id:contentId,source_content_id:a.source_content_id||null,title:a.title,url:a.url,type:a.type||'notes',description:null,ts:now()});
  }
}

function switchUpload(mode){
  S.uploadMode=mode;
  document.getElementById('linkSection').style.display=mode==='link'?'':'none';
  document.getElementById('fileSection').style.display=mode==='file'?'':'none';
  document.getElementById('ut_link').className='upload-tab'+(mode==='link'?' on':'');
  document.getElementById('ut_file').className='upload-tab'+(mode==='file'?' on':'');
}

function handleFileDrop(e){
  e.preventDefault();
  document.getElementById('dropzone').classList.remove('drag');
  const file=e.dataTransfer.files[0]; if(file) startFileUpload(file);
}
function handleFileSelect(input){
  const file=input.files[0]; if(file) startFileUpload(file);
}
async function startFileUpload(file){
  if(file.size>52428800){toast('File too large (max 50MB)','error');return;}
  document.getElementById('uploadProgress').style.display='';
  document.getElementById('addContentBtn').disabled=true;
  try {
    const url=await uploadFile(file,(pct)=>{
      document.getElementById('uploadFill').style.width=pct+'%';
      document.getElementById('uploadLabel').textContent=`Uploading ${file.name}… ${pct}%`;
    });
    document.getElementById('uploadedUrl').value=url;
    document.getElementById('uploadedInfo').style.display='';
    document.getElementById('uploadedInfo').innerHTML=`<i class="fas fa-circle-check"></i> Uploaded: <strong>${esc(file.name)}</strong>&nbsp;<button class="btn btn-ghost btn-xs" onclick="openInApp('${esc(url)}','${esc(file.name)}')"><i class="fas fa-eye"></i> Preview</button>`;
    document.getElementById('uploadLabel').textContent='Upload complete!';
    toast('File uploaded!','success');
  } catch(err){
    toast('Upload failed: '+err.message,'error');
    document.getElementById('uploadProgress').style.display='none';
  }
  document.getElementById('addContentBtn').disabled=false;
}

async function createContent(){
  const n=(document.getElementById('ac_n')?.value||'').trim();
  const d=document.getElementById('ac_d')?.value||today();
  const t=document.getElementById('ac_t')?.value||nowTime();
  if(!n){toast('Title required','warning');return;}

  let url=''; let downloadLinks=[];
  if(S.cTab==='lecture'){
    url=(document.getElementById('ac_url')?.value||'').trim();
    if(!url){toast('Video URL required','warning');return;}
  } else {
    if(S.uploadMode==='file'){
      url=document.getElementById('uploadedUrl')?.value||'';
      if(!url){toast('Please upload a file first','warning');return;}
      downloadLinks=[{label:'Download File',url}];
    } else {
      url=(document.getElementById('ac_url')?.value||'').trim();
      downloadLinks=collectDLLinks();
      if(!url&&downloadLinks.length===0){toast('Add a URL or at least one download link','warning');return;}
    }
  }

  const newId = uid();
  const {error}=await sb.from('content').insert({
    id:newId, name:n, url, download_links:downloadLinks,
    type:S.cTab, chapter_id:S.chapter.id,
    ts:_dtToTs(d,t), views:0, viewers:[], created_at:now()
  });
  if(error){toast(error.message,'error');return;}
  if(S.cTab==='lecture' && S.lectureAttachments?.length) await _lacSave(newId);
  closeModal(); toast('Content added!','success'); render();
}

function addDLLink(label,urlv){
  const wrap=document.getElementById('dlLinksWrap'); if(!wrap)return;
  const row=document.createElement('div');
  row.className='dl-row'; row.style.cssText='display:flex;gap:7px;align-items:center';
  row.innerHTML=`
    <input class="fc dl-lbl" placeholder="Label" value="${esc(label)}" style="flex:0 0 120px;font-size:12.5px;padding:8px 10px">
    <input class="fc dl-url" placeholder="https://…" value="${esc(urlv)}" style="flex:1;font-size:12.5px;padding:8px 10px">
    <button type="button" class="btn btn-del btn-xs" onclick="this.closest('.dl-row').remove()">✕</button>`;
  wrap.appendChild(row);
  row.querySelector('.dl-url').focus();
}
function collectDLLinks(){
  return Array.from(document.querySelectorAll('#dlLinksWrap .dl-row')).map(row=>({
    label:(row.querySelector('.dl-lbl')?.value||'').trim()||'Download',
    url:(row.querySelector('.dl-url')?.value||'').trim()
  })).filter(l=>l.url);
}

/* =====================================================
   SECURE LINK STORE — URLs never exposed to DOM/HTML
===================================================== */
const _linkStore = {};
function _storLink(url){
  if(!url) return '';
  const key = Math.random().toString(36).slice(2,10)+Date.now().toString(36);
  _linkStore[key] = url;
  return key;
}

/* =====================================================
   IN-APP VIEWER — opens all links inside the app
===================================================== */
function openInApp(url, title, forceDownload){
  if(!url){ toast('Link not available','error'); return; }
  const ov = document.getElementById('inappOv');
  if(!ov) return;

  const isYT = url.includes('youtube.com')||url.includes('youtu.be');
  const isPDF = url.toLowerCase().includes('.pdf') || url.includes('application/pdf');
  const isGDrive = url.includes('drive.google.com');

  // Convert Google Drive share links to embed/preview
  let embedUrl = url;
  if(isGDrive && url.includes('/file/d/')){
    const m = url.match(/\/file\/d\/([^/]+)/);
    if(m) embedUrl = `https://drive.google.com/file/d/${m[1]}/preview`;
  } else if(isGDrive && url.includes('id=')){
    const m = url.match(/id=([^&]+)/);
    if(m) embedUrl = `https://drive.google.com/file/d/${m[1]}/preview`;
  } else if(isYT){
    embedUrl = getYTEmbed(url)+'?rel=0&modestbranding=1&playsinline=1';
  } else if(isPDF){
    embedUrl = `https://docs.google.com/viewer?url=${encodeURIComponent(url)}&embedded=true`;
  }

  ov.style.display = 'flex';
  ov.className = 'inapp-overlay';
  ov.innerHTML = `
  <div class="inapp-topbar">
    <button class="inapp-back" onclick="closeInApp()" title="Back">
      <i class="fas fa-arrow-left"></i>
    </button>
    <div class="inapp-title">${esc(title||'Document')}</div>
  </div>
  <div class="inapp-body" id="inappBody">
    <div class="inapp-loading" id="inappLoading">
      <div class="spinner"></div>
      <span>Loading…</span>
    </div>
    <iframe class="inapp-frame" id="inappFrame"
      src="${esc(embedUrl)}"
      allowfullscreen
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen"
      sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-presentation allow-top-navigation-by-user-activation"
      referrerpolicy="no-referrer-when-downgrade"
      style="opacity:0;transition:opacity .3s"
      onload="const l=document.getElementById('inappLoading');if(l)l.style.display='none';this.style.opacity='1'">
    </iframe>
  </div>`;
}

/* Open an attachment from within the video player.
   Shows note inline below Teacher's Notes section — video keeps playing! */
function openNoteFromPlayer(url, title){
  const inv = document.getElementById('vpInlineNoteViewer');
  if(inv){
    const iframe  = document.getElementById('vpInvIframe');
    const titleEl = document.getElementById('vpInvTitle');

    // Convert to embeddable URL (same logic as openInApp)
    let embedUrl = url;
    const isGDrive = url.includes('drive.google.com');
    const isYT = url.includes('youtube.com')||url.includes('youtu.be');
    const isPDF = url.toLowerCase().includes('.pdf')||url.includes('application/pdf');
    if(isGDrive && url.includes('/file/d/')){
      const m = url.match(/\/file\/d\/([^/?]+)/);
      if(m) embedUrl = `https://drive.google.com/file/d/${m[1]}/preview`;
    } else if(isGDrive && url.includes('id=')){
      const m = url.match(/id=([^&]+)/);
      if(m) embedUrl = `https://drive.google.com/file/d/${m[1]}/preview`;
    } else if(isYT){
      embedUrl = getYTEmbed(url)+'?rel=0&modestbranding=1&playsinline=1';
    } else if(isPDF){
      embedUrl = `https://docs.google.com/viewer?url=${encodeURIComponent(url)}&embedded=true`;
    }

    if(iframe)  iframe.src = embedUrl;
    if(titleEl) titleEl.textContent = title;
    vpZoomReset(); // reset zoom for each new note
    inv.classList.add('inv-open');
    // Smooth scroll down to the note viewer
    setTimeout(()=> inv.scrollIntoView({behavior:'smooth', block:'start'}), 80);
    return;
  }
  // Fallback: open in full in-app overlay
  openInApp(url, title);
}

/* ── Note viewer zoom state ── */
let _vpZoomLevel = 1.0;

function vpZoom(delta){
  _vpZoomLevel = Math.min(3, Math.max(0.5, _vpZoomLevel + delta));
  const wrap = document.getElementById('vpInvZoomWrap');
  const val  = document.getElementById('vpZoomVal');
  if(wrap) wrap.style.transform = `scale(${_vpZoomLevel})`;
  if(val)  val.textContent = Math.round(_vpZoomLevel * 100) + '%';
}

function vpZoomReset(){
  _vpZoomLevel = 1.0;
  const wrap = document.getElementById('vpInvZoomWrap');
  const val  = document.getElementById('vpZoomVal');
  if(wrap) wrap.style.transform = 'scale(1)';
  if(val)  val.textContent = '100%';
}

function closeInlineNote(){
  const inv = document.getElementById('vpInlineNoteViewer');
  if(!inv) return;
  inv.classList.remove('inv-open');
  const iframe = document.getElementById('vpInvIframe');
  if(iframe) iframe.src = 'about:blank';
  vpZoomReset(); // reset zoom on close
  // Scroll back to Teacher's Notes section heading
  const sec = inv.closest('.vp-section');
  if(sec) setTimeout(()=>sec.scrollIntoView({behavior:'smooth',block:'start'}),80);
}

function closeInApp(){
  const ov = document.getElementById('inappOv');
  if(S.vpReturnState){
    const rs = S.vpReturnState;
    S.vpReturnState = null;
    S.vpLastTime = rs.startTime || 0;
    // Re-register the URL under the saved key in case it was GC'd
    if(rs.url) _linkStore[rs.key] = rs.url;
    openYTPlayer(rs.contentId, rs.key, rs.name, rs.viewCount);
    return;
  }
  clearInterval(S._ytPollTimer); S._ytPollTimer = null;
  S.vpLastTime = 0; S._vpOpenState = null;
  if(ov){ ov.style.display='none'; ov.innerHTML=''; }
}

function openExternal(key){
  const url = _linkStore[key];
  if(!url){ toast('Link not available','error'); return; }
  const a = document.createElement('a');
  a.href=url; a.target='_blank'; a.rel='noopener noreferrer';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

function downloadFile(key, label){
  const url = _linkStore[key];
  if(!url){ toast('Link not available','error'); return; }
  // Hidden iframe triggers download without leaving app or opening new tab
  let fr = document.getElementById('_dlFrame');
  if(!fr){
    fr = document.createElement('iframe');
    fr.id = '_dlFrame';
    fr.style.cssText = 'display:none;width:0;height:0;border:none;position:fixed;top:-9999px';
    document.body.appendChild(fr);
  }
  fr.src = url;
  toast('Download started…', 'success');
}

async function viewContentSecure(id, key, name){
  const uid2 = S.user?.id||'anon';
  const url  = _linkStore[key] || '';
  if(!url){ toast('Link not available','error'); return; }

  // Track unique view
  const {data:item} = await sb.from('content').select('viewers,views').eq('id',id).single();
  const viewers = item?.viewers||[];
  if(!viewers.includes(uid2)){
    viewers.push(uid2);
    await sb.from('content').update({viewers,views:viewers.length}).eq('id',id);
  }
  const viewCount = viewers.length;
  const el = document.getElementById(`ci_${id}`);
  if(el){ const m=el.querySelector('[data-views]'); if(m) m.innerHTML=`<i class="fas fa-eye"></i> ${viewCount} view${viewCount!==1?'s':''}`; }

  const isYT = url.includes('youtube.com')||url.includes('youtu.be');

  if(isYT){
    // Always open YouTube inline — no choice modal, no external option
    openYTPlayer(id, key, name, viewCount);
  } else {
    openInApp(url, name);
    toast(viewers.includes(uid2) && viewers.indexOf(uid2)<viewers.length-1 ? 'Already counted' : 'View recorded','info');
  }
}

      sb.from('content_attached_notes').select('*').eq('content_id',contentId).order('ts'),
    ]);

    const likes = likesRes.data||[];
    const comments = commentsRes.data||[];
    const privNotes = privRes.data||[];
    const attached = attachedRes.data||[];

    ? `<img src="${esc(author.photo)}" alt="">`
    : `<span style="font-weight:800">${(author.name||'?').charAt(0).toUpperCase()}</span>`;
  return `
  <div class="vp-comment" id="vpcmt_${c.id}">
    <div class="vp-c-av">${av}</div>
    <div class="vp-c-body">
      <div class="vp-c-header">

}

async function toggleVideoLike(contentId){

  if(btn) btn.disabled=true;

    await sb.from('content_likes').delete().eq('content_id',contentId).eq('user_id',uid2);

  }

/* ── Post comment ── */
async function postComment(contentId){
  const inp = document.getElementById('vpCmtInp');
  const text = (inp?.value||'').trim();
  if(!text){ toast('Write something first','warning'); return; }
  await sb.from('content_comments').insert({id:uid(),content_id:contentId,user_id:S.user.id,text,ts:now()});
  if(inp){inp.value='';inp.style.height='auto';}
  await refreshComments(contentId);
}

async function editComment(commentId, cur){
  const el = document.getElementById(`vpcmtTxt_${commentId}`);
  if(!el) return;
  el.innerHTML = `<div style="display:flex;gap:7px;margin-top:3px">
    <input class="fc" id="ecInp_${commentId}" value="${esc(cur)}" style="flex:1;font-size:13px;padding:7px 10px">
    <button class="btn btn-p btn-xs" onclick="saveCommentEdit('${commentId}')"><i class="fas fa-save"></i></button>
    <button class="btn btn-ghost btn-xs" onclick="refreshComments('${S.vpContentId||''}')"><i class="fas fa-times"></i></button>
  </div>`;
  document.getElementById(`ecInp_${commentId}`)?.focus();
}

async function saveCommentEdit(cid){
  const text=(document.getElementById(`ecInp_${cid}`)?.value||'').trim();
  if(!text){toast('Comment cannot be empty','warning');return;}
  await sb.from('content_comments').update({text}).eq('id',cid);
  toast('Updated','success');
  await refreshComments(S.vpContentId||'');
}

async function deleteComment(cid, contentId){
  await sb.from('content_comments').delete().eq('id',cid);
  toast('Deleted','warning');
  await refreshComments(contentId||S.vpContentId||'');
}

async function refreshComments(contentId){
  if(!contentId) return;
  const {data:comments}=await sb.from('content_comments').select('*').eq('content_id',contentId).order('ts');
  const uid2=S.user?.id||'';
  const allUids=[...new Set((comments||[]).map(c=>c.user_id).filter(Boolean))];
  let peers=[];
  if(allUids.length){const {data:ps}=await sb.from('profiles').select('id,name,photo,role').in('id',allUids);peers=ps||[];}
  const box=document.getElementById('vpCmtList');
  const cnt=document.getElementById('vpCmtCount');
  if(box) box.innerHTML=(comments||[]).length
    ?(comments||[]).map(c=>renderVPComment(c,uid2,peers)).join('')
    :`<div style="font-size:13px;color:var(--text3)"><i class="fas fa-comment-slash"></i> No comments yet.</div>`;
  if(cnt) cnt.textContent=`(${(comments||[]).length})`;
}

async function teacherAnalytics(){
  const uid2=S.user.id;
  const {data:myBatches}=await sb.from('batches').select('*').eq('teacher_id',uid2);
  const bArr=myBatches||[];
  const bIds=bArr.map(b=>b.id);
  const {data:subs}=await sb.from('subjects').select('*').in('batch_id',bIds.length?bIds:['none']);
  const sArr=subs||[]; const sIds=sArr.map(s=>s.id);
  const {data:chaps}=await sb.from('chapters').select('*').in('subject_id',sIds.length?sIds:['none']);
  const cArr=chaps||[]; const cIds=cArr.map(c=>c.id);
  const {data:cont}=await sb.from('content').select('*').in('chapter_id',cIds.length?cIds:['none']);
  const allCont=cont||[];
  const totalViews=allCont.reduce((n,c)=>n+(c.views||0),0);
  const top=[...allCont].sort((a,b)=>(b.views||0)-(a.views||0)).slice(0,5);
  const batchViews=bArr.map(b=>{
    const bSubs=sArr.filter(s=>s.batch_id===b.id);
    const bChaps=cArr.filter(c=>bSubs.some(s=>s.id===c.subject_id));
    const bCont=allCont.filter(c=>bChaps.some(ch=>ch.id===c.chapter_id));
    return {name:b.name.slice(0,12),views:bCont.reduce((n,c)=>n+(c.views||0),0)};
  });
  const maxV=Math.max(...batchViews.map(b=>b.views),1);
  return `
  <div class="g4" style="margin-bottom:18px">
    <div class="stat"><div class="stat-ic ic-blue"><i class="fas fa-file-alt"></i></div><div><div class="stat-val">${allCont.length}</div><div class="stat-lbl">Content Items</div></div></div>
    <div class="stat"><div class="stat-ic ic-yellow"><i class="fas fa-eye"></i></div><div><div class="stat-val">${totalViews}</div><div class="stat-lbl">Unique Views</div></div></div>
    <div class="stat"><div class="stat-ic ic-green"><i class="fas fa-user-graduate"></i></div><div><div class="stat-val">${bArr.reduce((n,b)=>n+(b.students||[]).length,0)}</div><div class="stat-lbl">Students</div></div></div>
    <div class="stat"><div class="stat-ic ic-purple"><i class="fas fa-box"></i></div><div><div class="stat-val">${bArr.length}</div><div class="stat-lbl">Batches</div></div></div>
  </div>
  <div class="g2">
    <div class="card card-p24">
      <div class="sec-t"><i class="fas fa-chart-line"></i> Views by Batch</div>
      ${batchViews.length?`<div class="bar-chart">
        ${batchViews.map(bv=>`<div class="bar-w">
          <div class="bar" data-v="${bv.views}" style="height:${Math.max((bv.views/maxV)*90,4)}px"></div>
          <div class="bar-lbl">${esc(bv.name)}</div>
        </div>`).join('')}
      </div>`:'<div class="empty"><span class="empty-ic"><i class="fas fa-chart-line"></i></span><p>No data yet</p></div>'}
    </div>
    <div class="card card-p24">
      <div class="sec-t"><i class="fas fa-trophy"></i> Top Content</div>
      ${top.length?top.map((c,i)=>`
        <div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)">
          <span style="font-size:18px">${['<i class="fas fa-medal" style="color:#ffd700"></i>','<i class="fas fa-medal" style="color:#c0c0c0"></i>','<i class="fas fa-medal" style="color:#cd7f32"></i>','4.','5.'][i]}</span>
          <div style="flex:1;min-width:0">
            <div style="font-size:13px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(c.name)}</div>
            <div style="font-size:11px;color:var(--text2)">${c.type}</div>
          </div>
          <span class="badge b-blue">${c.views||0}</span>
        </div>
      `).join(''):'<div class="empty"><span class="empty-ic"><i class="fas fa-trophy"></i></span><p>No views yet</p></div>'}
    </div>
  </div>`;
}

async function renderStudentPage(){
  switch(S.sub){
    case 'batches':
      if(S.chapter) return await studentContentView();
      if(S.subject)  return await studentChapters();
      if(S.batch)    return await studentSubjects();
      return await studentBrowseBatches();
    case 'mybatches':
      if(S.chapter) return await studentContentView();
      if(S.subject)  return await studentChapters();
      if(S.batch)    return await studentSubjects();
      return await studentMyBatches();
    case 'attendance':  return await studentAttendance();
    case 'testseries':  return await studentTestSeries();
    case 'timer':       return await studentTimer();
    case 'bookmarks':   return await studentBookmarks();
    case 'announcements': return await studentAnnouncements();
    case 'tests':         return await studentTests();
    case 'chat':          return await renderChatList();

async function joinBatch(id){
  const {data:b}=await sb.from('batches').select('*').eq('id',id).single();

  students.push(S.user.id);
  await sb.from('batches').update({students}).eq('id',id);
  // notify teacher
  if(b.teacher_id) await pushNotif(b.teacher_id,'New Student',`${S.user.name} joined your batch "${b.name}"`);
  toast('Joined batch!','success'); render();

async function studentChapters(){
  const s=S.subject; const b=S.batch; const uid2=S.user.id;
  const {data:chaps}=await sb.from('chapters').select('*').eq('subject_id',s.id);
  const chapArr=chaps||[];

  // Fetch all content IDs and done IDs for this subject in one batch
  let progressMap={};
  try {
    const chapIds=chapArr.map(c=>c.id);
    if(chapIds.length){
      const [{data:allContent},{data:doneRows}]=await Promise.all([
        sb.from('content').select('id,chapter_id').in('chapter_id',chapIds),
        sb.from('content_done').select('content_id').eq('user_id',uid2)
      ]);
      const doneSet=new Set((doneRows||[]).map(d=>d.content_id));
      chapIds.forEach(cid=>{
        const total=(allContent||[]).filter(c=>c.chapter_id===cid).length;
        const done=(allContent||[]).filter(c=>c.chapter_id===cid&&doneSet.has(c.id)).length;
        progressMap[cid]={total,done,pct:total?Math.round(done/total*100):0};
      });
    }
  } catch(e){ /* content_done may not exist yet */ }

  return `
  <div class="bc">
    <span class="bc-a" onclick="S.batch=null;render()"><i class="fas fa-box"></i></span>
    <span class="bc-sep">/</span>
    <span class="bc-a" onclick="S.subject=null;render()">${esc(b.name)}</span>
    <span class="bc-sep">/</span>
    <span class="bc-cur"><i class="fas fa-book-open"></i> ${esc(s.name)}</span>
  </div>
  <div class="sec-t"><i class="fas fa-pen"></i> Chapters</div>
  ${chapArr.map(c=>{
    const prog=progressMap[c.id]||{total:0,done:0,pct:0};
    return `
    <div class="cp-row" onclick="S.chapter=${JSON.stringify(c).replace(/"/g,'&quot;')};render()" style="cursor:pointer">
      <div class="cp-icon">${c.logo?`<img src="${esc(c.logo)}" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:9px">`:'<i class="fas fa-pen"></i>'}</div>
      <div class="cp-info">
        <div class="cp-name">${esc(c.name)}</div>
        <div class="cp-bar-wrap">
          <div class="cp-bar"><div class="cp-bar-fill" style="width:${prog.pct}%"></div></div>
          <span class="cp-pct">${prog.pct}%</span>
        </div>
        <div style="font-size:11px;color:var(--text3);margin-top:3px">${prog.done}/${prog.total} items done</div>
      </div>
      ${prog.pct===100?`<span class="cp-done-badge"><i class="fas fa-check-circle"></i> Done</span>`:`<span class="ia">›</span>`}
    </div>`;
  }).join('')||'<div class="empty"><span class="empty-ic"><i class="fas fa-pen"></i></span><p>No chapters yet</p></div>'}`;
}

   ── ONLINE STATUS ──
===================================================== */
async function pingOnline(){
  if(!S.user || S.user.role==='admin' || S.user.id==='admin') return;
  const ts = Date.now();
  const {error} = await sb.from('profiles').update({last_active:ts}).eq('id',S.user.id);
  if(error){
    // Column doesn't exist yet — show one-time warning
    if(!S._presenceWarnShown){
      S._presenceWarnShown = true;
      console.warn('[FreeStudy] last_active column missing. Run SQL from Admin → DB Setup.');
      toast('Run DB Setup SQL to enable Online Status','warning');
    }
    return;
  }
  // Success — update our own entry in chatPeers cache so our status is correct too
  const myIdx = S.chatPeers.findIndex(p=>p.id===S.user.id);
  if(myIdx>=0) S.chatPeers[myIdx].last_active = ts;
}
function isOnline(last_active){
  if(!last_active) return false;
  return (Date.now()-last_active)<45000; // 45s — handles slow networks & tab visibility loss
}

// Refresh all visible online rings using cached last_active values
// Called every 30s as a fallback when realtime is slow
function refreshOnlineRings(){
  document.querySelectorAll('.chat-contact[data-pid]').forEach(el=>{
    const pid=el.dataset.pid;
    const peer=S.chatPeers.find(p=>p.id===pid);
    if(!peer) return;
    const online=isOnline(peer.last_active);
    const ring=el.querySelector('.online-ring');
    if(ring) ring.className=`online-ring ${online?'on':'off'}`;
  });
  // Also refresh header if chat open
  if(S.chatWith && S.chatWith!=='admin'){
    const peer=S.chatPeers.find(p=>p.id===S.chatWith);
    if(!peer) return;
    const hdrStatus=document.querySelector('.chat-hdr-status');
    if(!hdrStatus) return;
    const online=isOnline(peer.last_active);
    hdrStatus.className=`chat-hdr-status ${online?'on':'off'}`;
    if(online){
      hdrStatus.innerHTML='<i class="fas fa-circle" style="color:#22c55e"></i> Online';
    } else {
      const la=peer.last_active;
      if(!la){ hdrStatus.innerHTML='<i class="fas fa-circle" style="color:var(--text3)"></i> Offline'; return; }
      const diff=Date.now()-la;
      const mins=Math.floor(diff/60000);
      hdrStatus.textContent = mins<1 ? 'last seen just now'
        : mins<60 ? `last seen ${mins}m ago`
        : `last seen ${Math.floor(mins/60)}h ago`;
    }
  }
}
function onlineText(last_active){
  if(isOnline(last_active)) return '<div class="chat-hdr-status on"><i class="fas fa-circle" style="color:#22c55e"></i> Online</div>';
  if(!last_active) return '<div class="chat-hdr-status off"><i class="fas fa-circle" style="color:var(--text3)"></i> Offline</div>';
  const diff=Date.now()-last_active;
  const mins=Math.floor(diff/60000);
  if(mins<1)  return '<div class="chat-hdr-status off">last seen just now</div>';
  if(mins<60) return `<div class="chat-hdr-status off">last seen ${mins}m ago</div>`;
  const hrs=Math.floor(mins/60);
  if(hrs<24)  return `<div class="chat-hdr-status off">last seen ${hrs}h ago</div>`;
  return `<div class="chat-hdr-status off">last seen ${fmtD(last_active)}</div>`;
}

async function getChatPeers(){
  const uid2=S.user.id; const role=S.user.role;
  if(role==='admin'){
    // Admin: can message all teachers and students
    const {data}=await sb.from('profiles').select('*').in('role',['teacher','student']).order('name');
    return data||[];
  }
  if(role==='teacher'){
    const {data:myBatches}=await sb.from('batches').select('*').eq('teacher_id',uid2);
    const stuIds=[...new Set((myBatches||[]).flatMap(b=>b.students||[]))];
    let students=[];
    if(stuIds.length){ const {data}=await sb.from('profiles').select('*').in('id',stuIds); students=data||[]; }
    // Teacher can also message Admin
    const adminPeer={id:'admin',name:'Admin',role:'admin',email:'',photo:null,last_active:null};
    return [...students,adminPeer];
  }
  // Student: only teachers of their batches
  const {data:batches}=await sb.from('batches').select('teacher_id').contains('students',[uid2]);
  const tIds=[...new Set((batches||[]).map(b=>b.teacher_id).filter(Boolean))];
  if(!tIds.length) return [];
  const {data}=await sb.from('profiles').select('*').in('id',tIds);
  return data||[];
}

async function markMsgsSeen(peerId){
  const uid2=S.user.id; const seenAt=Date.now();
  try {
    // Mark all unread messages from this peer as seen (sets blue tick on sender's side)
    const {error} = await sb.from('messages')
      .update({is_read:true, seen_at:seenAt})
      .eq('receiver_id', uid2)
      .eq('sender_id', peerId)
      .or('is_read.eq.false,seen_at.is.null');
    if(error) console.warn('markMsgsSeen:', error.message);
  } catch(e){ /* ignore */ }
}

function getMsgTick(msg,myId){
  if((msg.sender_id||msg.from_id)!==myId) return ''; // receiver — no tick needed
  if(msg.seen_at)                          return '<span class="tick t-seen" title="Seen">✓✓</span>';
  if(msg.is_read || msg.read)              return '<span class="tick t-read" title="Delivered">✓✓</span>';
  return '<span class="tick t-sent" title="Sent">✓</span>';
}

function renderMsgBubble(m,uid2){
  const isMe=(m.sender_id||m.from_id)===uid2;
  return `
  <div class="chat-msg ${isMe?'me':'them'}" id="msg_${m.id}">
    <div class="chat-bubble">${esc(m.message_text||m.text||'')}</div>
    <div class="chat-meta">
      <span class="chat-ts">${fmtT(m.created_at||m.ts)}</span>
      ${getMsgTick(m,uid2)}
    </div>
  </div>`;
}

/* =====================================================
   ── CHAT v2 — MAIN RENDER ──
===================================================== */
async function renderChatList(){
  const uid2=S.user.id;
  const peers=await getChatPeers();
  S.chatPeers=peers;

  // Fetch fresh last_active for all peers in one query
  const peerIds=peers.filter(p=>p.id!=='admin').map(p=>p.id);
  let freshProfiles=[];
  if(peerIds.length){
    const {data:fp}=await sb.from('profiles').select('id,last_active').in('id',peerIds);
    freshProfiles=fp||[];
  }

  // Fetch last-message + unread count per peer
  const peerData=await Promise.all(peers.map(async p=>{
    const fresh=freshProfiles.find(f=>f.id===p.id);
    const msgs=await dbMsgs(uid2,p.id);
    const lastMsg=msgs[msgs.length-1]||null;
    const unread=msgs.filter(m=>(m.receiver_id||m.to_id)===uid2&&!m.is_read&&!m.read).length;
    // Merge fresh last_active into peer object
    return {...p,last_active:fresh?.last_active??p.last_active,lastMsg,unread};
  }));
  // Sort by last message timestamp
  peerData.sort((a,b)=>{
    const at=a.lastMsg?.created_at||a.lastMsg?.ts||0;
    const bt=b.lastMsg?.created_at||b.lastMsg?.ts||0;
    return bt-at;
  });

  const contactsHtml=buildContactList(peerData,uid2,peerData);
  // Refresh presence after render (50ms so DOM is ready)
  setTimeout(fetchFreshPresence, 50);
  const rightHtml=S.chatWith
    ?await buildChatPanel(S.chatWith)
    :`<div class="chat-right-empty"><span style="font-size:52px"><i class="fas fa-comments"></i></span><span>Select a contact to start messaging</span></div>`;

  return `
  <div class="chat-wrap">
    <div class="chat-left ${S.chatWith?'mob-hidden':''}" id="chatLeft">
      <div class="chat-left-head">
        <div class="chat-left-title"><i class="fas fa-comments"></i> Messages</div>
        <div class="chat-search-wrap">
          <span class="chat-search-ic"><i class="fas fa-search"></i></span>
          <input class="chat-search-inp" placeholder="Search contacts…"
            value="${esc(S.msgSearch)}"
            oninput="S.msgSearch=this.value;renderContactSearch(this.value)">
        </div>
      </div>
      <div class="chat-contacts" id="chatContactsList">${contactsHtml}</div>
    </div>
    <div class="chat-right ${S.chatWith?'':'mob-hidden'}" id="chatRight">
      ${rightHtml}
    </div>
  </div>`;
}

async function sendMsg(toId){
  const inp=document.getElementById('chatInput');
  const text=(inp?.value||'').trim(); if(!text)return;
  inp.value=''; inp.focus();
  const senderId = S.user.id;  // 'admin' literal for admin, UUID for others
  const senderRole = S.user.role||'student';
  let receiverRole = 'student';
  if(toId==='admin') receiverRole='admin';
  else { const p=S.chatPeers.find(x=>x.id===toId); receiverRole=p?.role||'student'; }
  const msg={
    id:uid(), sender_id:senderId, sender_role:senderRole,
    receiver_id:toId, receiver_role:receiverRole,
    message_text:text, created_at:Date.now(),
    is_read:false, seen_at:null
  };
  const {error:msgErr} = await sb.from('messages').insert(msg);
  if(msgErr){ toast('Failed to send: '+msgErr.message,'error'); return; }
  appendChatMsg(msg);
  // Note: NO pushNotif here — chat messages must NOT appear in the notifications tab.
  // The receiver sees a toast via realtime subscription on messages table.
}

async function renderNotifs(targetId){
  const allNotifs=await dbNotifs(targetId);
  // Filter out old chat-message notifications (they were pushed before v4 fix)
  // Chat messages should never appear in this tab — only system notifications
  const notifs=allNotifs.filter(n=>!(n.title||'').startsWith('<i class="fas fa-comments"></i>'));
  // mark all read
  await sb.from('notifications').update({read:true}).eq('user_id',targetId);
  S.unreadNotifs=0;

  // Notification icon map
  function notifIcon(title){
    if((title||'').startsWith('<i class="fas fa-bullhorn"></i>')) return '<i class="fas fa-bullhorn"></i>';
    if((title||'').startsWith('<i class="fas fa-check-circle"></i>')) return '<i class="fas fa-check-circle"></i>';
    
    if((title||'').startsWith('<i class="fas fa-user-check"></i>')) return '<i class="fas fa-user-check"></i>';
    return '<i class="fas fa-bell"></i>';
  }

  return `
  <div class="sec-t"><i class="fas fa-bell"></i> Notifications</div>
  ${(!pushGranted()&&pushSupported())?`
  <div class="push-prompt" onclick="requestPushPermission()">
    <div class="push-ic"><i class="fas fa-bell"></i></div>
    <div class="push-text">
      <strong>Enable Push Notifications</strong>
      <span>Get alerts even when the app is in background — new messages, announcements & more</span>
    </div>
    <button class="btn btn-p btn-sm" onclick="event.stopPropagation();requestPushPermission()">Enable</button>
  </div>`:''}
  ${notifs.length?notifs.map(n=>`
    <div class="notif ${n.read?'':'unread'}">
      <div class="notif-ic">${notifIcon(n.title)}</div>
      <div>
        <div class="notif-t">${esc(n.title)}</div>
        <div class="notif-m">${esc(n.msg)}</div>
        <div class="notif-tm">${fmtD(n.ts)} · ${fmtT(n.ts)}</div>
      </div>
    </div>
  `).join(''):'<div class="empty"><span class="empty-ic"><i class="fas fa-bell"></i></span><p>All caught up!</p></div>'}`;
}
