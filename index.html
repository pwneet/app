<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>FreeStudy — by TushyaSharma</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>

/* =========================================
   GOOGLE FONTS
   ========================================= */
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap');

/* =========================================
   CSS VARIABLES
   ========================================= */

/* ── DARK MODE: Black + White + Green accent ── */
:root {
  --bg:       #0a0a0a;
  --bg2:      #111111;
  --bg3:      #1a1a1a;
  --card:     #141414;
  --card2:    #1c1c1c;
  --border:   #2a2a2a;
  --border2:  #333333;
  --text:     #ffffff;
  --text2:    #a0a0a0;
  --text3:    #555555;
  --accent:   #22c55e;
  --accent2:  #16a34a;
  --accent3:  #4ade80;
  --success:  #22c55e;
  --warning:  #f59e0b;
  --danger:   #ef4444;
  --pink:     #4ade80;
  --sidebar:  248px;
  --r:        12px;
  --r2:       8px;
  --shadow:   0 4px 24px rgba(0,0,0,.7);
  --shadowlg: 0 12px 48px rgba(0,0,0,.8);
  --glow:     0 0 32px rgba(34,197,94,.15);
}

/* ── LIGHT MODE: White + Black + Blue accent ── */
[data-theme="light"] {
  --bg:      #ffffff;
  --bg2:     #fafafa;
  --bg3:     #f4f4f4;
  --card:    #ffffff;
  --card2:   #f8f8f8;
  --border:  #e5e5e5;
  --border2: #d4d4d4;
  --text:    #0a0a0a;
  --text2:   #525252;
  --text3:   #a3a3a3;
  --accent:  #1d4ed8;
  --accent2: #1e3a8a;
  --accent3: #3b82f6;
  --success: #16a34a;
  --warning: #d97706;
  --danger:  #dc2626;
  --pink:    #1d4ed8;
  --shadow:   0 4px 16px rgba(0,0,0,.06);
  --shadowlg: 0 12px 36px rgba(0,0,0,.1);
  --glow:     0 0 24px rgba(29,78,216,.1);
}

/* =========================================
   COPY PROTECTION
   ========================================= */
* {
  -webkit-user-select: none !important;
  -moz-user-select: none !important;
  -ms-user-select: none !important;
  user-select: none !important;
  -webkit-touch-callout: none !important;
}
input, textarea {
  -webkit-user-select: text !important;
  -moz-user-select: text !important;
  user-select: text !important;
}
img {
  pointer-events: none !important;
  -webkit-user-drag: none !important;
  user-drag: none !important;
}


*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body {
  font-family:'Plus Jakarta Sans', system-ui, sans-serif;
  background:var(--bg); color:var(--text);
  min-height:100vh; overflow-x:hidden;
  transition:background .25s, color .25s;
  font-size:14px; line-height:1.5;
}
::-webkit-scrollbar { width:5px; height:5px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border2); border-radius:4px; }
a { text-decoration:none; color:inherit; }
button { font-family:inherit; }
input, select, textarea { font-family:inherit; }

/* =====================================================
   TUSHYA AI WIDGET
===================================================== */
/* FAB */
#tai-fab {
  position:fixed; bottom:24px; right:24px; z-index:9997;
  width:58px; height:58px; border-radius:16px;
  background:linear-gradient(145deg,#1d4ed8,#2563eb);
  border:none; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 8px 28px rgba(37,99,235,.5),0 0 0 1px rgba(59,130,246,.25);
  transition:transform .2s,box-shadow .2s;
}
#tai-fab:hover { transform:translateY(-3px); box-shadow:0 14px 36px rgba(37,99,235,.65),0 0 0 1px rgba(59,130,246,.35); }
#tai-fab i { font-size:22px; color:#fff; transition:all .2s; }
#tai-fab .tai-ic-close { display:none; }
#tai-fab.open .tai-ic-chat { display:none; }
#tai-fab.open .tai-ic-close { display:block; }
#tai-fab .tai-notif-dot {
  position:absolute; top:-4px; right:-4px;
  width:13px; height:13px; border-radius:50%;
  background:var(--accent); border:2px solid var(--bg);
  animation:taiPing 2s ease-in-out infinite;
}
@keyframes taiPing { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.25);opacity:.7} }

/* PANEL */
#tai-panel {
  position:fixed; bottom:96px; right:24px; z-index:9996;
  width:390px; max-width:calc(100vw - 28px);
  height:590px; max-height:calc(100vh - 118px);
  background:var(--bg2); border:1px solid var(--border);
  border-radius:20px;
  box-shadow:0 32px 80px rgba(0,0,0,.75),0 0 0 1px rgba(37,99,235,.18);
  display:flex; flex-direction:column; overflow:hidden;
  transform:translateY(18px) scale(.96);
  opacity:0; pointer-events:none;
  transition:transform .3s cubic-bezier(.34,1.46,.64,1),opacity .22s ease;
}
#tai-panel.tai-open { transform:translateY(0) scale(1); opacity:1; pointer-events:all; }

/* HEADER */
.tai-hdr {
  padding:15px 16px; flex-shrink:0;
  background:linear-gradient(135deg,rgba(37,99,235,.15) 0%,rgba(37,99,235,.04) 100%);
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:11px;
}
.tai-hdr-logo {
  width:40px; height:40px; border-radius:12px; flex-shrink:0;
  background:linear-gradient(145deg,#1d4ed8,#2563eb);
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 4px 14px rgba(37,99,235,.4); position:relative;
}
.tai-hdr-logo i { font-size:18px; color:#fff; }
.tai-hdr-logo .tai-online-dot {
  position:absolute; bottom:-2px; right:-2px;
  width:11px; height:11px; border-radius:50%;
  background:var(--accent); border:2px solid var(--bg2);
}
.tai-hdr-info { flex:1; min-width:0; }
.tai-hdr-name {
  font-weight:800; font-size:14.5px; color:var(--text);
  letter-spacing:.1px;
}
.tai-hdr-status { font-size:11px; color:var(--accent); font-weight:600; margin-top:1px; }
.tai-hdr-actions { display:flex; gap:6px; }
.tai-hdr-btn {
  width:30px; height:30px; border-radius:8px;
  background:transparent; border:1px solid var(--border);
  color:var(--text3); cursor:pointer; font-size:12px;
  display:flex; align-items:center; justify-content:center;
  transition:all .15s;
}
.tai-hdr-btn:hover { background:var(--bg3); color:var(--text2); border-color:var(--border2); }
.tai-hdr-btn.tai-remove-btn:hover { background:rgba(239,68,68,.1); color:var(--danger); border-color:rgba(239,68,68,.25); }

/* MODE TABS */
.tai-tabs {
  display:flex; flex-shrink:0; overflow-x:auto; scrollbar-width:none;
  background:var(--bg); border-bottom:1px solid var(--border);
}
.tai-tabs::-webkit-scrollbar { display:none; }
.tai-tab {
  flex:1; min-width:72px; padding:9px 4px;
  border:none; background:transparent;
  color:var(--text3); cursor:pointer;
  font-family:inherit; font-size:10.5px; font-weight:700;
  display:flex; flex-direction:column; align-items:center; gap:3px;
  border-bottom:2px solid transparent;
  transition:all .17s; letter-spacing:.3px;
}
.tai-tab i { font-size:13px; }
.tai-tab:hover { color:var(--accent3); background:rgba(37,99,235,.06); }
.tai-tab.tai-tab-active { color:#3b82f6; border-bottom-color:#2563eb; background:rgba(37,99,235,.07); }
[data-theme="light"] .tai-tab.tai-tab-active { color:#1d4ed8; border-bottom-color:#1d4ed8; }

/* MESSAGES */
.tai-msgs {
  flex:1; overflow-y:auto; padding:14px 12px;
  display:flex; flex-direction:column; gap:12px;
  scroll-behavior:smooth;
}
.tai-msgs::-webkit-scrollbar { width:3px; }
.tai-msgs::-webkit-scrollbar-thumb { background:var(--border2); border-radius:4px; }

.tai-row { display:flex; align-items:flex-end; gap:7px; animation:taiIn .22s ease; }
@keyframes taiIn { from{opacity:0;transform:translateY(9px)} to{opacity:1;transform:translateY(0)} }
.tai-row.tai-user { flex-direction:row-reverse; }

.tai-av {
  width:28px; height:28px; border-radius:8px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center; font-size:12px;
}
.tai-row.tai-ai .tai-av {
  background:linear-gradient(145deg,#1d4ed8,#2563eb);
  color:#fff; box-shadow:0 2px 8px rgba(37,99,235,.3);
}
.tai-row.tai-user .tai-av {
  background:var(--bg3); color:var(--text3); border:1px solid var(--border);
}

.tai-bub {
  max-width:80%; padding:10px 13px;
  font-size:13px; line-height:1.65; color:var(--text);
}
.tai-row.tai-ai .tai-bub {
  background:var(--card); border:1px solid var(--border);
  border-radius:14px 14px 14px 3px;
}
.tai-row.tai-user .tai-bub {
  background:linear-gradient(135deg,#1e3a8a,#1d4ed8);
  border:1px solid rgba(59,130,246,.3);
  border-radius:14px 14px 3px 14px;
  color:#dbeafe;
}
.tai-bub strong { color:#60a5fa; font-weight:600; }
.tai-bub code {
  background:rgba(37,99,235,.12); color:#93c5fd;
  padding:1px 5px; border-radius:4px;
  font-size:11.5px; font-family:'JetBrains Mono',monospace;
}
[data-theme="light"] .tai-bub strong { color:#1d4ed8; }
[data-theme="light"] .tai-row.tai-user .tai-bub { background:linear-gradient(135deg,#1e3a8a,#1d4ed8); }

.tai-ts { font-size:10px; color:var(--text3); margin-top:2px; padding:0 3px; }
.tai-row.tai-user .tai-ts { text-align:right; }

/* TYPING */
.tai-typing .tai-bub { display:flex; gap:5px; align-items:center; padding:13px 14px; }
.tai-dot { width:6px; height:6px; border-radius:50%; background:#3b82f6; animation:taiDot 1.1s ease-in-out infinite; }
.tai-dot:nth-child(2) { animation-delay:.18s; background:#2563eb; }
.tai-dot:nth-child(3) { animation-delay:.36s; background:var(--accent); }
@keyframes taiDot { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-7px)} }

/* CHIPS */
.tai-chips {
  padding:7px 12px 4px; display:flex; gap:5px;
  flex-wrap:wrap; flex-shrink:0;
  border-top:1px solid var(--border); background:var(--bg);
}
.tai-chip {
  font-size:11px; font-weight:600; padding:4px 10px;
  border-radius:7px; cursor:pointer;
  border:1px solid var(--border); background:var(--bg3);
  color:var(--text2); transition:all .14s;
  display:flex; align-items:center; gap:4px; font-family:inherit;
}
.tai-chip i { font-size:9.5px; }
.tai-chip:hover { border-color:rgba(37,99,235,.45); color:#60a5fa; background:rgba(37,99,235,.1); }

/* INPUT */
.tai-inp-row {
  padding:9px 12px 11px; display:flex; align-items:flex-end; gap:7px;
  border-top:1px solid var(--border); flex-shrink:0; background:var(--bg2);
}
#tai-input {
  flex:1; background:var(--bg); border:1px solid var(--border);
  border-radius:11px; padding:9px 12px;
  font-size:13px; font-family:inherit; color:var(--text);
  resize:none; outline:none; min-height:38px; max-height:90px;
  line-height:1.55; overflow-y:auto; transition:border-color .2s;
}
#tai-input::placeholder { color:var(--text3); }
#tai-input:focus { border-color:rgba(37,99,235,.5); box-shadow:0 0 0 3px rgba(37,99,235,.08); }
#tai-send {
  width:38px; height:38px; border-radius:10px; flex-shrink:0;
  background:linear-gradient(145deg,#1d4ed8,#2563eb);
  border:none; cursor:pointer; color:#fff; font-size:14px;
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 4px 12px rgba(37,99,235,.35);
  transition:transform .14s,opacity .14s;
}
#tai-send:hover { transform:translateY(-1px); }
#tai-send:disabled { opacity:.35; cursor:not-allowed; transform:none; }

/* FOOTER */
.tai-footer {
  padding:5px 12px 9px; text-align:center;
  font-size:10px; font-weight:600; color:var(--text3);
  flex-shrink:0; background:var(--bg2);
  display:flex; align-items:center; justify-content:center; gap:4px;
  letter-spacing:.3px;
}
.tai-footer i { font-size:9px; color:#3b82f6; }
.tai-footer span { color:#60a5fa; }

/* WELCOME CARD */
.tai-welcome {
  padding:13px; border-radius:12px;
  background:linear-gradient(135deg,rgba(37,99,235,.1),rgba(37,99,235,.03));
  border:1px solid rgba(37,99,235,.18);
}
.tai-welcome-title {
  font-weight:800; font-size:13.5px; color:var(--text);
  margin-bottom:4px; display:flex; align-items:center; gap:6px;
}
.tai-welcome-title i { color:#60a5fa; }
.tai-welcome-sub { font-size:12px; color:var(--text2); line-height:1.6; }
.tai-caps { display:flex; gap:5px; margin-top:9px; flex-wrap:wrap; }
.tai-cap {
  font-size:10px; font-weight:700; padding:3px 8px;
  border-radius:5px; display:flex; align-items:center; gap:3px;
}
.tai-cap.tc-blue { background:rgba(37,99,235,.12); color:#60a5fa; border:1px solid rgba(37,99,235,.2); }
.tai-cap.tc-green { background:rgba(34,197,94,.1); color:var(--accent); border:1px solid rgba(34,197,94,.2); }

/* HIDDEN state (remove button used) — persists in localStorage */
#tai-fab.tai-hidden, #tai-panel.tai-hidden { display:none !important; }

/* =====================================================
   AUTH PAGES
===================================================== */
.auth-page {
  min-height:100vh; display:flex; align-items:center;
  justify-content:center; padding:20px;
  background:var(--bg); position:relative; overflow:hidden;
}
.auth-orbs { position:absolute; inset:0; pointer-events:none; }
/* Dark = green orbs */
.auth-orbs::before {
  content:''; position:absolute;
  width:600px; height:600px; border-radius:50%;
  background:radial-gradient(circle, rgba(34,197,94,.10) 0%, transparent 65%);
  top:-260px; right:-180px; animation:orbFloat 9s ease-in-out infinite;
}
.auth-orbs::after {
  content:''; position:absolute;
  width:500px; height:500px; border-radius:50%;
  background:radial-gradient(circle, rgba(74,222,128,.07) 0%, transparent 65%);
  bottom:-180px; left:-160px; animation:orbFloat 12s ease-in-out infinite reverse;
}
/* Light = blue orbs */
[data-theme="light"] .auth-orbs::before {
  background:radial-gradient(circle, rgba(29,78,216,.09) 0%, transparent 65%);
}
[data-theme="light"] .auth-orbs::after {
  background:radial-gradient(circle, rgba(59,130,246,.07) 0%, transparent 65%);
}
@keyframes orbFloat {
  0%,100%{transform:translate(0,0) scale(1)}
  50%{transform:translate(20px,-20px) scale(1.04)}
}

.auth-card {
  background:var(--card); border:1px solid var(--border);
  border-radius:20px; padding:40px 36px;
  width:100%; max-width:420px;
  box-shadow:var(--shadowlg); position:relative; z-index:1;
  animation:slideUp .4s cubic-bezier(.22,.68,0,1.2);
}
.auth-head { text-align:center; margin-bottom:30px; }
.auth-logo-box {
  width:68px; height:68px; border-radius:18px;
  background:var(--accent);
  display:inline-flex; align-items:center; justify-content:center;
  font-size:30px; margin-bottom:14px;
  box-shadow:0 8px 24px rgba(34,197,94,.3);
}
[data-theme="light"] .auth-logo-box {
  box-shadow:0 8px 24px rgba(29,78,216,.25);
}
.auth-head h1 {
  font-size:26px; font-weight:800; letter-spacing:-.5px;
  color:var(--text);
}
.auth-head p { color:var(--text2); font-size:13px; margin-top:5px; }

/* =========================================
   FORM ELEMENTS
   ========================================= */
.fg { margin-bottom:15px; }
.fg label {
  display:block; font-size:11.5px; font-weight:700;
  color:var(--text2); margin-bottom:6px;
  text-transform:uppercase; letter-spacing:.6px;
}
.fc {
  width:100%; background:var(--bg3);
  border:1.5px solid var(--border); border-radius:10px;
  padding:11px 14px; color:var(--text); font-size:14px;
  outline:none; transition:border-color .2s, box-shadow .2s;
}
.fc:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(34,197,94,.12); }
[data-theme="light"] .fc:focus { box-shadow:0 0 0 3px rgba(29,78,216,.1); }
.fc:disabled { opacity:.55; cursor:not-allowed; }
select.fc option { background:var(--bg2); }

.fp-btn {
  width:100%; padding:12px; border-radius:10px;
  border:2px dashed var(--border2); background:transparent;
  color:var(--text2); font-size:13.5px; cursor:pointer;
  transition:all .2s; display:flex; align-items:center;
  justify-content:center; gap:8px; margin-bottom:14px;
}
.fp-btn:hover { border-color:var(--accent); color:var(--accent); background:rgba(59,130,246,.05); }

.auth-divider {
  display:flex; align-items:center; gap:10px;
  color:var(--text3); font-size:12px; margin:14px 0;
}
.auth-divider::before,.auth-divider::after {
  content:''; flex:1; height:1px; background:var(--border);
}
.auth-switch { text-align:center; margin-top:18px; color:var(--text2); font-size:13px; }
.auth-switch span { color:var(--accent); cursor:pointer; font-weight:700; }
.auth-switch span:hover { text-decoration:underline; }

/* ── PASSWORD TOGGLE ── */
.pw-wrap { position:relative; }
.pw-wrap .fc { padding-right:42px !important; }
.pw-toggle {
  position:absolute; right:12px; top:50%; transform:translateY(-50%);
  background:none; border:none; cursor:pointer; color:var(--text3);
  font-size:15px; padding:4px; transition:color .15s; line-height:1;
}
.pw-toggle:hover { color:var(--accent); }

/* =========================================
   DASHBOARD BATCH ICON BUTTONS
   ========================================= */
.dash-batch-ic-btn {
  display:flex; flex-direction:column; align-items:center; gap:10px;
  background:var(--card2); border:1.5px solid var(--border);
  border-radius:16px; padding:18px 10px; cursor:pointer;
  transition:all .2s; font-size:13px; font-weight:700; color:var(--text);
  font-family:inherit;
}
.dash-batch-ic-btn:hover {
  border-color:var(--accent); transform:translateY(-3px);
  box-shadow:var(--glow);
}
.dash-batch-ic-btn:active { transform:translateY(0); }
.dbi-icon {
  width:56px; height:56px; border-radius:16px;
  display:flex; align-items:center; justify-content:center;
  font-size:24px; color:#fff;
  box-shadow:0 6px 20px rgba(0,0,0,.25);
}

/* =========================================
   BUTTONS
   ========================================= */
.btn {
  display:inline-flex; align-items:center; justify-content:center;
  gap:6px; padding:10px 18px; border-radius:10px;
  border:none; font-size:13.5px; font-weight:700;
  cursor:pointer; transition:all .18s; white-space:nowrap;
}
.btn-p {
  background:var(--accent);
  color:#fff; box-shadow:0 4px 14px rgba(34,197,94,.25);
}
[data-theme="light"] .btn-p {
  box-shadow:0 4px 14px rgba(29,78,216,.2);
}
.btn-p:hover { transform:translateY(-1px); filter:brightness(1.1); box-shadow:0 6px 20px rgba(34,197,94,.35); }
[data-theme="light"] .btn-p:hover { box-shadow:0 6px 20px rgba(29,78,216,.3); }
.btn-sec { background:var(--bg3); color:var(--text); border:1px solid var(--border); }
.btn-sec:hover { background:var(--card2); border-color:var(--border2); }
.btn-ok  { background:linear-gradient(135deg,#059669,#047857); color:#fff; }
.btn-ok:hover  { box-shadow:0 4px 14px rgba(16,185,129,.35); }
.btn-del { background:linear-gradient(135deg,#dc2626,#b91c1c); color:#fff; }
.btn-del:hover { box-shadow:0 4px 14px rgba(239,68,68,.35); }
.btn-warn{ background:linear-gradient(135deg,#d97706,#b45309); color:#fff; }
.btn-warn:hover{ box-shadow:0 4px 14px rgba(245,158,11,.35); }
.btn-ghost{ background:transparent; color:var(--text2); border:1px solid var(--border); }
.btn-ghost:hover{ background:var(--bg3); color:var(--text); }
.btn-full { width:100%; }
.btn-lg { padding:13px 22px; font-size:15px; border-radius:12px; }
.btn-sm { padding:7px 13px; font-size:12px; border-radius:8px; gap:4px; }
.btn-xs { padding:5px 10px; font-size:11.5px; border-radius:7px; gap:3px; }
.row2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.row2 .fg { margin:0; }

/* =========================================
   APP LAYOUT
   ========================================= */
.app { display:flex; min-height:100vh; }

/* SIDEBAR */
.sidebar {
  width:var(--sidebar); background:var(--bg2);
  border-right:1px solid var(--border);
  display:flex; flex-direction:column;
  position:fixed; top:0; left:0; bottom:0; z-index:200;
  overflow-y:auto; overflow-x:hidden;
  transition:transform .3s cubic-bezier(.4,0,.2,1);
}
.sb-head { padding:20px 16px 14px; }
.sb-brand { display:flex; align-items:center; gap:10px; margin-bottom:3px; }
.sb-icon {
  width:38px; height:38px; border-radius:11px;
  background:var(--accent);
  display:flex; align-items:center; justify-content:center;
  font-size:18px; box-shadow:0 4px 12px rgba(34,197,94,.3); flex-shrink:0;
}
[data-theme="light"] .sb-icon { box-shadow:0 4px 12px rgba(29,78,216,.25); }
.sb-brand h2 { font-size:18px; font-weight:800; }
.sb-role {
  font-size:10.5px; color:var(--text3); font-weight:700;
  text-transform:uppercase; letter-spacing:.9px; padding-left:48px;
}
.sb-user {
  margin:10px 12px 4px; padding:11px 12px; border-radius:11px;
  background:var(--bg3); border:1px solid var(--border);
  display:flex; align-items:center; gap:10px;
}
.sb-av {
  width:36px; height:36px; border-radius:9px; flex-shrink:0;
  background:linear-gradient(135deg, var(--accent), var(--accent2));
  display:flex; align-items:center; justify-content:center;
  font-weight:800; font-size:14px; color:#fff; overflow:hidden;
}
.sb-av img { width:100%; height:100%; object-fit:cover; }
.sb-uname { font-weight:700; font-size:13px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.sb-uemail { font-size:11px; color:var(--text3); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.sb-nav { padding:8px 10px; flex:1; }
.nav-sec { font-size:10px; color:var(--text3); font-weight:800; text-transform:uppercase; letter-spacing:1.1px; padding:10px 10px 5px; }
.nav-item {
  display:flex; align-items:center; gap:10px;
  padding:10px 12px; border-radius:10px; cursor:pointer;
  color:var(--text2); font-size:13.5px; font-weight:600;
  transition:all .18s; margin-bottom:1px; position:relative; user-select:none;
}
.nav-item:hover { background:var(--bg3); color:var(--text); }
.nav-item.active {
  background:rgba(34,197,94,.1);
  color:var(--accent);
}
[data-theme="light"] .nav-item.active { background:rgba(29,78,216,.08); }
.nav-item.active::before {
  content:''; position:absolute; left:0; top:22%; bottom:22%;
  width:3px; border-radius:3px; background:var(--accent);
}
.ni-ic { font-size:16px; width:22px; text-align:center; flex-shrink:0; }
.nav-badge {
  background:var(--danger); color:#fff; font-size:10px;
  padding:1px 6px; border-radius:20px; font-weight:800; margin-left:auto;
}
.sb-foot { padding:12px; border-top:1px solid var(--border); }
.sb-action {
  display:flex; align-items:center; gap:9px; padding:10px 12px;
  border-radius:10px; cursor:pointer; font-size:13px; font-weight:600;
  transition:all .18s; color:var(--text2);
}
.sb-action:hover { background:var(--bg3); color:var(--text); }
.sb-logout { color:var(--danger); }
.sb-logout:hover { background:rgba(239,68,68,.08); color:var(--danger); }

/* MAIN */
.main { margin-left:var(--sidebar); flex:1; display:flex; flex-direction:column; min-height:100vh; }

/* TOPBAR */
.topbar {
  background:var(--bg2); border-bottom:1px solid var(--border);
  padding:13px 22px; display:flex; align-items:center;
  justify-content:space-between; position:sticky; top:0; z-index:100;
}
.tb-left { display:flex; align-items:center; gap:13px; }
.tb-title { font-size:18px; font-weight:800; letter-spacing:-.3px; }
.tb-right { display:flex; align-items:center; gap:8px; }
.tb-btn {
  width:36px; height:36px; border-radius:9px; background:var(--bg3);
  border:1px solid var(--border); color:var(--text);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; font-size:15px; transition:all .18s; position:relative;
}
.tb-btn:hover { background:var(--card2); border-color:var(--border2); }
.tb-dot {
  position:absolute; top:7px; right:7px; width:7px; height:7px;
  background:var(--danger); border-radius:50%; border:1.5px solid var(--bg2);
}
.hamburger { display:none; }

/* PAGE */
.pw { padding:22px; flex:1; }

/* =========================================
   GRID & CARDS
   ========================================= */
.g1{display:grid;gap:14px;}
.g2{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}

.card {
  background:var(--card); border:1px solid var(--border);
  border-radius:var(--r); padding:18px;
  transition:border-color .2s;
}
.card:hover { border-color:var(--border2); }
.card-p24 { padding:24px; }

/* STAT CARD */
.stat {
  display:flex; align-items:center; gap:15px;
  background:var(--card); border:1px solid var(--border);
  border-radius:var(--r); padding:18px;
}
.stat-ic {
  width:50px; height:50px; border-radius:13px;
  display:flex; align-items:center; justify-content:center;
  font-size:22px; flex-shrink:0;
}
.ic-blue   { background:rgba(59,130,246,.12); }
.ic-purple { background:rgba(109,40,217,.12); }
.ic-green  { background:rgba(16,185,129,.12); }
.ic-yellow { background:rgba(245,158,11,.12); }
.ic-pink   { background:rgba(236,72,153,.12); }
.ic-cyan   { background:rgba(6,182,212,.12); }
.ic-red    { background:rgba(239,68,68,.12);  }
.stat-val { font-size:28px; font-weight:800; line-height:1; }
.stat-lbl { font-size:12px; color:var(--text2); margin-top:4px; font-weight:500; }

/* SECTION TITLE */
.sec-t {
  font-size:15px; font-weight:800; margin-bottom:14px;
  display:flex; align-items:center; gap:7px; color:var(--text);
}
.sec-t-sm { font-size:13px; font-weight:700; margin-bottom:10px; display:flex; align-items:center; gap:6px; }

/* =========================================
   BREADCRUMB
   ========================================= */
.bc {
  display:flex; align-items:center; gap:6px; flex-wrap:wrap;
  font-size:12.5px; color:var(--text3); margin-bottom:14px;
}
.bc-a { cursor:pointer; transition:color .15s; }
.bc-a:hover { color:var(--accent); }
.bc-sep { color:var(--border2); }
.bc-cur { color:var(--text); font-weight:700; }

/* =========================================
   TABLE
   ========================================= */
.tw { overflow-x:auto; }
table { width:100%; border-collapse:collapse; font-size:13.5px; }
th {
  text-align:left; padding:10px 13px; color:var(--text3);
  font-size:10.5px; text-transform:uppercase; letter-spacing:.7px; font-weight:800;
  border-bottom:1px solid var(--border); background:var(--bg3);
}
td { padding:13px 13px; border-bottom:1px solid var(--border); vertical-align:middle; }
tr:last-child td { border-bottom:none; }
tbody tr { transition:background .12s; }
tbody tr:hover td { background:rgba(59,130,246,.04); }

/* =========================================
   BADGES
   ========================================= */
.badge {
  display:inline-flex; align-items:center; gap:4px;
  padding:3px 9px; border-radius:20px; font-size:11.5px; font-weight:700;
}
.b-ok     { background:rgba(16,185,129,.12); color:var(--success); }
.b-warn   { background:rgba(245,158,11,.12);  color:var(--warning); }
.b-del    { background:rgba(239,68,68,.12);   color:var(--danger);  }
.b-blue   { background:rgba(59,130,246,.12);  color:var(--accent);  }
.b-purple { background:rgba(109,40,217,.12);  color:#a78bfa;        }
.b-cyan   { background:rgba(6,182,212,.12);   color:var(--accent3); }
.b-pink   { background:rgba(236,72,153,.12);  color:var(--pink);    }

/* =========================================
   MODAL
   ========================================= */
.modal-ov {
  position:fixed; inset:0; background:rgba(0,0,0,.72);
  backdrop-filter:blur(8px); z-index:500;
  display:none; align-items:center; justify-content:center; padding:20px;
  animation:fadeIn .2s ease;
}
.modal-ov.show { display:flex; }
.modal {
  background:var(--card); border:1px solid var(--border2);
  border-radius:20px; padding:26px; width:100%; max-width:490px;
  animation:slideUp .28s cubic-bezier(.22,.68,0,1.2);
  max-height:90vh; overflow-y:auto;
}
.mh { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
.mh h3 { font-size:17px; font-weight:800; }
.mc-btn {
  width:30px; height:30px; border-radius:8px; background:var(--bg3);
  border:none; cursor:pointer; font-size:15px; color:var(--text2);
  display:flex; align-items:center; justify-content:center; transition:all .15s;
}
.mc-btn:hover { background:var(--border); color:var(--text); }
.m-actions { display:flex; gap:10px; margin-top:20px; }
.m-actions .btn { flex:1; }

/* =========================================
   TOAST
   ========================================= */
.toast-ctr {
  position:fixed; bottom:22px; right:22px; z-index:900;
  display:flex; flex-direction:column; gap:7px; pointer-events:none;
}
.toast {
  background:var(--card2); border:1px solid var(--border2);
  border-radius:12px; padding:12px 15px;
  display:flex; align-items:center; gap:9px; font-size:13.5px;
  box-shadow:var(--shadowlg); animation:toastIn .3s ease;
  max-width:310px; pointer-events:all; font-weight:600;
  border-left:3px solid var(--accent);
}
.toast.t-ok  { border-left-color:var(--success); }
.toast.t-err { border-left-color:var(--danger);  }
.toast.t-wrn { border-left-color:var(--warning); }

/* =========================================
   PROGRESS
   ========================================= */
.prog { background:var(--bg3); border-radius:20px; height:6px; overflow:hidden; }
.prog-bar {
  height:100%; border-radius:20px;
  background:var(--accent);
  transition:width .7s ease;
}

/* =========================================
   SEARCH
   ========================================= */
.search-row { position:relative; }
.search-row .si { position:absolute; left:12px; top:50%; transform:translateY(-50%); font-size:14px; color:var(--text3); }
.search-row .fc { padding-left:36px !important; }

/* =========================================
   ITEM ROW
   ========================================= */
.item-row {
  display:flex; align-items:center; gap:13px;
  padding:13px 14px; border:1px solid var(--border);
  border-radius:11px; cursor:pointer; background:var(--card);
  transition:all .2s; margin-bottom:8px;
}
.item-row:hover {
  border-color:var(--accent); transform:translateX(3px);
  background:var(--card2); box-shadow:var(--glow);
}
.item-ic {
  width:44px; height:44px; border-radius:11px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center; font-size:20px;
  overflow:hidden; background:linear-gradient(135deg, rgba(59,130,246,.12), rgba(109,40,217,.1));
}
.item-ic img { width:100%; height:100%; object-fit:cover; border-radius:11px; }
.item-info { flex:1; min-width:0; }
.item-info h4 { font-size:14px; font-weight:700; margin-bottom:2px; }
.item-info p  { font-size:12px; color:var(--text2); }
.item-acts { display:flex; gap:5px; flex-shrink:0; }
.ia { color:var(--text3); font-size:18px; }

/* =========================================
   BATCH CARD
   ========================================= */
.batch-card {
  background:var(--card); border:1px solid var(--border);
  border-radius:var(--r); padding:18px; transition:all .22s;
}
.batch-card:hover {
  border-color:var(--accent); transform:translateY(-3px);
  box-shadow:var(--glow);
}
.bch { display:flex; align-items:flex-start; gap:13px; margin-bottom:13px; }
.b-img {
  width:50px; height:50px; border-radius:13px; flex-shrink:0;
  background:linear-gradient(135deg, var(--accent), var(--accent2));
  display:flex; align-items:center; justify-content:center; font-size:24px; overflow:hidden;
}
.b-img img { width:100%; height:100%; object-fit:cover; }
.b-meta { display:flex; gap:10px; flex-wrap:wrap; margin-top:10px; }
.b-meta span { font-size:11.5px; color:var(--text2); display:flex; align-items:center; gap:3px; }
.b-acts { display:flex; gap:7px; margin-top:12px; }

/* =========================================
   CONTENT ITEM CARD — Redesigned
   ========================================= */
.ci {
  background:var(--card);
  border:1.5px solid var(--border);
  border-radius:16px;
  margin-bottom:12px;
  overflow:hidden;
  transition:all .22s cubic-bezier(.4,0,.2,1);
  position:relative;
}
.ci:hover {
  border-color:var(--accent);
  transform:translateY(-2px);
  box-shadow:0 8px 28px rgba(0,0,0,.12), var(--glow);
}
.ci:active { transform:translateY(0); }

/* Colored top bar per type */
.ci-bar {
  height:4px; width:100%;
}
.ci-bar.notes   { background:linear-gradient(90deg,#3b82f6,#6366f1); }
.ci-bar.lecture { background:linear-gradient(90deg,#f59e0b,#ef4444); }
.ci-bar.dpp     { background:linear-gradient(90deg,#10b981,#06b6d4); }

/* Card body */
.ci-body { padding:14px 15px; }

/* Top row: icon badge + title + teacher actions */
.ci-top-row {
  display:flex; align-items:flex-start; gap:12px;
}

/* Icon badge */
.ci-badge {
  width:48px; height:48px; border-radius:13px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font-size:24px;
}
.ci-badge.notes   { background:rgba(59,130,246,.12);  }
.ci-badge.lecture { background:rgba(245,158,11,.12);  }
.ci-badge.dpp     { background:rgba(16,185,129,.12);  }

/* Title area */
.ci-title-wrap { flex:1; min-width:0; }
.ci-type-tag {
  display:inline-flex; align-items:center; gap:4px;
  font-size:10px; font-weight:800; letter-spacing:.7px;
  text-transform:uppercase; padding:2px 8px; border-radius:20px;
  margin-bottom:5px;
}
.ci-type-tag.notes   { background:rgba(59,130,246,.1);  color:#3b82f6; }
.ci-type-tag.lecture { background:rgba(245,158,11,.1);  color:#f59e0b; }
.ci-type-tag.dpp     { background:rgba(16,185,129,.1);  color:#10b981; }
[data-theme="light"] .ci-type-tag.notes   { background:rgba(29,78,216,.08);  color:var(--accent); }
[data-theme="light"] .ci-type-tag.lecture { background:rgba(217,119,6,.08);  color:#d97706; }
[data-theme="light"] .ci-type-tag.dpp     { background:rgba(5,150,105,.08);  color:#059669; }

.ci-name {
  font-size:14px; font-weight:800; line-height:1.35;
  color:var(--text); word-break:break-word;
}

/* Teacher action buttons (top right) */
.ci-teacher-btns {
  display:flex; gap:5px; flex-shrink:0; margin-left:4px;
}

/* Meta row: date + views */
.ci-meta-row {
  display:flex; align-items:center; gap:8px; flex-wrap:wrap;
  margin-top:8px; padding-top:8px;
  border-top:1px solid var(--border);
}
.ci-meta-item {
  display:inline-flex; align-items:center; gap:4px;
  font-size:11.5px; color:var(--text2); font-weight:500;
}
/* Styled date-time badge */
.ci-dt-badge {
  display:inline-flex; align-items:center; gap:6px;
  padding:5px 11px; border-radius:9px; font-size:11.5px; font-weight:700;
  background:rgba(34,197,94,.08); color:var(--accent);
  border:1px solid rgba(34,197,94,.18);
  line-height:1.3;
}
[data-theme="light"] .ci-dt-badge {
  background:rgba(29,78,216,.07); color:#1d4ed8;
  border:1px solid rgba(29,78,216,.15);
}
.ci-dt-badge i { font-size:10px; opacity:.8; }
.ci-dt-badge .ci-dt-sep {
  width:1px; height:12px; background:currentColor; opacity:.25; flex-shrink:0;
}
.ci-views-pill {
  display:inline-flex; align-items:center; gap:4px;
  padding:2px 9px; border-radius:20px; font-size:11px; font-weight:700;
  background:var(--bg3); border:1px solid var(--border2); color:var(--text2);
  margin-left:auto;
}

/* Action buttons row */
.ci-actions {
  display:flex; gap:8px; flex-wrap:wrap; margin-top:11px;
}
.ci-actions .btn { flex:1; min-width:90px; font-size:13px; }

/* Download link pills (student multi-link) */
.ci-dl-pills { display:flex; gap:6px; flex-wrap:wrap; margin-top:9px; }
.ci-dl-pill {
  display:inline-flex; align-items:center; gap:4px;
  padding:5px 12px; border-radius:20px; font-size:12px; font-weight:700;
  background:rgba(16,185,129,.08); color:var(--success);
  border:1.5px solid rgba(16,185,129,.2); text-decoration:none;
  transition:background .15s; cursor:pointer; font-family:inherit;
}
.ci-dl-pill:hover { background:rgba(16,185,129,.18); }

/* Legacy compat — hidden */
.ci-icon,.ci-info,.ci-acts { display:none!important; }

/* =========================================
   TABS
   ========================================= */
.tabs {
  display:flex; gap:3px; background:var(--bg3);
  padding:4px; border-radius:12px; margin-bottom:18px;
}
.tab {
  flex:1; padding:8px 10px; text-align:center; border-radius:9px;
  cursor:pointer; font-size:12.5px; font-weight:700;
  color:var(--text2); transition:all .18s;
}
.tab.on { background:var(--card); color:var(--text); box-shadow:0 2px 8px rgba(0,0,0,.25); }

/* =========================================
   ATTENDANCE CALENDAR
   ========================================= */
.att-grid {
  display:grid; grid-template-columns:repeat(7, 1fr); gap:5px;
}
.att-cell {
  aspect-ratio:1; border-radius:8px; display:flex; align-items:center;
  justify-content:center; font-size:12px; font-weight:600;
  background:var(--bg3); color:var(--text3);
}
.att-cell.present { background:rgba(16,185,129,.15); color:var(--success); }
.att-cell.today   { border:2px solid var(--accent); color:var(--accent); }
.att-cell.hdr     { background:transparent; font-size:10.5px; font-weight:800; color:var(--text3); }

/* =========================================
   STUDY TIMER
   ========================================= */
.timer-display {
  font-size:64px; font-weight:800; text-align:center;
  font-family:'JetBrains Mono', monospace; letter-spacing:3px;
  color:var(--accent);
  padding:24px 0;
}

/* =========================================
   PROFILE
   ========================================= */
.profile-photo {
  width:96px; height:96px; border-radius:50%;
  background:linear-gradient(135deg, var(--accent), var(--accent2));
  display:flex; align-items:center; justify-content:center;
  font-size:38px; color:#fff; overflow:hidden;
  cursor:pointer; position:relative; border:3px solid var(--border2);
  transition:border-color .2s; flex-shrink:0;
}
.profile-photo:hover { border-color:var(--accent); }
.profile-photo img { width:100%; height:100%; object-fit:cover; }
.photo-ov {
  position:absolute; inset:0; background:rgba(0,0,0,.52);
  display:flex; align-items:center; justify-content:center;
  font-size:24px; opacity:0; transition:opacity .2s;
}
.profile-photo:hover .photo-ov { opacity:1; }

/* =========================================
   WAITING PAGE
   ========================================= */
.wait-page {
  min-height:100vh; display:flex; align-items:center; justify-content:center;
  padding:20px; background:var(--bg);
}
.wait-card {
  text-align:center; padding:52px 38px;
  background:var(--card); border:1px solid var(--border);
  border-radius:24px; max-width:400px; width:100%;
  box-shadow:var(--shadowlg); animation:slideUp .45s ease;
}
.wait-icon { font-size:80px; display:block; margin-bottom:20px; animation:pulse 2.5s ease infinite; }

/* =========================================
   CHART
   ========================================= */
.bar-chart { display:flex; align-items:flex-end; gap:7px; height:110px; padding-top:20px; }
.bar-w { flex:1; display:flex; flex-direction:column; align-items:center; gap:5px; }
.bar {
  width:100%; border-radius:6px 6px 0 0; min-height:4px;
  background:var(--accent);
  transition:height .6s ease; position:relative; cursor:default;
}
.bar::after {
  content:attr(data-v); position:absolute; top:-18px; left:50%;
  transform:translateX(-50%); font-size:10px; color:var(--text2);
  white-space:nowrap; opacity:0; transition:opacity .15s;
}
.bar:hover::after { opacity:1; }
.bar-lbl { font-size:10px; color:var(--text3); font-weight:600; }

/* =========================================
   CHAT v2 — WhatsApp-Style
   ========================================= */
.chat-wrap {
  display:flex; border:1px solid var(--border); border-radius:16px;
  overflow:hidden; background:var(--card);
  height:calc(100dvh - 138px); min-height:480px;
}

/* LEFT panel — contact list */
.chat-left {
  width:290px; flex-shrink:0; border-right:1px solid var(--border);
  display:flex; flex-direction:column; background:var(--bg2);
  transition:transform .25s cubic-bezier(.4,0,.2,1);
}
.chat-left-head { padding:14px 13px 10px; border-bottom:1px solid var(--border); flex-shrink:0; }
.chat-left-title { font-size:15px; font-weight:800; margin-bottom:9px; }
.chat-search-wrap { position:relative; }
.chat-search-ic  { position:absolute; left:11px; top:50%; transform:translateY(-50%); font-size:12px; color:var(--text3); pointer-events:none; }
.chat-search-inp {
  width:100%; background:var(--bg3); border:1.5px solid var(--border);
  border-radius:10px; padding:8px 11px 8px 32px;
  font-size:13px; color:var(--text); outline:none; font-family:inherit;
  transition:border-color .18s;
}
.chat-search-inp:focus { border-color:var(--accent); }
.chat-contacts { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; }

/* Contact row */
.chat-contact {
  display:flex; align-items:center; gap:11px; padding:12px 13px;
  cursor:pointer; border-bottom:1px solid var(--border);
  transition:background .15s; min-height:66px;
}
.chat-contact:hover    { background:var(--bg3); }
.chat-contact.active   { background:rgba(34,197,94,.08); border-left:3px solid var(--accent); }
[data-theme="light"] .chat-contact.active { background:rgba(29,78,216,.06); border-left-color:var(--accent); }
.chat-contact.has-unread { background:rgba(34,197,94,.03); }

/* Avatar with online ring */
.chat-av {
  width:46px; height:46px; border-radius:50%; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font-size:18px; font-weight:800; overflow:hidden; position:relative;
  background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#fff;
}
.chat-av img { width:100%; height:100%; object-fit:cover; }
.online-ring { position:absolute; bottom:1px; right:1px; width:12px; height:12px; border-radius:50%; border:2px solid var(--bg2); }
.online-ring.on  { background:#22c55e; }
.online-ring.off { background:var(--text3); }

/* Contact info */
.chat-ci { flex:1; min-width:0; }
.chat-ci-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:3px; }
.chat-ci-name { font-size:13.5px; font-weight:700; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:150px; }
.chat-ci-time { font-size:10.5px; color:var(--text3); flex-shrink:0; margin-left:4px; }
.chat-ci-preview { font-size:12px; color:var(--text2); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.chat-unread-pill {
  background:var(--accent); color:#fff; font-size:10px; font-weight:800;
  min-width:20px; height:20px; border-radius:10px; padding:0 5px;
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
}

/* RIGHT panel — chat window */
.chat-right { flex:1; min-width:0; display:flex; flex-direction:column; background:var(--bg); }
.chat-right-empty { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; color:var(--text3); gap:10px; font-size:14px; }

/* Chat header */
.chat-hdr { display:flex; align-items:center; gap:10px; padding:11px 15px; border-bottom:1px solid var(--border); background:var(--card); flex-shrink:0; }
.chat-hdr-av { width:40px; height:40px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:16px; font-weight:800; overflow:hidden; background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#fff; }
.chat-hdr-av img { width:100%; height:100%; object-fit:cover; }
.chat-hdr-name { font-size:14px; font-weight:800; line-height:1.2; }
.chat-hdr-status { font-size:11.5px; margin-top:2px; }
.chat-hdr-status.on  { color:#22c55e; }
.chat-hdr-status.off { color:var(--text3); }
.chat-hdr-back { width:36px; height:36px; border-radius:9px; background:var(--bg3); border:none; cursor:pointer; display:none; align-items:center; justify-content:center; font-size:17px; flex-shrink:0; transition:background .15s; }
.chat-hdr-back:hover { background:var(--border2); }

/* Messages area */
.chat-msgs { flex:1; overflow-y:auto; padding:14px 14px 8px; display:flex; flex-direction:column; gap:5px; -webkit-overflow-scrolling:touch; }
.chat-msg { max-width:68%; display:flex; flex-direction:column; }
@keyframes msgPop { from{opacity:0;transform:translateY(6px)scale(.97)}to{opacity:1;transform:translateY(0)scale(1)} }
.chat-msg.new  { animation:msgPop .2s ease; }
.chat-msg.me   { align-self:flex-end; align-items:flex-end; }
.chat-msg.them { align-self:flex-start; align-items:flex-start; }
.chat-bubble { padding:9px 13px; border-radius:18px; font-size:13.5px; line-height:1.55; word-break:break-word; }
.chat-msg.me   .chat-bubble { background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#fff; border-bottom-right-radius:4px; }
.chat-msg.them .chat-bubble { background:var(--card); border:1px solid var(--border); color:var(--text); border-bottom-left-radius:4px; }
.chat-meta { display:flex; align-items:center; gap:3px; margin-top:3px; padding:0 2px; }
.chat-ts   { font-size:10.5px; color:var(--text3); }
/* Tick marks — WhatsApp style */
.tick { font-size:12px; font-weight:800; line-height:1; letter-spacing:-1px; }
.tick.t-sent { color:rgba(255,255,255,0.55); }  /* gray — sent */
.tick.t-read { color:rgba(255,255,255,0.55); }  /* gray — delivered */
.tick.t-seen { color:#60a5fa; }                 /* blue — seen ✓✓ */

/* Input area */
.chat-input-area { padding:10px 12px; border-top:1px solid var(--border); background:var(--card); display:flex; gap:8px; align-items:center; flex-shrink:0; }
.chat-inp { flex:1; background:var(--bg3); border:1.5px solid var(--border); border-radius:22px; padding:10px 16px; color:var(--text); font-size:13.5px; outline:none; transition:border-color .18s; font-family:inherit; }
.chat-inp:focus { border-color:var(--accent); }
.chat-send-btn { width:42px; height:42px; border-radius:50%; background:var(--accent); border:none; color:#fff; font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .18s; flex-shrink:0; }
.chat-send-btn:hover  { transform:scale(1.08); filter:brightness(1.1); }
.chat-send-btn:active { transform:scale(.94); }

/* Mobile overrides */
@media(max-width:768px){
  .chat-wrap { flex-direction:column; height:calc(100dvh - 90px); border-radius:12px; }
  .chat-left  { width:100%; border-right:none; border-bottom:1px solid var(--border); }
  .chat-left.mob-hidden  { display:none; }
  .chat-right.mob-hidden { display:none; }
  .chat-hdr-back { display:flex; }
  .chat-msg { max-width:80%; }
}
@media(max-width:480px){
  .chat-msgs { padding:10px 10px 6px; }
  .chat-input-area { padding:8px 10px; }
  .chat-bubble { font-size:13px; padding:8px 11px; }
}

/* =========================================
   ANNOUNCEMENTS
   ========================================= */
.ann-card {
  background:var(--card); border:1.5px solid var(--border);
  border-radius:14px; overflow:hidden;
  transition:all .22s cubic-bezier(.4,0,.2,1); margin-bottom:14px;
}
.ann-card:hover { border-color:var(--accent); box-shadow:var(--glow); transform:translateY(-2px); }
.ann-img  { width:100%; max-height:220px; object-fit:cover; display:block; }
.ann-body { padding:16px; }
.ann-title { font-size:15px; font-weight:800; margin-bottom:6px; }
.ann-desc  { font-size:13px; color:var(--text2); line-height:1.65; margin-bottom:10px; white-space:pre-wrap; }
.ann-footer { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:6px; }
.ann-meta   { font-size:11.5px; color:var(--text3); display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.ann-batch-tag { display:inline-flex; align-items:center; gap:4px; padding:3px 9px; border-radius:20px; font-size:11px; font-weight:700; background:rgba(34,197,94,.1); color:var(--accent); border:1px solid rgba(34,197,94,.2); }
[data-theme="light"] .ann-batch-tag { background:rgba(29,78,216,.07); color:var(--accent); border-color:rgba(29,78,216,.15); }

/* =========================================
   NOTIFICATIONS
   ========================================= */
.notif {
  display:flex; gap:11px; padding:13px; border:1px solid var(--border);
  border-radius:11px; margin-bottom:8px; background:var(--card2); transition:all .18s;
}
.notif.unread { border-left:3px solid var(--accent); background:rgba(59,130,246,.04); }
.notif-ic { font-size:22px; flex-shrink:0; }
.notif-t  { font-size:13px; font-weight:700; margin-bottom:3px; }
.notif-m  { font-size:12px; color:var(--text2); margin-bottom:4px; }
.notif-tm { font-size:11px; color:var(--text3); }

/* PUSH NOTIFICATION PROMPT */
.push-prompt {
  display:flex; align-items:center; gap:12px;
  padding:13px 15px; border-radius:13px; margin-bottom:12px;
  background:linear-gradient(135deg,rgba(34,197,94,.1),rgba(16,185,129,.07));
  border:1.5px solid rgba(34,197,94,.25); cursor:pointer; transition:all .2s;
}
[data-theme="light"] .push-prompt {
  background:linear-gradient(135deg,rgba(29,78,216,.07),rgba(99,102,241,.05));
  border-color:rgba(29,78,216,.2);
}
.push-prompt:hover { transform:translateY(-1px); box-shadow:var(--glow); }
.push-ic { font-size:28px; flex-shrink:0; }
.push-text { flex:1; min-width:0; }
.push-text strong { font-size:13.5px; font-weight:800; display:block; margin-bottom:3px; }
.push-text span   { font-size:12px; color:var(--text2); }

/* EMPTY */
.empty { text-align:center; padding:38px 16px; }
.empty-ic { font-size:46px; display:block; margin-bottom:11px; opacity:.65; }
.empty p  { color:var(--text2); font-size:13px; line-height:1.55; }
.empty a  { color:var(--accent); cursor:pointer; }

/* SIDEBAR OVERLAY */
.sb-ov { display:none; position:fixed; inset:0; background:rgba(0,0,0,.52); z-index:150; }

/* =========================================
   ANIMATIONS
   ========================================= */
@keyframes slideUp  { from{transform:translateY(22px);opacity:0}to{transform:translateY(0);opacity:1} }
@keyframes fadeIn   { from{opacity:0}to{opacity:1} }
@keyframes toastIn  { from{transform:translateX(36px);opacity:0}to{transform:translateX(0);opacity:1} }
@keyframes pulse    { 0%,100%{transform:scale(1)}50%{transform:scale(1.07)} }
@keyframes spin     { from{transform:rotate(0)}to{transform:rotate(360deg)} }
@keyframes blink    { 0%,100%{opacity:1}50%{opacity:.4} }
@keyframes shimmer  {
  0%{background-position:-200% 0}100%{background-position:200% 0}
}

/* =========================================
   RESPONSIVE (tablet & below baseline)
   ========================================= */
@media(max-width:920px){ .g4{grid-template-columns:repeat(2,1fr);} }
@media(max-width:768px){
  :root{ --sidebar:260px; }
  .sidebar{ transform:translateX(-100%); }
  .sidebar.open{ transform:translateX(0); }
  .sb-ov.show{ display:block; }
  .main{ margin-left:0 !important; }
  .hamburger{ display:flex; }
  .g2,.g3,.g4{ grid-template-columns:1fr; }
  .pw{ padding:14px; }
  .topbar{ padding:11px 14px; }
  .timer-display{ font-size:48px; }
}
@media(max-width:480px){
  .auth-card{ padding:26px 18px; }
  .ci-acts{ flex-wrap:wrap; }
  .m-actions{ flex-direction:column; }
}

/* =========================================
   STREAK CARD
   ========================================= */
.streak-card {
  background:linear-gradient(135deg,rgba(245,158,11,.12),rgba(239,68,68,.08));
  border:1.5px solid rgba(245,158,11,.25);
  border-radius:16px; padding:16px 18px;
  display:flex; align-items:center; gap:14px;
  margin-bottom:14px;
}
.streak-flame {
  font-size:38px; flex-shrink:0;
  animation:flamePulse 1.8s ease-in-out infinite;
}
@keyframes flamePulse {
  0%,100%{transform:scale(1) rotate(-3deg)}
  50%{transform:scale(1.12) rotate(3deg)}
}
.streak-num {
  font-size:32px; font-weight:800; color:#f59e0b; line-height:1;
}
.streak-label { font-size:12px; color:var(--text2); font-weight:600; margin-top:3px; }
.streak-best  { font-size:11px; color:var(--text3); margin-top:2px; }

/* =========================================
   PROGRESS — chapter completion
   ========================================= */
.cp-row {
  display:flex; align-items:center; gap:11px;
  padding:11px 13px; border:1.5px solid var(--border);
  border-radius:11px; background:var(--card2); margin-bottom:8px;
}
.cp-icon {
  width:36px; height:36px; border-radius:9px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center; font-size:16px;
  background:rgba(34,197,94,.1); color:var(--accent);
}
.cp-info { flex:1; min-width:0; }
.cp-name { font-size:13px; font-weight:700; margin-bottom:5px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.cp-bar-wrap { display:flex; align-items:center; gap:8px; }
.cp-bar { flex:1; background:var(--bg3); border-radius:20px; height:5px; overflow:hidden; }
.cp-bar-fill { height:100%; border-radius:20px; background:var(--accent); transition:width .6s ease; }
.cp-pct { font-size:11px; font-weight:800; color:var(--accent); flex-shrink:0; min-width:28px; text-align:right; }
.cp-done-badge {
  display:inline-flex; align-items:center; gap:4px;
  padding:2px 8px; border-radius:20px; font-size:10.5px; font-weight:800;
  background:rgba(34,197,94,.12); color:var(--success);
}

/* Mark-done button on content items */
.ci-done-btn {
  display:inline-flex; align-items:center; gap:5px;
  padding:5px 11px; border-radius:20px; font-size:11.5px; font-weight:700;
  border:1.5px solid var(--border); background:var(--bg3); color:var(--text3);
  cursor:pointer; transition:all .18s; font-family:inherit;
}
.ci-done-btn.done {
  background:rgba(34,197,94,.12); border-color:var(--accent); color:var(--accent);
}
[data-theme="light"] .ci-done-btn.done {
  background:rgba(29,78,216,.08); border-color:#1d4ed8; color:#1d4ed8;
}
.ci-done-btn:hover:not(.done):not(:disabled) { border-color:var(--accent); color:var(--accent); }
.ci-done-btn:disabled { opacity:.55; cursor:not-allowed; }

/* =========================================
   POLLS
   ========================================= */
.poll-card {
  background:var(--card); border:1.5px solid var(--border);
  border-radius:16px; overflow:hidden; margin-bottom:14px;
  transition:all .22s;
}
.poll-card:hover { border-color:var(--accent); box-shadow:var(--glow); }
.poll-top { height:4px; background:linear-gradient(90deg,#6366f1,#a78bfa); }
.poll-body { padding:16px 15px; }
.poll-q { font-size:15px; font-weight:800; margin-bottom:12px; line-height:1.4; }
.poll-opt {
  display:flex; align-items:center; gap:10px; padding:10px 13px;
  border:1.5px solid var(--border); border-radius:10px;
  margin-bottom:8px; cursor:pointer; transition:all .18s;
  background:var(--bg3); position:relative; overflow:hidden;
}
.poll-opt:hover { border-color:var(--accent); }
.poll-opt.voted { border-color:var(--accent); cursor:default; }
.poll-opt.my-vote { background:rgba(34,197,94,.08); }
.poll-opt-bar {
  position:absolute; left:0; top:0; bottom:0;
  background:rgba(34,197,94,.1); transition:width .6s ease;
  pointer-events:none;
}
.poll-opt-label { flex:1; font-size:13.5px; font-weight:700; position:relative; z-index:1; }
.poll-opt-pct { font-size:12px; font-weight:800; color:var(--accent); position:relative; z-index:1; }
.poll-meta { font-size:11.5px; color:var(--text3); margin-top:10px; display:flex; gap:10px; flex-wrap:wrap; }
.poll-batch-tag {
  display:inline-flex; align-items:center; gap:4px;
  padding:2px 8px; border-radius:20px; font-size:11px; font-weight:700;
  background:rgba(99,102,241,.1); color:#a78bfa; border:1px solid rgba(99,102,241,.2);
}

/* =========================================
   LEADERBOARD
   ========================================= */
.lb-row {
  display:flex; align-items:center; gap:12px;
  padding:12px 14px; border:1.5px solid var(--border);
  border-radius:12px; margin-bottom:8px; background:var(--card2);
  transition:all .18s;
}
.lb-row:hover { border-color:var(--border2); }
.lb-row.me { border-color:var(--accent); background:rgba(34,197,94,.05); }
[data-theme="light"] .lb-row.me { background:rgba(29,78,216,.04); }
.lb-rank {
  width:32px; height:32px; border-radius:50%; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font-size:13px; font-weight:800; background:var(--bg3);
  color:var(--text2); border:2px solid var(--border2);
}
.lb-rank.r1 { background:linear-gradient(135deg,#f59e0b,#d97706); color:#fff; border-color:#f59e0b; }
.lb-rank.r2 { background:linear-gradient(135deg,#9ca3af,#6b7280); color:#fff; border-color:#9ca3af; }
.lb-rank.r3 { background:linear-gradient(135deg,#cd7f32,#a06020); color:#fff; border-color:#cd7f32; }
.lb-av {
  width:38px; height:38px; border-radius:50%; flex-shrink:0;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex; align-items:center; justify-content:center;
  font-size:15px; font-weight:800; color:#fff; overflow:hidden;
}
.lb-av img { width:100%; height:100%; object-fit:cover; }
.lb-info { flex:1; min-width:0; }
.lb-name { font-size:13.5px; font-weight:800; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.lb-sub  { font-size:11.5px; color:var(--text2); margin-top:2px; }
.lb-score { font-size:15px; font-weight:800; color:var(--accent); flex-shrink:0; text-align:right; }
.lb-score small { font-size:10px; font-weight:600; color:var(--text3); display:block; }
.lb-tabs { display:flex; gap:3px; background:var(--bg3); padding:3px; border-radius:10px; margin-bottom:14px; }
.lb-tab { flex:1; padding:7px 6px; text-align:center; border-radius:8px; cursor:pointer; font-size:12px; font-weight:700; color:var(--text2); transition:all .18s; }
.lb-tab.on { background:var(--card); color:var(--text); box-shadow:0 2px 8px rgba(0,0,0,.2); }

/* ── Loading Spinner ── */
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:60px auto;}
.page-loading{display:flex;flex-direction:column;align-items:center;gap:14px;padding:60px 20px;color:var(--text2);font-size:13px;}
/* ── Upload Progress ── */
.upload-bar{background:var(--bg3);border-radius:20px;height:8px;overflow:hidden;margin-top:8px;}
.upload-fill{height:100%;border-radius:20px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .3s;}
/* ── Realtime dot ── */
.rt-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--success);animation:pulse 2s ease infinite;margin-right:4px;}
.rt-dot.off{background:var(--danger);animation:none;}
/* ── SQL box ── */
.sql-box{background:var(--bg);border:1px solid var(--border2);border-radius:10px;padding:14px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--accent3);max-height:300px;overflow-y:auto;white-space:pre;line-height:1.6;tab-size:2;}
/* ── Upload tabs ── */
.upload-tabs{display:flex;gap:3px;background:var(--bg3);padding:3px;border-radius:9px;margin-bottom:12px;}
.upload-tab{flex:1;padding:7px;text-align:center;border-radius:7px;cursor:pointer;font-size:12px;font-weight:700;color:var(--text2);transition:all .18s;}
.upload-tab.on{background:var(--card);color:var(--text);}
.dropzone{border:2px dashed var(--border2);border-radius:11px;padding:26px;text-align:center;cursor:pointer;transition:all .2s;color:var(--text2);font-size:13px;}
.dropzone:hover,.dropzone.drag{border-color:var(--accent);background:rgba(59,130,246,.05);color:var(--accent);}
.dropzone input{display:none;}

/* ── Passkey / WebAuthn ── */
.pk-btn {
  width:100%; padding:14px; border-radius:12px;
  border:1.5px solid var(--accent); cursor:pointer; font-size:14px; font-weight:700;
  font-family:inherit; transition:all .22s;
  display:flex; align-items:center; justify-content:center; gap:10px;
  background:rgba(34,197,94,.07);
  color:var(--accent);
  box-shadow:0 2px 12px rgba(34,197,94,.1);
}
[data-theme="light"] .pk-btn {
  background:rgba(29,78,216,.06);
  color:var(--accent);
  border-color:var(--accent);
  box-shadow:0 2px 12px rgba(29,78,216,.08);
}
.pk-btn:hover { transform:translateY(-1px); box-shadow:0 6px 22px rgba(34,197,94,.2); background:rgba(34,197,94,.13); }
[data-theme="light"] .pk-btn:hover { box-shadow:0 6px 22px rgba(29,78,216,.15); background:rgba(29,78,216,.1); }
.pk-btn:active { transform:translateY(0); }
.pk-btn:disabled { opacity:.5; cursor:not-allowed; transform:none; }
.pk-icon { font-size:22px; }
.pk-badge {
  display:inline-flex; align-items:center; gap:6px;
  padding:5px 12px; border-radius:20px; font-size:12px; font-weight:700;
  background:rgba(34,197,94,.12); color:var(--success); border:1px solid rgba(34,197,94,.2);
}
[data-theme="light"] .pk-badge {
  background:rgba(22,163,74,.1); color:var(--success); border-color:rgba(22,163,74,.2);
}
.pk-badge.unregistered {
  background:rgba(245,158,11,.1); color:var(--warning); border-color:rgba(245,158,11,.2);
}
.pk-status-card {
  padding:16px; border-radius:12px; border:1px solid var(--border);
  background:var(--card2); display:flex; align-items:center; gap:14px;
  margin-bottom:14px;
}
.pk-icon-wrap {
  width:52px; height:52px; border-radius:14px; flex-shrink:0;
  background:rgba(34,197,94,.1);
  display:flex; align-items:center; justify-content:center; font-size:26px;
}
[data-theme="light"] .pk-icon-wrap { background:rgba(29,78,216,.08); }
.pk-scanning {
  display:flex; flex-direction:column; align-items:center; gap:12px;
  padding:28px; text-align:center;
}
.pk-fingerprint-anim {
  width:80px; height:80px; border-radius:50%;
  background:rgba(34,197,94,.1);
  display:flex; align-items:center; justify-content:center;
  font-size:40px; animation:fpscan 1.8s ease-in-out infinite;
  border:2px solid var(--accent); box-shadow:0 0 0 0 rgba(34,197,94,.4);
}
[data-theme="light"] .pk-fingerprint-anim {
  background:rgba(29,78,216,.08);
  box-shadow:0 0 0 0 rgba(29,78,216,.4);
}
@keyframes fpscan {
  0%   { box-shadow:0 0 0 0 rgba(34,197,94,.5); }
  50%  { box-shadow:0 0 0 18px rgba(34,197,94,0); }
  100% { box-shadow:0 0 0 0 rgba(34,197,94,0); }
}
[data-theme="light"] .pk-fingerprint-anim { animation:fpscanLight 1.8s ease-in-out infinite; }
@keyframes fpscanLight {
  0%   { box-shadow:0 0 0 0 rgba(29,78,216,.4); }
  50%  { box-shadow:0 0 0 18px rgba(29,78,216,0); }
  100% { box-shadow:0 0 0 0 rgba(29,78,216,0); }
}

/* =========================================
   GLOBAL SEARCH OVERLAY
   ========================================= */
.search-overlay {
  position:fixed; inset:0; z-index:800;
  background:rgba(0,0,0,.6); backdrop-filter:blur(6px);
  display:flex; flex-direction:column; align-items:center;
  padding:60px 16px 20px; animation:fadeIn .18s ease;
}
.search-box {
  width:100%; max-width:600px;
  background:var(--card); border:2px solid var(--accent);
  border-radius:16px; overflow:hidden;
  box-shadow:0 24px 80px rgba(0,0,0,.5), var(--glow);
  animation:slideUp .22s cubic-bezier(.22,.68,0,1.2);
  max-height:75vh; display:flex; flex-direction:column;
}
.search-inp-wrap {
  display:flex; align-items:center; gap:12px; padding:14px 16px;
  border-bottom:1px solid var(--border); flex-shrink:0;
}
.search-inp-wrap i { font-size:16px; color:var(--accent); flex-shrink:0; }
.search-main-inp {
  flex:1; background:none; border:none; outline:none;
  font-size:16px; color:var(--text); font-family:inherit; font-weight:600;
}
.search-main-inp::placeholder { color:var(--text3); }
.search-close-btn {
  width:32px; height:32px; border-radius:8px; background:var(--bg3);
  border:none; cursor:pointer; color:var(--text2); font-size:14px;
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
  transition:background .15s;
}
.search-close-btn:hover { background:var(--border2); color:var(--text); }
.search-results { flex:1; overflow-y:auto; padding:8px 0; }
.search-section-title {
  font-size:10.5px; font-weight:800; color:var(--text3); letter-spacing:.8px;
  text-transform:uppercase; padding:10px 16px 5px;
}
.search-result-item {
  display:flex; align-items:center; gap:11px; padding:10px 16px;
  cursor:pointer; transition:background .12s; border-radius:0;
}
.search-result-item:hover { background:var(--bg3); }
.search-result-item.active { background:rgba(34,197,94,.08); }
.sr-ic {
  width:38px; height:38px; border-radius:10px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center; font-size:17px;
  background:var(--bg3);
}
.sr-info { flex:1; min-width:0; }
.sr-name { font-size:13.5px; font-weight:700; color:var(--text); }
.sr-name mark { background:rgba(34,197,94,.25); color:var(--accent); border-radius:3px; padding:0 2px; }
[data-theme="light"] .sr-name mark { background:rgba(29,78,216,.15); color:var(--accent); }
.sr-path { font-size:11.5px; color:var(--text2); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.sr-type { font-size:10px; font-weight:800; letter-spacing:.5px; text-transform:uppercase; color:var(--text3); }
.search-empty { text-align:center; padding:32px 16px; color:var(--text3); font-size:14px; }
.search-hint  { text-align:center; padding:24px 16px; color:var(--text3); font-size:13px; }

@media(max-width:480px){
  .search-overlay { padding:48px 8px 12px; }
  .search-box { border-radius:13px; }
  .search-result-item { padding:9px 12px; }
}


/* =========================================
   TEST MATERIAL CARD
   ========================================= */
.tm-card {
  background:var(--card); border:1.5px solid var(--border);
  border-radius:16px; overflow:hidden; margin-bottom:14px;
  transition:all .22s cubic-bezier(.4,0,.2,1); position:relative;
}
.tm-card:hover { border-color:var(--accent); transform:translateY(-2px); box-shadow:var(--glow),0 8px 28px rgba(0,0,0,.1); }
.tm-card-top { height:4px; background:linear-gradient(90deg,#f59e0b,#ef4444); width:100%; }
.tm-thumb { width:100%; height:160px; object-fit:cover; display:block; border-bottom:1px solid var(--border); background:var(--bg3); }
.tm-thumb-placeholder {
  width:100%; height:130px; display:flex; align-items:center; justify-content:center;
  font-size:48px; background:linear-gradient(135deg,rgba(245,158,11,.1),rgba(239,68,68,.08));
  border-bottom:1px solid var(--border);
}
.tm-body { padding:14px 15px; }
.tm-tag {
  display:inline-flex; align-items:center; gap:4px;
  padding:2px 9px; border-radius:20px; font-size:10.5px; font-weight:800;
  letter-spacing:.5px; text-transform:uppercase; margin-bottom:8px;
  background:rgba(245,158,11,.1); color:#f59e0b; border:1px solid rgba(245,158,11,.2);
}
.tm-title { font-size:15px; font-weight:800; color:var(--text); margin-bottom:6px; line-height:1.35; }
.tm-desc  { font-size:12.5px; color:var(--text2); line-height:1.6; margin-bottom:10px; }
.tm-meta  { display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:12px; }
.tm-meta-item { font-size:11.5px; color:var(--text3); display:flex; align-items:center; gap:4px; }
.tm-subjects  { display:flex; gap:5px; flex-wrap:wrap; margin-bottom:12px; }
.tm-subj-pill {
  padding:3px 9px; border-radius:20px; font-size:11px; font-weight:700;
  background:rgba(59,130,246,.1); color:#3b82f6; border:1px solid rgba(59,130,246,.2);
}
[data-theme="light"] .tm-subj-pill { background:rgba(29,78,216,.07); color:var(--accent); border-color:rgba(29,78,216,.15); }
.tm-actions { display:flex; gap:8px; flex-wrap:wrap; }
.tm-actions .btn { flex:1; min-width:90px; }
.tm-teacher-row { display:flex; gap:6px; margin-top:10px; padding-top:10px; border-top:1px solid var(--border); }

/* =========================================
   IN-APP FULLSCREEN VIEWER
   ========================================= */
.inapp-overlay {
  position:fixed; inset:0; z-index:700;
  background:var(--bg); display:flex; flex-direction:column;
  animation:fadeIn .18s ease;
}
.inapp-topbar {
  display:flex; align-items:center; gap:10px;
  padding:11px 14px; background:var(--bg2);
  border-bottom:1px solid var(--border); flex-shrink:0; min-height:54px;
}
.inapp-back {
  width:38px; height:38px; border-radius:10px;
  background:var(--bg3); border:1px solid var(--border);
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  font-size:16px; color:var(--text); transition:all .15s; flex-shrink:0;
}
.inapp-back:hover { background:var(--border2); }
.inapp-title {
  flex:1; min-width:0; font-size:14px; font-weight:800;
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
}
.inapp-body { flex:1; overflow:hidden; position:relative; }
.inapp-frame { width:100%; height:100%; border:none; background:var(--bg3); }
/* Loading state for iframe */
.inapp-loading {
  position:absolute; inset:0; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:14px;
  background:var(--bg); color:var(--text2); font-size:13px; z-index:1;
}
/* PDF/file cannot-load fallback */
.inapp-fallback {
  position:absolute; inset:0; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:16px;
  background:var(--bg); padding:30px; text-align:center;
}
.inapp-fallback-ic { font-size:56px; color:var(--text3); margin-bottom:4px; }
.inapp-fallback h3 { font-size:17px; font-weight:800; margin-bottom:6px; }
.inapp-fallback p  { font-size:13px; color:var(--text2); line-height:1.6; }
.inapp-fallback-btns { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; margin-top:6px; }

/* =========================================
   IN-APP VIDEO PLAYER (YouTube embedded)
   ========================================= */
.vp-wrap { display:flex; flex-direction:column; height:100%; overflow-y:auto; background:var(--bg); }
.vp-player-area { background:#000; flex-shrink:0; }
.vp-iframe-wrap { position:relative; padding-bottom:56.25%; width:100%; }
.vp-iframe-wrap iframe { position:absolute; inset:0; width:100%; height:100%; border:none; }
/* Overlay covers YouTube bottom-right controls (share, more, YouTube logo) */
.vp-share-block {
  position:absolute; bottom:0; right:0;
  width:180px; height:42px;
  background:#000; z-index:10; pointer-events:auto;
  /* Invisible overlay matching YT's bottom-right button area */
  opacity:0;
}
.vp-info-bar {
  padding:13px 15px 10px; border-bottom:1px solid var(--border);
  background:var(--bg2); flex-shrink:0;
}
.vp-title { font-size:15px; font-weight:800; margin-bottom:8px; line-height:1.35; }
.vp-meta-row { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
.vp-stat { display:inline-flex; align-items:center; gap:5px; font-size:12.5px; color:var(--text2); font-weight:600; }
.vp-like-btn {
  display:inline-flex; align-items:center; gap:6px;
  padding:6px 14px; border-radius:20px; cursor:pointer;
  border:1.5px solid var(--border); background:var(--bg3);
  font-size:13px; font-weight:700; color:var(--text2);
  transition:all .18s; font-family:inherit; margin-left:auto;
}
.vp-like-btn:hover { border-color:#f43f5e; color:#f43f5e; }
.vp-like-btn.liked { background:rgba(244,63,94,.1); border-color:#f43f5e; color:#f43f5e; }
.vp-content-area { flex:1; overflow-y:auto; }
.vp-section { border-bottom:1px solid var(--border); padding:14px 15px; }
.vp-section:last-child { border-bottom:none; }
.vp-section-hd {
  display:flex; align-items:center; gap:7px; margin-bottom:12px;
  font-size:11.5px; font-weight:800; text-transform:uppercase;
  letter-spacing:.7px; color:var(--text3);
}
.vp-section-hd i { font-size:13px; }
/* Attached note row */
.vp-note-row {
  display:flex; align-items:center; gap:11px; padding:11px 12px;
  border:1.5px solid var(--border); border-radius:11px; background:var(--card2);
  margin-bottom:8px; cursor:pointer; transition:all .18s;
}
.vp-note-row:hover { border-color:var(--accent); background:var(--bg3); }
.vp-note-ic {
  width:38px; height:38px; border-radius:9px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center; font-size:17px;
  background:rgba(59,130,246,.1); color:#3b82f6;
}
.vp-note-info { flex:1; min-width:0; }
.vp-note-name { font-size:13px; font-weight:700; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.vp-note-meta { font-size:11.5px; color:var(--text2); margin-top:2px; }
/* Private notes textarea */
.vp-note-inp {
  width:100%; background:var(--bg3); border:1.5px solid var(--border);
  border-radius:11px; padding:11px 13px; color:var(--text); font-size:13.5px;
  outline:none; resize:vertical; font-family:inherit; line-height:1.6;
  transition:border-color .18s; min-height:80px;
}
.vp-note-inp:focus { border-color:var(--accent); }
.vp-saved-note {
  background:var(--bg3); border:1px solid var(--border); border-radius:10px;
  padding:12px 13px; font-size:13px; line-height:1.6; color:var(--text);
  margin-bottom:8px; white-space:pre-wrap; position:relative;
}
.vp-note-date { font-size:11px; color:var(--text3); margin-top:6px; display:flex; align-items:center; gap:4px; }
/* Comments */
.vp-comment { display:flex; gap:10px; margin-bottom:14px; }
.vp-c-av {
  width:34px; height:34px; border-radius:50%; flex-shrink:0;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex; align-items:center; justify-content:center;
  font-size:13px; font-weight:800; color:#fff; overflow:hidden;
}
.vp-c-av img { width:100%; height:100%; object-fit:cover; }
.vp-c-body { flex:1; min-width:0; }
.vp-c-header { display:flex; align-items:center; gap:7px; margin-bottom:4px; flex-wrap:wrap; }
.vp-c-name  { font-size:13px; font-weight:800; }
.vp-c-time  { font-size:11px; color:var(--text3); }
.vp-c-badge {
  font-size:9px; font-weight:800; padding:1px 7px; border-radius:10px;
  background:rgba(34,197,94,.12); color:var(--accent);
  letter-spacing:.4px; text-transform:uppercase;
}
[data-theme="light"] .vp-c-badge { background:rgba(29,78,216,.1); }
.vp-c-text { font-size:13.5px; line-height:1.6; color:var(--text); }
.vp-c-actions { display:flex; gap:4px; margin-top:5px; }
.vp-c-btn {
  font-size:11.5px; color:var(--text3); background:none; border:none;
  cursor:pointer; font-family:inherit; padding:2px 7px; border-radius:5px;
  font-weight:600; transition:all .15s; display:flex; align-items:center; gap:4px;
}
.vp-c-btn:hover { background:var(--bg3); color:var(--text2); }
.vp-c-btn.danger:hover { color:var(--danger); background:rgba(239,68,68,.08); }
/* Comment input */
.vp-cmt-wrap { display:flex; gap:9px; align-items:flex-end; }
.vp-cmt-inp {
  flex:1; background:var(--bg3); border:1.5px solid var(--border);
  border-radius:11px; padding:10px 13px; color:var(--text); font-size:13.5px;
  outline:none; resize:none; font-family:inherit; line-height:1.5;
  transition:border-color .18s; min-height:42px; max-height:120px; overflow-y:auto;
}
.vp-cmt-inp:focus { border-color:var(--accent); }
.vp-cmt-send {
  width:40px; height:40px; border-radius:50%; background:var(--accent);
  border:none; color:#fff; cursor:pointer; flex-shrink:0;
  display:flex; align-items:center; justify-content:center; font-size:15px;
  transition:all .18s;
}
.vp-cmt-send:hover { transform:scale(1.08); filter:brightness(1.1); }

/* ── SPLIT NOTE PANEL (note beside/below video, video keeps playing) ── */
.vp-split-wrap {
  display:flex; flex-direction:column; height:100%; overflow:hidden; background:var(--bg);
}
.vp-split-top {
  display:flex; flex-direction:column; flex-shrink:0;
}
.vp-split-panels {
  flex:1; display:flex; overflow:hidden;
  border-top:2px solid var(--border);
}
.vp-split-left {
  width:50%; flex-shrink:0; display:flex; flex-direction:column;
  border-right:2px solid var(--border); background:var(--bg2);
  overflow:hidden;
}
.vp-split-right {
  flex:1; display:flex; flex-direction:column; overflow:hidden; background:var(--bg);
}
.vp-split-hdr {
  display:flex; align-items:center; gap:8px; padding:10px 13px;
  background:var(--bg2); border-bottom:1px solid var(--border);
  font-size:11.5px; font-weight:800; text-transform:uppercase;
  letter-spacing:.6px; color:var(--text3); flex-shrink:0;
}
.vp-split-hdr i { font-size:13px; color:var(--accent); }
.vp-split-hdr .vp-split-close {
  margin-left:auto; width:26px; height:26px; border-radius:7px;
  background:var(--bg3); border:1px solid var(--border);
  color:var(--text3); cursor:pointer; font-size:12px;
  display:flex; align-items:center; justify-content:center; transition:all .15s;
}
.vp-split-hdr .vp-split-close:hover { background:rgba(239,68,68,.1); color:var(--danger); }
.vp-split-note-body {
  flex:1; overflow:hidden;
}
.vp-split-note-body iframe {
  width:100%; height:100%; border:none; background:var(--bg3);
}
.vp-split-scroll {
  flex:1; overflow-y:auto; padding:14px 15px;
}

/* ── INLINE NOTE VIEWER (16:9, opens below Teacher Notes, video keeps playing) ── */
/* ── Inline Note Viewer (below video title, video keeps playing) ── */
/* Inline note viewer — sits BELOW the video, video keeps playing */
#vpInlineNoteViewer {
  display:none;
  flex-direction:column;
  margin-top:10px;
  border-radius:var(--r);
  border:1.5px solid var(--border);
  overflow:hidden;
  background:var(--bg3);
  animation:fadeIn .2s ease;
}
#vpInlineNoteViewer.inv-open { display:flex; }
.vp-inv-topbar {
  display:flex; align-items:center; gap:10px;
  padding:10px 14px; background:var(--bg2);
  border-bottom:1px solid var(--border); flex-shrink:0; min-height:48px;
  position:sticky; top:0; z-index:2;
}
.vp-inv-back {
  width:34px; height:34px; border-radius:9px;
  background:var(--bg3); border:1px solid var(--border);
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  font-size:14px; color:var(--text); transition:all .15s; flex-shrink:0;
}
.vp-inv-back:hover { background:var(--accent); color:#fff; border-color:var(--accent); }
.vp-inv-header {
  display:flex; align-items:center; gap:8px;
  font-size:13px; font-weight:700; flex:1; min-width:0;
}
.vp-inv-header i { color:var(--accent); flex-shrink:0; font-size:14px; }
#vpInvTitle {
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
}
.vp-inv-close {
  background:none; border:none;
  color:var(--text3); cursor:pointer; font-size:14px;
  padding:3px 7px; border-radius:6px; line-height:1;
  transition:color .15s; flex-shrink:0;
}
.vp-inv-close:hover { color:var(--danger); }
/* Full tall iframe for PDFs/Docs — not 16:9 */
.vp-inv-body {
  width:100%; height:80vh; min-height:400px;
  position:relative; overflow:hidden;
}
/* iframe zoom wrapper — transform-origin top-left */
.vp-inv-zoom-wrap {
  width:100%; height:100%;
  transform-origin:top left;
  transition:transform .15s ease;
  overflow:hidden;
}
.vp-inv-zoom-wrap iframe {
  width:100%; height:100%;
  border:none; background:var(--bg3); display:block;
  /* Allow pinch zoom inside iframe container */
  touch-action:pan-x pan-y;
}
/* Zoom control bar */
.vp-inv-zoom-bar {
  position:absolute; bottom:12px; right:12px; z-index:10;
  display:flex; align-items:center; gap:6px;
  background:rgba(0,0,0,.65); backdrop-filter:blur(8px);
  border-radius:20px; padding:5px 10px;
  border:1px solid rgba(255,255,255,.1);
}
.vp-inv-zoom-bar button {
  width:28px; height:28px; border-radius:50%;
  background:rgba(255,255,255,.12); border:none;
  color:#fff; cursor:pointer; font-size:14px; font-weight:700;
  display:flex; align-items:center; justify-content:center;
  transition:background .15s; flex-shrink:0; line-height:1;
}
.vp-inv-zoom-bar button:hover { background:rgba(255,255,255,.25); }
.vp-inv-zoom-val {
  color:#fff; font-size:11px; font-weight:700;
  min-width:34px; text-align:center; letter-spacing:.3px;
}
.vp-inv-ratio { display:none; }
/* Mobile: stack vertically */
@media(max-width:600px){
  .vp-split-panels { flex-direction:column; }
  .vp-split-left { width:100%; height:45%; border-right:none; border-bottom:2px solid var(--border); }
  .vp-split-right { height:55%; }
}
/* Teacher attach notes */
.an-row {
  display:flex; align-items:center; gap:11px; padding:10px 12px;
  border:1.5px solid var(--border); border-radius:11px;
  background:var(--card2); margin-bottom:8px; cursor:pointer; transition:all .18s;
}
.an-row:hover { border-color:var(--accent); }
.an-row.sel  { border-color:var(--accent); background:rgba(34,197,94,.06); }
[data-theme="light"] .an-row.sel { background:rgba(29,78,216,.05); }
.an-chk {
  width:20px; height:20px; border-radius:5px; flex-shrink:0;
  background:var(--bg3); border:2px solid var(--border2);
  display:flex; align-items:center; justify-content:center;
  font-size:11px; color:#fff; transition:all .15s;
}
.an-row.sel .an-chk { background:var(--accent); border-color:var(--accent); }
/* Teacher stats on lecture card */
.ci-engage-row {
  display:flex; align-items:center; gap:12px; flex-wrap:wrap;
  margin-top:8px; padding-top:8px; border-top:1px solid var(--border);
}
.ci-engage-pill {
  display:inline-flex; align-items:center; gap:5px;
  font-size:11.5px; font-weight:700; color:var(--text2);
}
