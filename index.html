let _searchOverlay=null;
let _searchKbIdx=-1;

function openGlobalSearch(){
  if(_searchOverlay) return;
  _searchOverlay=document.createElement('div');
  _searchOverlay.className='search-overlay';
  _searchOverlay.id='searchOverlay';
  _searchOverlay.innerHTML=`
    <div class="search-box" id="searchBox" onclick="event.stopPropagation()">
      <div class="search-inp-wrap">
        <i class="fas fa-search"></i>
        <input class="search-main-inp" id="searchMainInp"
          placeholder="Search batches, subjects, chapters, notes, lectures…"
          oninput="runGlobalSearch(this.value)"
          onkeydown="handleSearchKey(event)">
        <button class="search-close-btn" onclick="closeGlobalSearch()"><i class="fas fa-times"></i></button>
      </div>
      <div class="search-results" id="searchResults">
        <div class="search-hint">
          <i class="fas fa-search" style="font-size:32px;opacity:.3;margin-bottom:10px;display:block"></i>
          Type to search across all content…
        </div>
      </div>
    </div>`;
  _searchOverlay.onclick=()=>closeGlobalSearch();
  document.body.appendChild(_searchOverlay);
  setTimeout(()=>document.getElementById('searchMainInp')?.focus(),80);
  // ESC to close
  document.addEventListener('keydown',_searchEscHandler);
}

function _searchEscHandler(e){ if(e.key==='Escape') closeGlobalSearch(); }

function closeGlobalSearch(){
  if(_searchOverlay){ _searchOverlay.remove(); _searchOverlay=null; _searchKbIdx=-1; }
  document.removeEventListener('keydown',_searchEscHandler);
}

function highlightMatch(text, q){
  if(!q) return esc(text);
  const re=new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
  return esc(text).replace(re,'<mark>$1</mark>');
}

function handleSearchKey(e){
  const items=document.querySelectorAll('.search-result-item');
  if(e.key==='ArrowDown'){ e.preventDefault(); _searchKbIdx=Math.min(_searchKbIdx+1,items.length-1); }
  else if(e.key==='ArrowUp'){ e.preventDefault(); _searchKbIdx=Math.max(_searchKbIdx-1,0); }
  else if(e.key==='Enter'){
    e.preventDefault();
    const active=items[_searchKbIdx]||items[0];
    if(active) active.click();
    return;
  }
  items.forEach((it,i)=>it.classList.toggle('active',i===_searchKbIdx));
  items[_searchKbIdx]?.scrollIntoView({block:'nearest'});
}

async function runGlobalSearch(q){
  q=(q||'').trim();
  const box=document.getElementById('searchResults');
  if(!box) return;
  if(q.length<2){
    box.innerHTML='<div class="search-hint"><i class="fas fa-search" style="font-size:32px;opacity:.3;margin-bottom:10px;display:block"></i>Type at least 2 characters…</div>';
    return;
  }
  box.innerHTML='<div class="search-hint"><div class="spinner" style="width:28px;height:28px;margin:20px auto 0"></div></div>';

  const uid2=S.user?.id;
  const role=S.user?.role;
  const lq=q.toLowerCase();
  let html='';

  try {
    // Fetch relevant data in parallel
    const [batches,subjects,chapters,content]=await Promise.all([
      sb.from('batches').select('*').order('name'),
      sb.from('subjects').select('*').order('name'),
      sb.from('chapters').select('*').order('name'),
      sb.from('content').select('id,name,type,chapter_id').order('name'),
    ]);

    const allBatches  = batches.data||[];
    const allSubjects = subjects.data||[];
    const allChapters = chapters.data||[];
    const allContent  = content.data||[];

    // For students: only show their enrolled batches
    let myBatchIds=allBatches.map(b=>b.id);
    if(role==='student'){
      myBatchIds=allBatches.filter(b=>(b.students||[]).includes(uid2)).map(b=>b.id);
    } else if(role==='teacher'){
      myBatchIds=allBatches.filter(b=>b.teacher_id===uid2).map(b=>b.id);
    }

    // Filter batches
    const fBatches=allBatches.filter(b=>myBatchIds.includes(b.id)&&b.name.toLowerCase().includes(lq));
    if(fBatches.length){
      html+=`<div class="search-section-title"><i class="fas fa-box"></i> Batches</div>`;
      html+=fBatches.slice(0,5).map(b=>`
        <div class="search-result-item" onclick="closeGlobalSearch();S.sub='${role==='teacher'?'batches':'mybatches'}';S.batch=${JSON.stringify(b).replace(/"/g,'&quot;')};render()">
          <div class="sr-ic"><i class="fas fa-box"></i></div>
          <div class="sr-info">
            <div class="sr-name">${highlightMatch(b.name,q)}</div>
            <div class="sr-path">${esc(b.description||'Batch')}</div>
          </div>
        </div>`).join('');
    }

    // Filter subjects (only from my batches)
    const fSubjects=allSubjects.filter(s=>myBatchIds.includes(s.batch_id)&&s.name.toLowerCase().includes(lq));
    if(fSubjects.length){
      html+=`<div class="search-section-title"><i class="fas fa-book-open"></i> Subjects</div>`;
      html+=fSubjects.slice(0,5).map(s=>{
        const batch=allBatches.find(b=>b.id===s.batch_id);
        return `
        <div class="search-result-item" onclick="closeGlobalSearch();S.sub='${role==='teacher'?'batches':'mybatches'}';S.batch=${JSON.stringify(batch||{id:s.batch_id,name:'Batch'}).replace(/"/g,'&quot;')};S.subject=${JSON.stringify(s).replace(/"/g,'&quot;')};render()">
          <div class="sr-ic"><i class="fas fa-book-open"></i></div>
          <div class="sr-info">
            <div class="sr-name">${highlightMatch(s.name,q)}</div>
            <div class="sr-path">${esc(batch?.name||'Unknown batch')}</div>
          </div>
        </div>`;
      }).join('');
    }

    // Filter chapters
    const mySubjectIds=allSubjects.filter(s=>myBatchIds.includes(s.batch_id)).map(s=>s.id);
    const fChapters=allChapters.filter(c=>mySubjectIds.includes(c.subject_id)&&c.name.toLowerCase().includes(lq));
    if(fChapters.length){
      html+=`<div class="search-section-title"><i class="fas fa-pen"></i> Chapters</div>`;
      html+=fChapters.slice(0,5).map(c=>{
        const subj=allSubjects.find(s=>s.id===c.subject_id);
        const batch=allBatches.find(b=>b.id===subj?.batch_id);
        return `
        <div class="search-result-item" onclick="closeGlobalSearch();S.sub='${role==='teacher'?'batches':'mybatches'}';S.batch=${JSON.stringify(batch||{}).replace(/"/g,'&quot;')};S.subject=${JSON.stringify(subj||{}).replace(/"/g,'&quot;')};S.chapter=${JSON.stringify(c).replace(/"/g,'&quot;')};render()">
          <div class="sr-ic"><i class="fas fa-pen"></i></div>
          <div class="sr-info">
            <div class="sr-name">${highlightMatch(c.name,q)}</div>
            <div class="sr-path">${esc(batch?.name||'')} › ${esc(subj?.name||'')}</div>
          </div>
        </div>`;
      }).join('');
    }

    // Filter content (notes / lecture / dpp)
    const myChapterIds=allChapters.filter(c=>mySubjectIds.includes(c.subject_id)).map(c=>c.id);
    const typeIc={notes:'<i class="fas fa-book"></i>',lecture:'<i class="fas fa-video"></i>',dpp:'<i class="fas fa-clipboard-list"></i>'};
    const fContent=allContent.filter(c=>myChapterIds.includes(c.chapter_id)&&c.name.toLowerCase().includes(lq));
    if(fContent.length){
      html+=`<div class="search-section-title"><i class="fas fa-file-alt"></i> Content</div>`;
      html+=fContent.slice(0,8).map(c=>{
        const chap=allChapters.find(ch=>ch.id===c.chapter_id);
        const subj=allSubjects.find(s=>s.id===chap?.subject_id);
        const batch=allBatches.find(b=>b.id===subj?.batch_id);
        const typeLabel=(c.type||'notes').charAt(0).toUpperCase()+(c.type||'notes').slice(1);
        return `
        <div class="search-result-item" onclick="closeGlobalSearch();S.sub='${role==='teacher'?'batches':'mybatches'}';S.batch=${JSON.stringify(batch||{}).replace(/"/g,'&quot;')};S.subject=${JSON.stringify(subj||{}).replace(/"/g,'&quot;')};S.chapter=${JSON.stringify(chap||{}).replace(/"/g,'&quot;')};S.cTab='${c.type||'notes'}';render()">
          <div class="sr-ic">${typeIc[c.type]||'<i class="fas fa-file-alt"></i>'}</div>
          <div class="sr-info">
            <div class="sr-name">${highlightMatch(c.name,q)} <span class="sr-type">${typeLabel}</span></div>
            <div class="sr-path">${esc(batch?.name||'')} › ${esc(subj?.name||'')} › ${esc(chap?.name||'')}</div>
          </div>
        </div>`;
      }).join('');
    }

    if(!html){
      html=`<div class="search-empty">
        <i class="fas fa-search" style="font-size:32px;opacity:.3;margin-bottom:10px;display:block"></i>
        No results found for "<strong>${esc(q)}</strong>"
      </div>`;
    }
    box.innerHTML=html;
    _searchKbIdx=-1;
  } catch(err){
    box.innerHTML=`<div class="search-empty">Error: ${esc(err.message)}</div>`;
  }
}

function collectSubjectChapters(){
  const result=[];
  document.querySelectorAll('#subjChapPicker input[data-subj-id]:not([data-chap-id]):checked').forEach(subj=>{
    const subjId=subj.dataset.subjId; const subjName=subj.dataset.subjName||'';
    const chapIds=[]; const chapNames=[];
    document.querySelectorAll(`#subjChapPicker input[data-chap-id][data-subj-id="${subjId}"]:checked`).forEach(c=>{
      chapIds.push(c.dataset.chapId); chapNames.push(c.dataset.chapName||'');
    });
    result.push({subject_id:subjId,subject_name:subjName,chapter_ids:chapIds,chapter_names:chapNames});
  });
  return result;
}

function toggleSubjChap(cb){
  // When subject unchecked → uncheck all its chapters
  if(!cb.checked && cb.dataset.subjId && !cb.dataset.chapId){
    document.querySelectorAll(`#subjChapPicker input[data-chap-id][data-subj-id="${cb.dataset.subjId}"]`).forEach(c=>c.checked=false);
  }
  // When chapter checked → auto-check its subject
  if(cb.checked && cb.dataset.chapId){
    const subjCb=document.querySelector(`#subjChapPicker input[data-subj-id="${cb.dataset.subjId}"]:not([data-chap-id])`);
    if(subjCb) subjCb.checked=true;
  }
}

/* =====================================================
   ── STREAK HELPERS ──
===================================================== */
function calcStreak(dates){
  if(!dates||!dates.length) return 0;
  const sorted=[...new Set(dates)].sort().reverse();
  const t=today();
  let streak=0; let cur=t;
  for(const d of sorted){
    if(d===cur){ streak++; const dt=new Date(cur); dt.setDate(dt.getDate()-1); cur=dt.toISOString().split('T')[0]; }
    else if(d<cur) break;
  }
  // If today not marked, check if yesterday was (streak still alive today)
  if(streak===0){
    const yest=new Date(); yest.setDate(yest.getDate()-1);
    const yStr=yest.toISOString().split('T')[0];
    let c2=yStr;
    for(const d of sorted){
      if(d===c2){ streak++; const dt=new Date(c2); dt.setDate(dt.getDate()-1); c2=dt.toISOString().split('T')[0]; }
      else if(d<c2) break;
    }
  }
  return streak;
}
function calcBestStreak(dates){
  if(!dates||!dates.length) return 0;
  const sorted=[...new Set(dates)].sort();
  let best=1, cur=1;
  for(let i=1;i<sorted.length;i++){
    const prev=new Date(sorted[i-1]); prev.setDate(prev.getDate()+1);
    if(prev.toISOString().split('T')[0]===sorted[i]){ cur++; best=Math.max(best,cur); }
    else cur=1;
  }
  return best;
}

/* =====================================================
   ── PROGRESS TRACKING — mark content done ──
   Supabase table: content_done (id, user_id, content_id, ts)
===================================================== */
async function hydrateDoneButtons(){
  const uid2=S.user?.id; if(!uid2) return;
  const btns=[...document.querySelectorAll('.ci-done-btn[id^="done_"]')];
  if(!btns.length) return;
  const ids=btns.map(b=>b.id.replace('done_',''));
  try{
    const {data}=await sb.from('content_done').select('content_id').eq('user_id',uid2).in('content_id',ids);
    const doneSet=new Set((data||[]).map(d=>d.content_id));
    btns.forEach(btn=>{
      const cid=btn.id.replace('done_','');
      if(doneSet.has(cid)){ btn.classList.add('done'); btn.title='Done ✓'; btn.innerHTML='<i class="fas fa-check"></i> Done'; }
    });
  }catch(e){ /* table may not exist yet — silently ignore */ }
}

async function toggleDone(contentId, btn){
  const uid2=S.user?.id; if(!uid2) return;
  if(btn.disabled) return; // prevent double-click
  btn.disabled=true;
  const isDone=btn.classList.contains('done');
  try{
    if(isDone){
      // Optimistic UI first
      btn.classList.remove('done'); btn.title='Mark as done'; btn.innerHTML='<i class="fas fa-check"></i>';
      const {error}=await sb.from('content_done').delete().eq('user_id',uid2).eq('content_id',contentId);
      if(error) throw error;
      toast('Marked incomplete','warning');
    } else {
      // Optimistic UI first
      btn.classList.add('done'); btn.title='Done ✓'; btn.innerHTML='<i class="fas fa-check"></i> Done';
      const {error}=await sb.from('content_done').upsert({id:uid(),user_id:uid2,content_id:contentId,ts:now()},{onConflict:'user_id,content_id'});
      if(error) throw error;
      toast('Marked as done! ✓','success');
    }
  } catch(e){
    // Revert on error
    if(isDone){ btn.classList.add('done'); btn.title='Done ✓'; btn.innerHTML='<i class="fas fa-check"></i> Done'; }
    else { btn.classList.remove('done'); btn.title='Mark as done'; btn.innerHTML='<i class="fas fa-check"></i>'; }
    toast('Error: '+e.message,'error');
  } finally {
    btn.disabled=false;
  }
}

/* Chapter-level progress (used in studentChapters) */
async function getChapterProgress(chapterId, userId){
  try{
    const [{data:all},{data:done}]=await Promise.all([
      sb.from('content').select('id').eq('chapter_id',chapterId),
      sb.from('content_done').select('content_id').eq('user_id',userId)
        .in('content_id',(await sb.from('content').select('id').eq('chapter_id',chapterId)).data?.map(c=>c.id)||[])
    ]);

}

/* =====================================================
   ── LEADERBOARD ──
   Uses: attendance (streak), content_done (items), study_hours (time)
===================================================== */
async function studentLeaderboard(){
  const uid2=S.user.id;
  // Get all batches this student belongs to
  const {data:myBatchesRaw}=await sb.from('batches').select('*').contains('students',[uid2]);
  const myBatches=myBatchesRaw||[];
  if(!myBatches.length) return `<div class="empty"><span class="empty-ic"><i class="fas fa-trophy"></i></span><p>Join a batch to see leaderboard.</p></div>`;

  // Batch selector
  if(!S.lbBatch) S.lbBatch=myBatches[0];
  const selBatch=myBatches.find(b=>b.id===S.lbBatch?.id)||myBatches[0];
  const stuIds=selBatch.students||[];
  if(!stuIds.length) return `<div class="empty"><span class="empty-ic"><i class="fas fa-trophy"></i></span><p>No students in this batch yet.</p></div>`;

  // Fetch all needed data in parallel
  const [profilesRes,attRes,doneRes,hoursRes]=await Promise.all([
    sb.from('profiles').select('id,name,photo').in('id',stuIds),
    sb.from('attendance').select('user_id,date').in('user_id',stuIds),
    sb.from('content_done').select('user_id').in('user_id',stuIds),
    sb.from('study_hours').select('user_id,secs').in('user_id',stuIds),
  ]);
  const profiles=profilesRes.data||[];
  const attAll=attRes.data||[];
  const doneAll=doneRes.data||[];
  const hoursAll=hoursRes.data||[];

  // Build per-student stats
  const rows=stuIds.map(id=>{
    const p=profiles.find(x=>x.id===id)||{id,name:'Unknown',photo:null};
    const myDates=attAll.filter(a=>a.user_id===id).map(a=>a.date);
    const streak=calcStreak(myDates);
    const doneCount=doneAll.filter(d=>d.user_id===id).length;
    const totalSecs=hoursAll.filter(h=>h.user_id===id).reduce((n,h)=>n+(h.secs||0),0);
    const attendDays=myDates.length;
    return {id,name:p.name,photo:p.photo,streak,doneCount,totalSecs,attendDays};
  });

  const tab=S.lbTab||'streak';

  // Sort by active tab
  const sorted=[...rows].sort((a,b)=>{
    if(tab==='streak')   return b.streak-a.streak;
    if(tab==='done')     return b.doneCount-a.doneCount;
    if(tab==='time')     return b.totalSecs-a.totalSecs;
    if(tab==='attend')   return b.attendDays-a.attendDays;
    return 0;
  });

  function scoreLabel(r){
    if(tab==='streak') return `${r.streak} 🔥<small>day streak</small>`;
    if(tab==='done')   return `${r.doneCount} ✓<small>items done</small>`;
    if(tab==='time')   return `${Math.floor(r.totalSecs/3600)}h ${Math.floor((r.totalSecs%3600)/60)}m<small>study time</small>`;
    if(tab==='attend') return `${r.attendDays}<small>days present</small>`;
  }

  const rankClass=i=>i===0?'r1':i===1?'r2':i===2?'r3':'';
  const rankEmoji=i=>i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1;

  return `
  <!-- Batch selector -->
  <div style="position:relative;margin-bottom:14px">
    <select class="fc" style="font-size:15px;font-weight:800;padding:10px 40px 10px 14px;appearance:none;-webkit-appearance:none;background:var(--bg3);border:1.5px solid var(--border2);border-radius:12px;cursor:pointer"
      onchange="S.lbBatch=JSON.parse(this.options[this.selectedIndex].dataset.b);render()">
      ${myBatches.map(b=>`<option value="${b.id}" data-b='${JSON.stringify(b).replace(/'/g,"&#39;")}' ${selBatch.id===b.id?'selected':''}>${esc(b.name)}</option>`).join('')}
    </select>
    <i class="fas fa-chevron-down" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--text3);font-size:13px"></i>
  </div>

  <!-- Tab selector -->
  <div class="lb-tabs">
    <div class="lb-tab ${tab==='streak'?'on':''}"  onclick="S.lbTab='streak';render()">🔥 Streak</div>
    <div class="lb-tab ${tab==='done'?'on':''}"    onclick="S.lbTab='done';render()">✓ Done</div>
    <div class="lb-tab ${tab==='time'?'on':''}"    onclick="S.lbTab='time';render()">⏱ Time</div>
    <div class="lb-tab ${tab==='attend'?'on':''}"  onclick="S.lbTab='attend';render()">📅 Attend</div>
  </div>

  <!-- Your rank card -->
  ${(()=>{
    const myRank=sorted.findIndex(r=>r.id===uid2);
    const myRow=sorted[myRank];
    if(!myRow) return '';
    const th=Math.floor(myRow.totalSecs/3600);
    return `<div class="lb-row me" style="margin-bottom:18px">
      <div class="lb-rank ${rankClass(myRank)}">${rankEmoji(myRank)}</div>
      <div class="lb-av">${myRow.photo?`<img src="${esc(myRow.photo)}" alt="">`:(myRow.name||'?').charAt(0).toUpperCase()}</div>
      <div class="lb-info">
        <div class="lb-name">You (${esc(myRow.name)})</div>
        <div class="lb-sub">Rank #${myRank+1} of ${sorted.length}</div>
      </div>
      <div class="lb-score">${scoreLabel(myRow)}</div>
    </div>`;
  })()}

  <!-- Full list -->
  <div class="sec-t"><i class="fas fa-trophy"></i> All Students</div>
  ${sorted.map((r,i)=>`
  <div class="lb-row ${r.id===uid2?'me':''}">
    <div class="lb-rank ${rankClass(i)}">${rankEmoji(i)}</div>
    <div class="lb-av">${r.photo?`<img src="${esc(r.photo)}" alt="">`:(r.name||'?').charAt(0).toUpperCase()}</div>
    <div class="lb-info">
      <div class="lb-name">${esc(r.name)}${r.id===uid2?' <span style="color:var(--accent);font-size:11px">(You)</span>':''}</div>
      <div class="lb-sub">${r.attendDays} days present</div>
    </div>
    <div class="lb-score">${scoreLabel(r)}</div>
  </div>`).join('')}`;
}

          return `<div class="poll-opt voted" style="cursor:default">
            <div class="poll-opt-bar" style="width:${pct}%"></div>
            <span class="poll-opt-label">${esc(o.text||o)}</span>
            <span class="poll-opt-pct">${pct}% <span style="color:var(--text3);font-weight:500">(${cnt})</span></span>
          </div>`;
        }).join('')}
        <div class="poll-meta">
          <span><i class="fas fa-users"></i> ${totalVotes} vote${totalVotes!==1?'s':''}</span>
          <span><i class="fas fa-calendar"></i> ${fmtD(p.created_at)}</span>
          ${bName?`<span class="poll-batch-tag"><i class="fas fa-box"></i> ${esc(bName)}</span>`:''}
        </div>
      </div>
    </div>`;
  }).join('')
  : '<div class="empty"><span class="empty-ic"><i class="fas fa-poll"></i></span><p>No polls yet. Create one!</p></div>'}`;
}

function modalNewPoll(){
  sb.from('batches').select('id,name').eq('teacher_id',S.user.id).then(({data:batches})=>{
    const bOpts=(batches||[]).map(b=>`<option value="${b.id}">${esc(b.name)}</option>`).join('');
    openModal(`
    <div class="mh"><h3><i class="fas fa-poll"></i> New Poll</h3><button class="mc-btn" onclick="closeModal()">✕</button></div>
    <div class="fg"><label>Question *</label><input class="fc" id="pq" placeholder="e.g. Ready for the upcoming test?"></div>
    <div class="fg"><label>Batch *</label><select class="fc" id="pb">${bOpts}</select></div>
    <div class="fg"><label>Options (one per line, min 2) *</label>
      <textarea class="fc" id="popts" rows="4" placeholder="Yes, I'm ready\nNeed more time\nNot at all" style="resize:vertical"></textarea>
    </div>
    <div class="m-actions">
      <button class="btn btn-sec" onclick="closeModal()">Cancel</button>
      <button class="btn btn-p" onclick="savePoll()"><i class="fas fa-paper-plane"></i> Create Poll</button>
    </div>`);
  });
}

async function savePoll(){
  const q=(document.getElementById('pq')?.value||'').trim();
  const bId=(document.getElementById('pb')?.value||'').trim();
  const raw=(document.getElementById('popts')?.value||'').trim();
  const opts=raw.split('\n').map(s=>s.trim()).filter(Boolean);
  if(!q){toast('Question required','warning');return;}
  if(!bId){toast('Select a batch','warning');return;}
  if(opts.length<2){toast('At least 2 options required','warning');return;}
  const {error}=await sb.from('polls').insert({
    id:uid(),teacher_id:S.user.id,batch_id:bId,
    question:q,options:opts.map(t=>({text:t})),votes:{},created_at:now()
  });
  if(error){toast(error.message,'error');return;}
  // Push notification to batch students
  const {data:batch}=await sb.from('batches').select('students').eq('id',bId).single();
  const studs=batch?.students||[];
  await Promise.all(studs.map(sid=>pushNotif(sid,'New Poll 📊',q.slice(0,80))));
  closeModal(); toast('Poll created!','success'); render();
}

async function deletePoll(id){
  showConfirm('Delete this poll?','<i class="fas fa-poll"></i>',async()=>{
    await sb.from('polls').delete().eq('id',id);
    toast('Deleted','warning'); render();
  },'<i class="fas fa-trash"></i> Delete','btn-del');
}

/* ── Student side: view & vote on polls ── */
async function studentPolls(){
  const uid2=S.user.id;
  const {data:myBatches}=await sb.from('batches').select('id').contains('students',[uid2]);
  const bIds=(myBatches||[]).map(b=>b.id);
  if(!bIds.length) return '<div class="empty"><span class="empty-ic"><i class="fas fa-poll"></i></span><p>No polls yet.</p></div>';
  const {data:polls}=await sb.from('polls').select('*').in('batch_id',bIds).order('created_at',{ascending:false});
  const allPolls=polls||[];
  if(!allPolls.length) return '<div class="empty"><span class="empty-ic"><i class="fas fa-poll"></i></span><p>No active polls right now.</p></div>';

  return `
  <div class="sec-t"><i class="fas fa-poll"></i> Polls</div>
  ${allPolls.map(p=>{
    const opts=p.options||[];
    const votes=p.votes||{};
    const totalVotes=Object.keys(votes).length;
    const myVote=votes[uid2]!=null?votes[uid2]:null;
    const voted=myVote!==null;
    return `
    <div class="poll-card" id="poll_${p.id}">
      <div class="poll-top"></div>
      <div class="poll-body">
        <div class="poll-q">${esc(p.question)}</div>
        ${opts.map((o,i)=>{
          const cnt=Object.values(votes).filter(v=>v===i).length;
          const pct=totalVotes?Math.round(cnt/totalVotes*100):0;
          return `<div class="poll-opt ${voted?'voted':''} ${myVote===i?'my-vote':''}"
            onclick="${voted?'':`votePoll('${p.id}',${i})`}">
            ${voted?`<div class="poll-opt-bar" style="width:${pct}%"></div>`:''}
            <span class="poll-opt-label">${esc(o.text||o)}${myVote===i?' ✓':''}</span>
            ${voted?`<span class="poll-opt-pct">${pct}%</span>`:''}
          </div>`;
        }).join('')}
        <div class="poll-meta">
          ${voted?`<span style="color:var(--success)"><i class="fas fa-check-circle"></i> Voted</span>`:'<span style="color:var(--warning)"><i class="fas fa-clock"></i> Tap to vote</span>'}
          <span><i class="fas fa-users"></i> ${totalVotes} vote${totalVotes!==1?'s':''}</span>
          <span><i class="fas fa-calendar"></i> ${fmtD(p.created_at)}</span>
        </div>
      </div>
    </div>`;
  }).join('')}`;
}

async function votePoll(pollId, optionIndex){
  const uid2=S.user.id;
  const {data:poll}=await sb.from('polls').select('votes').eq('id',pollId).single();
  if(!poll){toast('Poll not found','error');return;}
  const votes={...(poll.votes||{})};
  votes[uid2]=optionIndex;
  const {error}=await sb.from('polls').update({votes}).eq('id',pollId);
  if(error){toast(error.message,'error');return;}
  toast('Vote recorded!','success');
  // Re-render just the poll card
  const card=document.getElementById(`poll_${pollId}`);
  if(card){
    // Optimistic re-render: re-fetch and update
    const {data:updated}=await sb.from('polls').select('*').eq('id',pollId).single();
    if(updated){
      const allVotes=updated.votes||{};
      const total=Object.keys(allVotes).length;
      const myV=allVotes[uid2]!=null?allVotes[uid2]:null;
      const opts=updated.options||[];
      card.querySelector('.poll-body').innerHTML = `
        <div class="poll-q">${esc(updated.question)}</div>
        ${opts.map((o,i)=>{
          const cnt=Object.values(allVotes).filter(v=>v===i).length;
          const pct=total?Math.round(cnt/total*100):0;
          return `<div class="poll-opt voted ${myV===i?'my-vote':''}">
            <div class="poll-opt-bar" style="width:${pct}%"></div>
            <span class="poll-opt-label">${esc(o.text||o)}${myV===i?' ✓':''}</span>
            <span class="poll-opt-pct">${pct}%</span>
          </div>`;
        }).join('')}
        <div class="poll-meta">
          <span style="color:var(--success)"><i class="fas fa-check-circle"></i> Voted</span>
          <span><i class="fas fa-users"></i> ${total} vote${total!==1?'s':''}</span>
        </div>`;
    }
  }
}

init();

</script>

      oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>

    Powered by <span>Groq</span> &nbsp;·&nbsp; Tushya AI

</div>

<script>
/* ═══════════════════════════════════════
   TUSHYA AI — FreeStudy Integration
   ═══════════════════════════════════════ */
const tushyaAI = (() => {

  // Groq API key is stored securely in Supabase Edge Function secrets — never exposed in frontend
  const PROXY_URL  = 'https://xjjnszjsmalnhbjcbtxm.supabase.co/functions/v1/groq-proxy';
  const GROQ_MODEL = 'meta-llama/llama-4-scout-17b-16e-instruct';

  const SYSTEM = {
    general:  `You are Tushya AI — a professional, friendly assistant embedded in FreeStudy, an educational platform. Respond clearly and concisely. Use **bold** for key terms.`,
    student:  `You are Tushya AI — an expert student mentor on FreeStudy. Detect the student's level and adapt. Beginners: simple analogies, step-by-step. Advanced: go deep. Always encouraging. Use **bold** for key concepts.`,
    writing:  `You are Tushya AI — a professional writing assistant on FreeStudy. Help craft essays, answers, summaries. Improve grammar, clarity, structure. Be precise and constructive.`,
    analysis: `You are Tushya AI — a sharp analytical assistant on FreeStudy. Break down arguments, identify patterns, summarise insights. Be objective and structured. Use **bold** for key findings.`,
  };

  // ── Storage keys ──
  const LS_HIDDEN  = 'tai_hidden_pages';   // pages where user removed AI
  const LS_HISTORY = 'tai_chat_history';   // persisted message history

  let isOpen = false, mode = 'general', busy = false;
  let history = [];
  let prevSub = null; // track navigation history inside widget

  // ── DOM ──
  const $  = id => document.getElementById(id);
  const msgs = () => $('tai-msgs');

  // ── Get current FreeStudy page/sub ──
  function getCurrentPage() {
    // S is the FreeStudy global state object
    try {
      const sub = window.S?.sub || 'unknown';
      const extra = window.S?.batch ? '_batch' : window.S?.subject ? '_subject' : window.S?.chapter ? '_chapter' : '';
      return sub + extra;
    } catch { return 'unknown'; }
  }

  // ── Check if hidden on current page ──
  function isHiddenOnPage() {
    const page = getCurrentPage();
    // Dashboard is ALWAYS visible
    if (page === 'dashboard') return false;
    try {
      const hidden = JSON.parse(localStorage.getItem(LS_HIDDEN) || '[]');
      return hidden.includes(page);
    } catch { return false; }
  }

  function hideOnPage(page) {
    if (page === 'dashboard') return; // can never hide on dashboard
    try {
      const hidden = JSON.parse(localStorage.getItem(LS_HIDDEN) || '[]');
      if (!hidden.includes(page)) {
        hidden.push(page);
        localStorage.setItem(LS_HIDDEN, JSON.stringify(hidden));
      }
    } catch {}
  }

  // ── Called after every FreeStudy navigation (render) ──
  function syncVisibility() {
    const fab   = $('tai-fab');
    const panel = $('tai-panel');
    if (!fab || !panel) return;

    const hidden = isHiddenOnPage();
    fab.classList.toggle('tai-hidden', hidden);
    panel.classList.toggle('tai-hidden', hidden);

    if (hidden && isOpen) {
      isOpen = false;
      fab.classList.remove('open');
      panel.classList.remove('tai-open');
    }
  }

  // ── Toggle open/close ──
  function toggle() {
    isOpen = !isOpen;
    $('tai-panel').classList.toggle('tai-open', isOpen);
    $('tai-fab').classList.toggle('open', isOpen);
    const dot = $('taiNotifDot');
    if (dot) dot.style.display = isOpen ? 'none' : '';
    if (isOpen) setTimeout(() => $('tai-input')?.focus(), 320);
  }

  // ── Back button ──
  function goBack() {
    // Goes back in chat mode history
    if (prevSub) {
      const saved = prevSub;
      prevSub = null;
      setModeById(saved);
    }
    // Also update back btn visibility
    updateBackBtn();
  }

  function updateBackBtn() {
    const btn = $('taiBackBtn');
    if (btn) btn.style.display = prevSub ? '' : 'none';
  }

  // ── Mode ──
  function setMode(btn, m) {
    prevSub = mode; // save for back button
    document.querySelectorAll('.tai-tab').forEach(b => b.classList.remove('tai-tab-active'));
    btn.classList.add('tai-tab-active');
    mode = m;
    history = [];
    updateBackBtn();
    const labels = { general:'General', student:'Doubt Solver', writing:'Writing', analysis:'Analysis' };
    const icons  = { general:'fa-comments', student:'fa-graduation-cap', writing:'fa-pen-nib', analysis:'fa-chart-bar' };
    addMsg('ai', `<i class="fas ${icons[m]}" style="color:#60a5fa;margin-right:5px"></i><strong>${labels[m]} mode</strong> — ${getModeHint(m)}`);
  }

  function setModeById(m) {
    const btn = document.querySelector(`.tai-tab[data-mode="${m}"]`);
    if (btn) setMode(btn, m);
  }

  function getModeHint(m) {
    return {
      general:  'Ask me anything.',
      student:  'Share your doubt — I will explain clearly at your level.',
      writing:  'Tell me what to write and I will help craft it.',
      analysis: 'Share topic or text and I will analyse it.',
    }[m] || '';
  }

  // ── Clear chat ──
  function clearChat() {
    history = [];
    msgs().innerHTML = '';
    prevSub = null;
    updateBackBtn();
    addMsg('ai', '<i class="fas fa-rotate" style="color:#60a5fa;margin-right:5px"></i>Chat cleared. How can I help?');
  }

  // ── Remove from page ──
  function removeFromPage() {
    const page = getCurrentPage();
    if (page === 'dashboard') {
      // Show toast using FreeStudy's own toast system
      if (typeof toast === 'function') toast('Tushya AI is always visible on Dashboard', 'warning');
      return;
    }
    hideOnPage(page);
    // Close panel
    isOpen = false;
    $('tai-panel').classList.remove('tai-open');
    $('tai-fab').classList.remove('open');
    syncVisibility();
    if (typeof toast === 'function') toast('Tushya AI hidden on this page. Switch pages to restore.', 'warning');
  }

  // ── Time helper ──
  function getTime() {
    return new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
  }

  // ── Add message ──
  function addMsg(role, html) {
    const m = msgs();
    const row = document.createElement('div');
    row.className = `tai-row tai-${role}`;

    const av = document.createElement('div');
    av.className = 'tai-av';
    av.innerHTML = role === 'ai' ? '<i class="fas fa-robot"></i>' : '<i class="fas fa-user"></i>';

    const wrap = document.createElement('div');
    const bub  = document.createElement('div');
    bub.className = 'tai-bub';
    bub.innerHTML = html;

    const ts = document.createElement('div');
    ts.className = 'tai-ts';
    ts.textContent = getTime();

    wrap.appendChild(bub);
    wrap.appendChild(ts);
    row.appendChild(av);
    row.appendChild(wrap);
    m.appendChild(row);
    m.scrollTop = m.scrollHeight;
    return bub;
  }

  // ── Typing indicator ──
  function showTyping() {
    const m = msgs();
    const row = document.createElement('div');
    row.className = 'tai-row tai-ai tai-typing';
    row.id = 'tai-typing';
    row.innerHTML = `
      <div class="tai-av"><i class="fas fa-robot"></i></div>
      <div class="tai-bub">
        <span class="tai-dot"></span><span class="tai-dot"></span><span class="tai-dot"></span>
      </div>`;
    m.appendChild(row);
    m.scrollTop = m.scrollHeight;
  }
  function removeTyping() { $('tai-typing')?.remove(); }

  // ── Format markdown-lite ──
  function fmt(text) {
    return text
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
      .replace(/\*(.+?)\*/g,'<em>$1</em>')
      .replace(/`([^`]+)`/g,'<code>$1</code>')
      .replace(/^- (.+)$/gm,'<li style="margin-left:14px;margin-bottom:3px">$1</li>')
      .replace(/\n\n/g,'<br><br>').replace(/\n/g,'<br>');
  }
  function esc(t) { return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  // ── Send ──
  async function send() {
    const inp  = $('tai-input');
    const text = inp?.value.trim();
    if (!text || busy) return;

    addMsg('user', esc(text));
    history.push({ role:'user', content:text });
    inp.value = '';
    inp.style.height = 'auto';
    $('tai-send').disabled = true;
    busy = true;
    showTyping();

    try {
      const _sbKey = (typeof SUPABASE_KEY !== 'undefined' ? SUPABASE_KEY : null)
                   || 'sb_publishable_Yi7JP5U0gjewhPpgRdhO1A_eCOqI3Hx';
      const res = await fetch(PROXY_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${_sbKey}`,
        },
        body: JSON.stringify({
          model: GROQ_MODEL,
          messages: [{ role:'system', content: SYSTEM[mode] }, ...history],
          max_tokens: 1024,
          temperature: 0.7,
        })
      });

      let data;
      try { data = await res.json(); }
      catch(je) {
        removeTyping();
        addMsg('ai', `<i class="fas fa-triangle-exclamation" style="color:var(--danger);margin-right:5px"></i><span style="color:var(--danger)">Server error (${res.status}). Try again.</span>`);
        busy = false; $('tai-send').disabled = false; inp?.focus(); return;
      }
      removeTyping();

      if (data.choices?.[0]) {
        const reply = data.choices[0].message.content;
        history.push({ role:'assistant', content: reply });
        addMsg('ai', fmt(reply));
      } else {
        const err = data.error?.message || data.message || `HTTP ${res.status}`;
        addMsg('ai', `<i class="fas fa-triangle-exclamation" style="color:var(--danger);margin-right:5px"></i><span style="color:var(--danger)">${esc(err)}</span>`);
      }
    } catch(e) {
      removeTyping();
      addMsg('ai', `<i class="fas fa-triangle-exclamation" style="color:var(--danger);margin-right:5px"></i><span style="color:var(--danger)">Error: ${esc(e.message||String(e))}</span>`);
    }

    busy = false;
    $('tai-send').disabled = false;
    inp?.focus();
  }

  function quickSend(text) {
    const inp = $('tai-input');
    if (inp) inp.value = text;
    send();
  }

  // ── Hook into FreeStudy's render() to sync visibility on every page change ──
  // We wrap the existing render() function
  (function hookRender() {
    const _origRender = window.render;
    if (typeof _origRender === 'function') {
      window.render = async function() {
        const result = await _origRender.apply(this, arguments);
        syncVisibility();
        return result;
      };
    }
    // Also sync on init
    setTimeout(syncVisibility, 500);
  })();

  return { toggle, setMode, goBack, clearChat, removeFromPage, send, quickSend };
})();
</script>
